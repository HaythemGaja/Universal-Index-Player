<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Index Player</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for compiling React JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Custom scrollbar for the episodes list */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 20px; }
    </style>
</head>
<body class="bg-slate-950">
    <!-- React app mounts here -->
    <div id="root"></div>

    <!-- The React Application -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { Play, Search, Film, Tv, ExternalLink, Database, Image as ImageIcon, ChevronDown, ChevronUp, Clock, CheckCircle2, Calendar, Settings, Key, Info, Heart, History, Trash2, X } from 'https://esm.sh/lucide-react@0.292.0';

        function App() {
          // Local Storage Initializers
          const [apiKey, setApiKey] = useState(() => localStorage.getItem('omdbApiKey') || '46fbc5e7');
          const [favorites, setFavorites] = useState(() => {
            try { return JSON.parse(localStorage.getItem('vaFavorites')) || []; } catch(e) { return []; }
          });
          const [historyList, setHistoryList] = useState(() => {
            try { return JSON.parse(localStorage.getItem('vaHistory')) || []; } catch(e) { return []; }
          });

          // Core UI State
          const [showSettings, setShowSettings] = useState(false);
          const [activeTab, setActiveTab] = useState('search'); // 'search', 'favorites', 'history'
          const [query, setQuery] = useState('Breaking Bad');
          const [results, setResults] = useState([]);
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');
          
          // Player State
          const [activeUrl, setActiveUrl] = useState('');

          // TV Show Episode State
          const [expandedShow, setExpandedShow] = useState(null);
          const [episodesLoading, setEpisodesLoading] = useState(false);
          const [episodesData, setEpisodesData] = useState([]);
          const [activeSeason, setActiveSeason] = useState(1);

          // Detailed Episode Info State
          const [expandedEpisode, setExpandedEpisode] = useState(null);
          const [episodeDetailsCache, setEpisodeDetailsCache] = useState({});
          const [fetchingEpisodeId, setFetchingEpisodeId] = useState(null);

          // Persistence Effects
          useEffect(() => localStorage.setItem('vaFavorites', JSON.stringify(favorites)), [favorites]);
          useEffect(() => localStorage.setItem('vaHistory', JSON.stringify(historyList)), [historyList]);

          const handleApiKeyChange = (e) => {
            const newKey = e.target.value;
            setApiKey(newKey);
            localStorage.setItem('omdbApiKey', newKey);
          };

          const toggleFavorite = (item) => {
            setFavorites(prev => {
              if (prev.some(f => f.imdbID === item.imdbID)) {
                return prev.filter(f => f.imdbID !== item.imdbID);
              } else {
                return [item, ...prev];
              }
            });
          };

          const clearHistory = () => setHistoryList([]);

          const removeHistoryItem = (id) => {
            setHistoryList(prev => prev.filter(h => h.id !== id));
          };

          // Debounced Search Effect
          useEffect(() => {
            if (activeTab !== 'search') return;
            const handler = setTimeout(() => {
              if (query.trim()) {
                fetchInitialResults(query);
              } else {
                setResults([]);
              }
            }, 600);
            return () => clearTimeout(handler);
          }, [query, activeTab]);

          // Step 1: Broad search to find the media or direct ID search
          const fetchInitialResults = async (searchQuery) => {
            setLoading(true);
            setError('');
            setExpandedShow(null);

            try {
              const isIdSearch = /^tt\d+$/i.test(searchQuery.trim());
              const url = isIdSearch 
                ? `https://www.omdbapi.com/?apikey=${apiKey}&i=${encodeURIComponent(searchQuery.trim())}`
                : `https://www.omdbapi.com/?apikey=${apiKey}&s=${encodeURIComponent(searchQuery.trim())}`;

              const response = await fetch(url);
              const data = await response.json();
              
              if (data.Response === "True") {
                if (isIdSearch) {
                  setResults([data]);
                  setLoading(false);
                } else {
                  fetchDeepDetails(data.Search.slice(0, 8));
                }
              } else {
                const hasArabic = /[\u0600-\u06FF]/.test(searchQuery);
                if (hasArabic) {
                  setError('OMDb API primarily supports English titles. Please search using the IMDb ID (e.g., tt1234567) or translate your search to English.');
                } else {
                  setError(data.Error);
                }
                setResults([]);
                setLoading(false);
              }
            } catch (err) {
              setError('Network error. Check your connection.');
              setResults([]);
              setLoading(false);
            }
          };

          // Step 2: Deep fetch to get Plot, Runtime, and Total Seasons
          const fetchDeepDetails = async (basicResults) => {
            try {
              const promises = basicResults.map(item => 
                fetch(`https://www.omdbapi.com/?apikey=${apiKey}&i=${item.imdbID}`).then(res => res.json())
              );
              const detailedResults = await Promise.all(promises);
              setResults(detailedResults);
            } catch (err) {
              setError('Failed to load deeper metadata.');
            } finally {
              setLoading(false);
            }
          };

          // Step 3: Fetch specific season data
          const fetchEpisodes = async (imdbID, seasonNum) => {
            setEpisodesLoading(true);

            try {
              const response = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&i=${imdbID}&Season=${seasonNum}`);
              const data = await response.json();
              setEpisodesData(data.Response === "True" ? data.Episodes : []);
            } catch (err) {
              setEpisodesData([]);
            } finally {
              setEpisodesLoading(false);
            }
          };

          const handleToggleShow = (imdbID, totalSeasons) => {
            if (expandedShow === imdbID) {
              setExpandedShow(null);
            } else {
              setExpandedShow(imdbID);
              setActiveSeason(1);
              setExpandedEpisode(null);
              if (totalSeasons && totalSeasons !== "N/A") {
                fetchEpisodes(imdbID, 1);
              }
            }
          };

          const handleToggleEpisode = async (epId) => {
            if (expandedEpisode === epId) {
              setExpandedEpisode(null);
              return;
            }
            setExpandedEpisode(epId);

            if (episodeDetailsCache[epId]) return;

            setFetchingEpisodeId(epId);
            try {
              const response = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&i=${epId}&plot=short`);
              const data = await response.json();
              if (data.Response === "True") {
                setEpisodeDetailsCache(prev => ({ ...prev, [epId]: data }));
              }
            } catch (err) {
              console.error("Failed to fetch episode details", err);
            } finally {
              setFetchingEpisodeId(null);
            }
          };

          // Play Media & History Handler
          const playMedia = (item, season = null, episode = null, epTitle = null) => {
            const mediaType = item.Type === 'series' || item.Type === 'tv' ? 'tv' : 'movie';
            let url = `https://vaplayer.ru/embed/${mediaType}/${item.imdbID}`;
            
            if (season && episode) {
              url += `?s=${season}&e=${episode}`; 
            }
            
            setActiveUrl(url);
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Record History
            setHistoryList(prev => {
              const historyId = `${item.imdbID}-${season || '0'}-${episode || '0'}`;
              const newRecord = {
                id: historyId,
                imdbID: item.imdbID,
                Title: item.Title,
                Type: item.Type,
                Poster: item.Poster,
                season,
                episode,
                epTitle,
                timestamp: Date.now()
              };
              const filtered = prev.filter(h => h.id !== historyId);
              return [newRecord, ...filtered].slice(0, 100); // Keep last 100 entries
            });
          };

          // Determine which array to render for the grid view
          const displayItems = activeTab === 'favorites' ? favorites : results;

          return (
            <div className="min-h-screen bg-slate-950 text-slate-200 font-sans p-3 sm:p-4 md:p-8 pb-16">
              <div className="max-w-5xl mx-auto space-y-6">
                
                {/* Header Panel */}
                <header className="flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-lg">
                  <div className="flex items-center gap-3">
                    <div className="p-2 bg-indigo-500/20 text-indigo-400 rounded-lg">
                      <Database size={24} />
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-white tracking-wide flex items-center gap-2">
                        Universal Index <span className="text-indigo-400">Player</span>
                      </h1>
                      <p className="text-xs text-slate-400">Search OMDb and Stream Instantly</p>
                    </div>
                  </div>
                  
                  <button 
                    onClick={() => setShowSettings(!showSettings)}
                    className="flex items-center gap-2 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-lg text-xs font-medium transition-colors"
                  >
                    <Settings size={14} />
                    API Settings
                  </button>
                </header>

                {/* Settings Panel */}
                {showSettings && (
                  <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-lg flex flex-col sm:flex-row items-center gap-4 animate-in slide-in-from-top-2">
                    <div className="flex items-center gap-2 text-slate-400 w-full sm:w-auto">
                      <Key size={16} />
                      <span className="text-sm font-medium whitespace-nowrap">OMDb API Key:</span>
                    </div>
                    <input 
                      type="text" 
                      value={apiKey}
                      onChange={handleApiKeyChange}
                      placeholder="Enter your OMDb API Key"
                      className="w-full sm:max-w-xs bg-slate-950 border border-slate-700 focus:border-indigo-500 rounded-lg px-3 py-2 text-sm outline-none transition-all text-slate-100"
                    />
                    <p className="text-xs text-slate-500 w-full sm:w-auto">
                      Saved locally to your browser.
                    </p>
                  </div>
                )}

                {/* --- Unified Player Section --- */}
                <div className="flex flex-col gap-2">
                  <div className="relative w-full bg-black aspect-video flex items-center justify-center rounded-2xl overflow-hidden shadow-2xl border border-slate-800 transition-all">
                    {activeUrl ? (
                      <iframe
                        src={activeUrl}
                        title="Video Player"
                        className="absolute top-0 left-0 w-full h-full border-0"
                        allowFullScreen
                        allow="autoplay; fullscreen"
                        sandbox="allow-scripts allow-same-origin allow-presentation"
                      />
                    ) : (
                      <div className="text-center p-6 flex flex-col items-center">
                        <div className="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center mb-4">
                          <Play size={32} className="text-slate-600 ml-1" />
                        </div>
                        <h3 className="text-lg font-medium text-slate-300">Ready to watch?</h3>
                        <p className="text-slate-500 mt-2 max-w-sm text-sm">
                          Search below, or open your Favorites/History, and click <strong className="text-blue-400">Play</strong> to load the stream.
                        </p>
                      </div>
                    )}
                  </div>
                  {/* Active URL Display */}
                  {activeUrl && (
                    <div className="px-2 text-center sm:text-left flex items-center justify-center sm:justify-start gap-2">
                      <ExternalLink size={12} className="text-slate-500 flex-shrink-0" />
                      <a href={activeUrl} target="_blank" rel="noopener noreferrer" className="text-xs font-mono text-slate-500 hover:text-indigo-400 break-all transition-colors">
                        {activeUrl}
                      </a>
                    </div>
                  )}
                </div>

                {/* --- Navigation Tabs --- */}
                <div className="flex bg-slate-900 rounded-xl p-1 shadow-lg border border-slate-800">
                  <button 
                    onClick={() => setActiveTab('search')} 
                    className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-bold transition-all ${activeTab === 'search' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}
                  >
                    <Search size={16}/> <span className="hidden sm:inline">Search Media</span>
                  </button>
                  <button 
                    onClick={() => setActiveTab('favorites')} 
                    className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-bold transition-all ${activeTab === 'favorites' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}
                  >
                    <Heart size={16} className={activeTab === 'favorites' ? "fill-white" : ""} /> <span className="hidden sm:inline">Favorites</span>
                    {favorites.length > 0 && <span className="ml-1 bg-slate-950 text-[10px] px-1.5 py-0.5 rounded-full">{favorites.length}</span>}
                  </button>
                  <button 
                    onClick={() => setActiveTab('history')} 
                    className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-bold transition-all ${activeTab === 'history' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}
                  >
                    <History size={16}/> <span className="hidden sm:inline">Watch History</span>
                  </button>
                </div>

                {/* --- Tab Content: History --- */}
                {activeTab === 'history' && (
                  <div className="space-y-4 animate-in fade-in duration-300">
                    <div className="flex items-center justify-between px-2">
                      <h2 className="font-bold text-lg">Recent Watches</h2>
                      {historyList.length > 0 && (
                        <button onClick={clearHistory} className="text-xs text-red-400 hover:text-red-300 flex items-center gap-1 transition-colors">
                          <Trash2 size={14}/> Clear History
                        </button>
                      )}
                    </div>

                    {historyList.length === 0 ? (
                      <div className="text-center py-12 text-slate-500 border border-slate-800 border-dashed rounded-2xl">
                        <History size={32} className="mx-auto mb-3 opacity-20" />
                        <p>Your watch history is currently empty.</p>
                      </div>
                    ) : (
                      <div className="space-y-3">
                        {historyList.map(h => (
                          <div key={h.id} className="flex items-center justify-between p-3 sm:p-4 bg-slate-900 border border-slate-800 hover:border-slate-700 rounded-xl transition-all shadow">
                            <div className="flex items-center gap-4 min-w-0">
                              {h.Poster && h.Poster !== 'N/A' ? (
                                <img src={h.Poster} className="w-12 h-16 sm:w-16 sm:h-24 object-cover rounded shadow flex-shrink-0" alt="Poster"/>
                              ) : (
                                <div className="w-12 h-16 sm:w-16 sm:h-24 bg-slate-800 rounded flex items-center justify-center flex-shrink-0"><Film size={20} className="text-slate-600"/></div>
                              )}
                              <div className="flex flex-col min-w-0">
                                <span className="font-bold text-slate-200 line-clamp-1 text-sm sm:text-base">{h.Title}</span>
                                <span className="text-xs sm:text-sm text-slate-400 mt-0.5 line-clamp-1">
                                  {h.Type === 'series' && h.season ? `Season ${h.season} Episode ${h.episode}` : 'Movie'}
                                  {h.epTitle ? ` - ${h.epTitle}` : ''}
                                </span>
                                <span className="text-[10px] text-slate-500 mt-2 flex items-center gap-1">
                                  <Clock size={10}/> {new Date(h.timestamp).toLocaleString()}
                                </span>
                              </div>
                            </div>
                            <div className="flex items-center gap-2 flex-shrink-0 ml-3">
                              <button 
                                onClick={() => playMedia(h, h.season, h.episode, h.epTitle)} 
                                className="p-2.5 sm:px-4 sm:py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-white font-bold text-xs flex items-center gap-2 transition-colors shadow-lg shadow-blue-900/20"
                              >
                                <Play size={16} className="fill-white"/> <span className="hidden sm:inline">Play Again</span>
                              </button>
                              <button 
                                onClick={() => removeHistoryItem(h.id)}
                                className="p-2 sm:p-2.5 text-slate-500 hover:text-red-400 hover:bg-slate-800 rounded-lg transition-colors"
                                title="Remove from history"
                              >
                                <X size={16} />
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {/* --- Tab Content: Search & Favorites Grid View --- */}
                {(activeTab === 'search' || activeTab === 'favorites') && (
                  <div className="animate-in fade-in duration-300">
                    
                    {/* Search Bar (Only in Search Tab) */}
                    {activeTab === 'search' && (
                      <div className="relative mb-6">
                        <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" size={20} />
                        <input 
                          dir="auto"
                          type="text" 
                          placeholder="Search by title (e.g. Breaking Bad) or IMDb ID (e.g. tt0903747)..."
                          value={query}
                          onChange={(e) => setQuery(e.target.value)}
                          className="w-full bg-slate-900 border-2 border-slate-800 focus:border-indigo-500 rounded-2xl pl-12 pr-4 py-4 text-lg outline-none transition-all shadow-lg text-slate-100 placeholder:text-slate-600"
                        />
                      </div>
                    )}

                    {/* Empty States / Loading / Errors */}
                    {activeTab === 'search' && loading && (
                      <div className="flex justify-center items-center py-12">
                        <span className="text-indigo-400 animate-pulse font-medium flex items-center gap-2">
                          <Database className="animate-spin" size={18} /> Cross-referencing global databases...
                        </span>
                      </div>
                    )}
                    
                    {activeTab === 'search' && error && !loading && (
                      <div className="bg-amber-500/10 border border-amber-500/20 text-amber-400 p-4 rounded-xl text-center font-medium">
                        {error}
                      </div>
                    )}

                    {activeTab === 'favorites' && displayItems.length === 0 && (
                      <div className="text-center py-12 text-slate-500 border border-slate-800 border-dashed rounded-2xl mt-4">
                        <Heart size={32} className="mx-auto mb-3 opacity-20" />
                        <p>You haven't added any favorites yet.</p>
                      </div>
                    )}

                    {/* Main Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                      {!loading && displayItems.map((item) => {
                        const isFav = favorites.some(f => f.imdbID === item.imdbID);

                        return (
                          <div key={item.imdbID} className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden hover:border-slate-700 transition-all flex flex-col shadow-lg">
                            
                            {/* Card Header (Poster + Info) */}
                            <div className="flex h-56">
                              <div className="w-1/3 min-w-[140px] bg-slate-950 relative overflow-hidden flex-shrink-0">
                                {item.Poster && item.Poster !== "N/A" ? (
                                  <img src={item.Poster} alt={item.Title} className="w-full h-full object-cover" />
                                ) : (
                                  <div className="w-full h-full flex items-center justify-center text-slate-700 bg-slate-800"><ImageIcon size={32} /></div>
                                )}
                                <div className={`absolute top-2 left-2 backdrop-blur-md border text-[10px] px-2 py-0.5 rounded-full flex items-center gap-1 font-bold uppercase tracking-wider shadow-lg
                                  ${item.Type === 'series' ? 'bg-purple-900/80 border-purple-500/50 text-purple-300' : 'bg-blue-900/80 border-blue-500/50 text-blue-300'}`}>
                                  {item.Type === 'series' ? <Tv size={10} /> : <Film size={10} />}
                                  {item.Type}
                                </div>
                              </div>

                              <div className="p-4 flex flex-col flex-grow">
                                <h3 className="font-bold text-slate-100 leading-tight mb-1 line-clamp-2" title={item.Title}>{item.Title}</h3>
                                <div className="flex items-center gap-3 text-xs text-slate-400 mb-3 font-medium">
                                  <span>{item.Year}</span>
                                  {item.Runtime && item.Runtime !== "N/A" && <span className="flex items-center gap-1"><Clock size={12}/> {item.Runtime}</span>}
                                </div>
                                <p className="text-slate-500 text-xs line-clamp-3 leading-relaxed flex-grow">
                                  {item.Plot && item.Plot !== "N/A" ? item.Plot : "No plot summary available."}
                                </p>

                                {/* Series Action Button */}
                                {item.Type === 'series' && item.totalSeasons && item.totalSeasons !== "N/A" && (
                                  <button 
                                    onClick={() => handleToggleShow(item.imdbID, item.totalSeasons)}
                                    className="mt-3 w-full flex items-center justify-center gap-2 py-2 bg-purple-500/10 hover:bg-purple-500/20 text-purple-400 rounded-lg text-xs font-semibold transition-colors border border-purple-500/20"
                                  >
                                    {expandedShow === item.imdbID ? <ChevronUp size={16}/> : <ChevronDown size={16}/>}
                                    {expandedShow === item.imdbID ? "Hide Episodes" : `View Episodes (${item.totalSeasons} Seasons)`}
                                  </button>
                                )}
                              </div>
                            </div>

                            {/* The IMDb Index Footer & Action Buttons */}
                            <div className="px-4 py-3 border-t border-slate-800 bg-slate-950/50 flex flex-wrap items-center justify-between gap-3">
                              <div className="flex flex-col">
                                <span className="text-[10px] uppercase font-bold text-slate-500 tracking-wider">Universal Index</span>
                                <div className="flex items-center gap-2">
                                  <span className="font-mono text-indigo-400 text-xs">{item.imdbID}</span>
                                  <a href={`https://www.imdb.com/title/${item.imdbID}/`} target="_blank" rel="noopener noreferrer" className="text-slate-500 hover:text-slate-300" title="View on IMDb"><ExternalLink size={12} /></a>
                                </div>
                              </div>
                              
                              <div className="flex items-center gap-2">
                                <button
                                  onClick={() => toggleFavorite(item)}
                                  className={`flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-lg transition-colors text-xs font-bold ${isFav ? 'bg-pink-500/10 text-pink-500 border border-pink-500/20 hover:bg-pink-500/20' : 'bg-slate-800 text-slate-400 hover:text-slate-200 hover:bg-slate-700'}`}
                                >
                                  <Heart size={14} className={isFav ? "fill-current" : ""} /> <span className="hidden sm:inline">{isFav ? 'Saved' : 'Save'}</span>
                                </button>
                                <button 
                                  onClick={() => playMedia(item)}
                                  className="flex items-center gap-1.5 px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors text-xs font-bold shadow-lg shadow-blue-900/20"
                                >
                                  <Play size={14} className="fill-white" /> Play
                                </button>
                              </div>
                            </div>

                            {/* Expanded TV Show Panel */}
                            {expandedShow === item.imdbID && (
                              <div className="bg-slate-950 border-t border-slate-800 animate-in slide-in-from-top-2 p-4">
                                
                                <div className="flex items-center justify-between mb-4 border-b border-slate-800 pb-3">
                                  <span className="text-sm font-bold text-slate-300">Episodes List</span>
                                  <select 
                                    value={activeSeason}
                                    onChange={(e) => {
                                      setActiveSeason(e.target.value);
                                      setExpandedEpisode(null);
                                      fetchEpisodes(item.imdbID, e.target.value);
                                    }}
                                    className="bg-slate-800 border border-slate-700 text-slate-200 text-xs rounded-lg px-2 py-1 outline-none focus:border-purple-500 cursor-pointer"
                                  >
                                    {Array.from({ length: parseInt(item.totalSeasons) }, (_, i) => (
                                      <option key={i + 1} value={i + 1}>Season {i + 1}</option>
                                    ))}
                                  </select>
                                </div>

                                {episodesLoading ? (
                                  <div className="text-center py-6 text-slate-500 text-xs animate-pulse">Fetching indexed episodes from OMDb...</div>
                                ) : (
                                  <div className="space-y-2 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                                    {episodesData && episodesData.length > 0 ? (
                                      episodesData.map((ep) => (
                                        <div key={ep.imdbID} className="flex flex-col p-3 bg-slate-900 rounded-lg border border-slate-800 hover:border-slate-700 transition-colors gap-3">
                                          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                                            <div className="flex items-start sm:items-center gap-3 overflow-hidden">
                                              <span className="text-slate-500 font-mono text-xs w-8 flex-shrink-0 text-center bg-slate-950 py-1 rounded">E{ep.Episode}</span>
                                              <div className="flex flex-col min-w-0">
                                                <span className="text-sm text-slate-200 font-medium line-clamp-1" title={ep.Title}>{ep.Title}</span>
                                                <span className="text-[10px] text-slate-500 mt-0.5 flex items-center gap-1">
                                                  <Calendar size={10} /> {ep.Released !== "N/A" ? ep.Released : "Unknown date"}
                                                </span>
                                              </div>
                                            </div>
                                            <div className="flex items-center justify-between sm:justify-end w-full sm:w-auto gap-3">
                                              <div className="flex items-center gap-2">
                                                <span className="text-[10px] text-slate-500 font-mono hidden md:inline-block">{ep.imdbID}</span>
                                                {ep.imdbRating && ep.imdbRating !== "N/A" && (
                                                  <span className="text-[10px] font-bold text-amber-400 bg-amber-400/10 px-1.5 py-0.5 rounded flex items-center gap-1">
                                                    ★ {ep.imdbRating}
                                                  </span>
                                                )}
                                              </div>
                                              <div className="flex items-center gap-2 flex-shrink-0">
                                                <button 
                                                  onClick={() => handleToggleEpisode(ep.imdbID)}
                                                  className={`p-1.5 rounded transition-colors ${expandedEpisode === ep.imdbID ? 'bg-indigo-500/20 text-indigo-400' : 'bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700'}`}
                                                  title="Episode Info"
                                                >
                                                  <Info size={14} />
                                                </button>
                                                <button 
                                                  onClick={() => playMedia(item, activeSeason, ep.Episode, ep.Title)}
                                                  className="flex items-center justify-center gap-1 px-3 py-1.5 bg-blue-500/10 hover:bg-blue-600 hover:text-white text-blue-400 rounded transition-colors text-[10px] sm:text-xs font-bold uppercase tracking-wider"
                                                >
                                                  <Play size={10} className="fill-current" /> Play
                                                </button>
                                              </div>
                                            </div>
                                          </div>
                                          
                                          {/* Detailed Episode Info Panel */}
                                          {expandedEpisode === ep.imdbID && (
                                            <div className="mt-1 pt-3 border-t border-slate-800/60 text-xs text-slate-400 animate-in slide-in-from-top-1">
                                              {fetchingEpisodeId === ep.imdbID ? (
                                                <div className="flex items-center gap-2 text-indigo-400 py-1">
                                                  <Database size={12} className="animate-spin" /> Retrieving episode details...
                                                </div>
                                              ) : episodeDetailsCache[ep.imdbID] ? (
                                                <div className="space-y-2">
                                                  <p className="leading-relaxed">
                                                    <strong className="text-slate-300 font-medium">Plot: </strong> 
                                                    {episodeDetailsCache[ep.imdbID].Plot && episodeDetailsCache[ep.imdbID].Plot !== "N/A" 
                                                      ? episodeDetailsCache[ep.imdbID].Plot 
                                                      : "No detailed plot available for this episode."}
                                                  </p>
                                                  <div className="flex flex-wrap gap-x-4 gap-y-1.5 text-[10px]">
                                                    {episodeDetailsCache[ep.imdbID].Director && episodeDetailsCache[ep.imdbID].Director !== "N/A" && (
                                                      <span><strong className="text-slate-500">Director:</strong> {episodeDetailsCache[ep.imdbID].Director}</span>
                                                    )}
                                                    {episodeDetailsCache[ep.imdbID].Runtime && episodeDetailsCache[ep.imdbID].Runtime !== "N/A" && (
                                                      <span><strong className="text-slate-500">Runtime:</strong> {episodeDetailsCache[ep.imdbID].Runtime}</span>
                                                    )}
                                                    {episodeDetailsCache[ep.imdbID].Actors && episodeDetailsCache[ep.imdbID].Actors !== "N/A" && (
                                                      <span className="w-full sm:w-auto"><strong className="text-slate-500">Starring:</strong> {episodeDetailsCache[ep.imdbID].Actors}</span>
                                                    )}
                                                  </div>
                                                </div>
                                              ) : (
                                                <p className="text-amber-500/80 py-1">Failed to load episode details.</p>
                                              )}
                                            </div>
                                          )}
                                        </div>
                                      ))
                                    ) : (
                                      <div className="text-center text-xs text-slate-500 py-4">
                                        No episodes found for this season.
                                      </div>
                                    )}
                                  </div>
                                )}
                              </div>
                            )}

                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
