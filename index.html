                    </div>

                    <div className="flex-grow flex flex-col items-center justify-center bg-black pt-14 pb-4 px-0 sm:px-4 overflow-y-auto relative z-10">
                        <div className="w-full aspect-video max-h-[75vh] max-w-6xl mx-auto rounded-lg overflow-hidden shadow-2xl relative">
                            {isRawFile ? (
                                <video ref={videoRef} className="absolute inset-0 w-full h-full bg-black" controls autoPlay playsInline />
                            ) : (
                                <iframe src={activeUrl} className="absolute inset-0 w-full h-full border-0" allowFullScreen allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-presentation allow-forms"></iframe>
                            )}
                        </div>

                        <div className="w-full max-w-6xl mx-auto mt-4 px-4 sm:px-0">
                            <div className="flex items-center gap-3 bg-neutral-900 border border-neutral-800 p-2 sm:px-4 sm:py-3 rounded-lg shadow-lg">
                                <Globe size={18} className="text-gray-500 flex-shrink-0" />
                                <div className="flex-grow min-w-0 overflow-hidden text-ellipsis whitespace-nowrap"><span className="text-xs sm:text-sm text-gray-400 font-mono select-all" dir="ltr">{activeUrl || 'Awaiting Input...'}</span></div>
                                <div className="flex items-center gap-2 flex-shrink-0">
                                    <button onClick={() => { try { const ta = document.createElement("textarea"); ta.value = activeUrl; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch(e){} }} disabled={!activeUrl} className="flex items-center justify-center gap-1.5 bg-neutral-800 hover:bg-neutral-700 disabled:opacity-50 text-white px-3 py-1.5 rounded transition-colors text-xs font-bold">
                                        {copied ? <CheckCheck size={14} className="text-green-400" /> : <Copy size={14} />}<span className="hidden sm:inline">{copied ? 'Copied!' : 'Copy Link'}</span>
                                    </button>
                                    {activeUrl && <a href={activeUrl} target="_blank" className="flex items-center justify-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded transition-colors text-xs font-bold shadow-lg shadow-indigo-900/20"><ExternalLink size={14} /><span className="hidden sm:inline">Open in Tab</span></a>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const HomeView = () => {
            const { favoriteGenre, setSeeAllConfig } = React.useContext(AppContext);
            return (
                <div className="pb-24 animate-in fade-in duration-500">
                    <HeroBanner endpoint="/trending/all/day" />
                    <div className="mt-[-80px] relative z-10">
                        <NewEpisodesRow />
                        <ContinueWatchingRow filterType="all" />
                        {favoriteGenre && <MediaRow title="Recommended for You" url={`/discover/movie?with_genres=${favoriteGenre}&sort_by=popularity.desc`} onSeeAll={setSeeAllConfig} />}
                        {ROW_CONFIGS.home.map(row => <MediaRow key={row.title} title={row.title} url={row.url} onSeeAll={setSeeAllConfig} />)}
                    </div>
                </div>
            );
        };

        const MoviesView = () => {
            const { setSeeAllConfig } = React.useContext(AppContext);
            const [filterGenre, setFilterGenre] = useState('');
            const [filterYear, setFilterYear] = useState('');
            const genres = [
                {id: 28, name: 'Action'}, {id: 12, name: 'Adventure'}, {id: 16, name: 'Animation'},
                {id: 35, name: 'Comedy'}, {id: 80, name: 'Crime'}, {id: 99, name: 'Documentary'},
                {id: 18, name: 'Drama'}, {id: 10751, name: 'Family'}, {id: 14, name: 'Fantasy'},
                {id: 36, name: 'History'}, {id: 27, name: 'Horror'}, {id: 10402, name: 'Music'},
                {id: 9648, name: 'Mystery'}, {id: 10749, name: 'Romance'}, {id: 878, name: 'Sci-Fi'},
                {id: 10770, name: 'TV Movie'}, {id: 53, name: 'Thriller'}, {id: 10752, name: 'War'}, {id: 37, name: 'Western'}
            ];
            const years = Array.from({length: 40}, (_, i) => new Date().getFullYear() - i);
            const isFiltering = filterGenre !== '' || filterYear !== '';

            return (
                <div className="pb-24 animate-in fade-in duration-500 relative">
                    <div className="flex flex-wrap items-center gap-2 px-4 py-3 bg-[#0f0f0f]/95 backdrop-blur-md sticky top-0 z-40 border-b border-gray-800">
                        <Filter size={16} className="text-gray-400" />
                        <select value={filterGenre} onChange={(e) => setFilterGenre(e.target.value)} className="bg-neutral-900 text-white text-xs px-3 py-2 rounded-lg border border-neutral-700 outline-none">
                            <option value="">All Genres</option>
                            {genres.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                        </select>
                        <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="bg-neutral-900 text-white text-xs px-3 py-2 rounded-lg border border-neutral-700 outline-none">
                            <option value="">Any Year</option>
                            {years.map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                        {isFiltering && <button onClick={() => { setFilterGenre(''); setFilterYear(''); }} className="text-xs text-red-400 hover:text-red-300 px-2 font-bold transition-colors">Clear</button>}
                    </div>
                    {isFiltering ? <FilteredGridView type="movie" genre={filterGenre} year={filterYear} /> : (
                        <>
                            <HeroBanner endpoint="/trending/movie/day" />
                            <div className="mt-[-80px] relative z-10">
                                <ContinueWatchingRow filterType="movie" />
                                {ROW_CONFIGS.movies.map(row => <MediaRow key={row.title} title={row.title} url={row.url} onSeeAll={setSeeAllConfig} />)}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const TvView = () => {
            const { setSeeAllConfig } = React.useContext(AppContext);
            const [filterGenre, setFilterGenre] = useState('');
            const [filterYear, setFilterYear] = useState('');
            const genres = [
                {id: 10759, name: 'Action & Adventure'}, {id: 16, name: 'Animation'}, {id: 35, name: 'Comedy'},
                {id: 80, name: 'Crime'}, {id: 99, name: 'Documentary'}, {id: 18, name: 'Drama'},
                {id: 10751, name: 'Family'}, {id: 10762, name: 'Kids'}, {id: 9648, name: 'Mystery'},
                {id: 10763, name: 'News'}, {id: 10764, name: 'Reality'}, {id: 10765, name: 'Sci-Fi & Fantasy'},
                {id: 10766, name: 'Soap'}, {id: 10767, name: 'Talk'}, {id: 10768, name: 'War & Politics'}, {id: 37, name: 'Western'}
            ];
            const years = Array.from({length: 40}, (_, i) => new Date().getFullYear() - i);
            const isFiltering = filterGenre !== '' || filterYear !== '';

            return (
                <div className="pb-24 animate-in fade-in duration-500 relative">
                    <div className="flex flex-wrap items-center gap-2 px-4 py-3 bg-[#0f0f0f]/95 backdrop-blur-md sticky top-0 z-40 border-b border-gray-800">
                        <Filter size={16} className="text-gray-400" />
                        <select value={filterGenre} onChange={(e) => setFilterGenre(e.target.value)} className="bg-neutral-900 text-white text-xs px-3 py-2 rounded-lg border border-neutral-700 outline-none">
                            <option value="">All Genres</option>
                            {genres.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                        </select>
                        <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="bg-neutral-900 text-white text-xs px-3 py-2 rounded-lg border border-neutral-700 outline-none">
                            <option value="">Any Year</option>
                            {years.map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                        {isFiltering && <button onClick={() => { setFilterGenre(''); setFilterYear(''); }} className="text-xs text-red-400 hover:text-red-300 px-2 font-bold transition-colors">Clear</button>}
                    </div>
                    {isFiltering ? <FilteredGridView type="tv" genre={filterGenre} year={filterYear} /> : (
                        <>
                            <HeroBanner endpoint="/trending/tv/day" />
                            <div className="mt-[-80px] relative z-10">
                                <ContinueWatchingRow filterType="tv" />
                                {ROW_CONFIGS.tv.map(row => <MediaRow key={row.title} title={row.title} url={row.url} onSeeAll={setSeeAllConfig} />)}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const SearchView = () => {
            const { tmdbKey, dbLanguage, hideAdult, openDetails } = React.useContext(AppContext);
            const [searchQuery, setSearchQuery] = useState('');
            const [results, setResults] = useState([]);
            const [topSearches, setTopSearches] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => { fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${tmdbKey}&language=${dbLanguage}`).then(res => res.json()).then(data => setTopSearches((data.results || []).filter(i => hideAdult ? !i.adult : true))); }, [tmdbKey, dbLanguage, hideAdult]);

            useEffect(() => {
                if (!searchQuery.trim()) { setResults([]); return; }
                setLoading(true);
                const handler = setTimeout(() => {
                    fetch(`https://api.themoviedb.org/3/search/multi?api_key=${tmdbKey}&language=${dbLanguage}&query=${encodeURIComponent(searchQuery)}&include_adult=${!hideAdult}`)
                        .then(res => res.json()).then(data => { setResults((data.results || []).filter(i => i.media_type !== 'person' && i.backdrop_path && (hideAdult ? !i.adult : true))); setLoading(false); });
                }, 500);
                return () => clearTimeout(handler);
            }, [searchQuery, tmdbKey, dbLanguage, hideAdult]);

            const displayList = searchQuery.trim() ? results : topSearches;

            return (
                <div className="pt-12 pb-24 px-4 max-w-2xl mx-auto min-h-screen animate-in fade-in">
                    <div className="bg-[#2b2b2b] flex items-center px-4 py-3 rounded-md mb-6 sticky top-4 z-20 shadow-xl">
                        <Search size={20} className="text-gray-400 mr-3" />
                        <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search for a show, movie..." className="bg-transparent text-white w-full outline-none" dir="auto" />
                        {searchQuery && <button onClick={() => setSearchQuery('')}><X size={20} className="text-gray-400"/></button>}
                    </div>
                    <h2 className="text-xl font-bold mb-4">{searchQuery ? 'Results' : 'Top Searches'}</h2>
                    {loading ? <LoadingSpinner/> : (
                        <div className="space-y-4">
                            {displayList.map(item => (
                                <div key={item.id} tabIndex={0} onClick={() => openDetails(item)} onKeyDown={(e) => e.key === 'Enter' && openDetails(item)} className="flex items-center gap-4 cursor-pointer group hover:bg-[#1e1e1e] focus:bg-[#1e1e1e] focus:ring-2 focus:ring-indigo-500 outline-none p-2 rounded-lg transition-colors">
                                    <div className="relative w-32 aspect-video rounded overflow-hidden bg-neutral-800 flex-shrink-0">
                                        <img src={`https://image.tmdb.org/t/p/w300${item.backdrop_path || item.poster_path}`} className="w-full h-full object-cover" />
                                        <div className="absolute top-1 right-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1 backdrop-blur-md"><Star size={8} className="fill-amber-400 text-amber-400" /> {item.vote_average ? item.vote_average.toFixed(1) : 'NR'}</div>
                                    </div>
                                    <span className="font-bold text-sm sm:text-base flex-grow line-clamp-2">{item.title || item.name}</span>
                                    <button className="flex-shrink-0 p-2"><PlayCircle size={28} className="text-white group-hover:scale-110 transition-transform" /></button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const ProfileView = () => {
            const { 
                historyList, setHistoryList, customLists, setCustomLists, favorites, openDetails, 
                hideAdult, setHideAdult, selectedServerId, setSelectedServerId,
                servers, setServers, 
                tmdbKey, setTmdbKey, setWatchedEpisodes, launchPlayer, notifications, loadingNotifications 
            } = React.useContext(AppContext);

            const [activeProfileTab, setActiveProfileTab] = useState('watchlist');
            const [newListMode, setNewListMode] = useState(false);
            const [newListName, setNewListName] = useState('');
            const [showNotif, setShowNotif] = useState(false);
            
            const [customServerName, setCustomServerName] = useState('');
            const [customServerUrl, setCustomServerUrl] = useState('');

            const stats = useMemo(() => {
                let totalMinutes = 0;
                let typeCount = { tv: 0, movie: 0 };
                let genres = {};
                historyList.forEach(item => {
                    totalMinutes += item.runtime || (item.Type === 'movie' ? 120 : 45);
                    typeCount[item.Type] = (typeCount[item.Type] || 0) + 1;
                    if (item.genres) item.genres.forEach(g => { genres[g] = (genres[g] || 0) + 1; });
                });
                const totalHours = Math.floor(totalMinutes / 60);
                const totalDays = (totalHours / 24).toFixed(1);
                const topGenres = Object.entries(genres).sort((a,b) => b[1] - a[1]).slice(0, 3).map(g => GENRE_MAP[g[0]] || "Unknown");
                return { totalHours, totalDays, typeCount, topGenres };
            }, [historyList]);

            const handleShareList = (list) => {
                const text = `Check out my list "${list.name}" on Universal Index Player:\n\n` + list.items.map((i, idx) => `${idx + 1}. ${i.Title} (${i.Type})`).join('\n');
                try {
                    const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
                    alert("List copied to clipboard! Share it with friends.");
                } catch(e) {}
            };

            const createCustomList = (name) => {
                if (!name.trim()) return;
                setCustomLists(prev => [...prev, { id: Date.now().toString(), name, items: [] }]);
            };

            const handleAddServer = () => {
                if (!customServerName.trim() || !customServerUrl.trim()) return;
                
                let finalTemplate = customServerUrl.trim();
                // Auto-format the URL if the user just provided a domain/link
                if (!finalTemplate.includes('{tmdb}') && !finalTemplate.includes('{imdb}')) {
                    const domain = finalTemplate.replace(/^(https?:\/\/)/, '').replace(/\/$/, '');
                    finalTemplate = `https://${domain}/embed/{type}/{tmdb}/{s}/{e}`;
                }

                setServers(prev => [...prev, { id: 'server_' + Date.now(), name: customServerName, urlTemplate: finalTemplate }]);
                setCustomServerName('');
                setCustomServerUrl('');
            };

            const handleRemoveServer = (id) => {
                setServers(prev => {
                    const remaining = prev.filter(s => s.id !== id);
                    if (selectedServerId === id) {
                        setSelectedServerId(remaining.length > 0 ? remaining[0].id : '');
                    }
                    return remaining;
                });
            };

            const handleResetServers = () => {
                setServers(DEFAULT_SERVERS);
                setSelectedServerId(DEFAULT_SERVERS[0].id);
            };

            return (
                <div className="pt-10 pb-24 max-w-4xl mx-auto min-h-screen animate-in fade-in">
                    <div className="px-6 flex items-center justify-between mb-8">
                        <div className="flex items-center gap-4">
                            <div className="w-16 h-16 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shadow-lg"><User size={32} className="text-white"/></div>
                            <div><h1 className="text-2xl font-bold">My Library</h1><p className="text-sm text-gray-400">{historyList.length} items watched</p></div>
                        </div>
                        <div className="flex gap-2">
                            {/* Functional Notification Dropdown */}
                            <div className="relative">
                                <button onClick={() => setShowNotif(!showNotif)} className="p-2 bg-[#1e1e1e] rounded-full hover:bg-neutral-800 text-amber-400 relative" title="Release Alerts">
                                    <Bell size={20} />
                                    {notifications.length > 0 && <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-[#0f0f0f]"></span>}
                                </button>
                                {showNotif && (
                                    <>
                                        <div className="fixed inset-0 z-40" onClick={() => setShowNotif(false)}></div>
                                        <div className="absolute top-full right-0 mt-2 w-72 bg-[#1e1e1e] border border-gray-700 rounded-xl shadow-2xl z-50 overflow-hidden">
                                            <div className="p-3 border-b border-gray-700 font-bold text-white flex justify-between items-center">
                                                Notifications
                                                <span className="text-[10px] bg-red-500 px-2 py-0.5 rounded-full">{notifications.length} New</span>
                                            </div>
                                            <div className="max-h-80 overflow-y-auto hide-scrollbar">
                                                {loadingNotifications ? (
                                                    <div className="p-4 text-center text-gray-400 text-xs">Loading...</div>
                                                ) : notifications.length === 0 ? (
                                                    <div className="p-4 text-center text-gray-400 text-xs">No new episodes</div>
                                                ) : (
                                                    notifications.map(n => (
                                                        <div key={n.id} onClick={() => { openDetails(n); setShowNotif(false); }} className="p-3 border-b border-gray-800/50 hover:bg-neutral-800 cursor-pointer flex gap-3 text-left transition-colors">
                                                            <img src={n.Poster} className="w-10 h-14 object-cover rounded shadow" />
                                                            <div className="flex flex-col justify-center min-w-0">
                                                                <div className="text-sm font-bold text-white line-clamp-1">{n.Title}</div>
                                                                <div className="text-xs text-red-400 font-medium">S{n.newEpInfo.season_number} E{n.newEpInfo.episode_number}</div>
                                                                <div className="text-[10px] text-gray-500">{new Date(n.newEpInfo.air_date).toLocaleDateString()}</div>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                            <button onClick={() => setActiveProfileTab('settings')} className={`p-2 rounded-full transition-colors ${activeProfileTab === 'settings' ? 'bg-indigo-600 text-white' : 'bg-[#1e1e1e] hover:bg-neutral-800 text-gray-400'}`}><Settings size={20}/></button>
                        </div>
                    </div>

                    <div className="px-6 flex gap-4 mb-8 border-b border-gray-800 pb-2 overflow-x-auto hide-scrollbar">
                        <button onClick={() => setActiveProfileTab('watchlist')} className={`pb-2 font-bold whitespace-nowrap outline-none ${activeProfileTab === 'watchlist' ? 'text-white border-b-2 border-indigo-500' : 'text-gray-500'}`}>Watchlist</button>
                        <button onClick={() => setActiveProfileTab('lists')} className={`pb-2 font-bold whitespace-nowrap outline-none ${activeProfileTab === 'lists' ? 'text-white border-b-2 border-indigo-500' : 'text-gray-500'}`}>Custom Lists</button>
                        <button onClick={() => setActiveProfileTab('stats')} className={`pb-2 font-bold whitespace-nowrap outline-none ${activeProfileTab === 'stats' ? 'text-white border-b-2 border-indigo-500' : 'text-gray-500'}`}>Viewing Stats</button>
                        <button onClick={() => setActiveProfileTab('history')} className={`pb-2 font-bold whitespace-nowrap outline-none ${activeProfileTab === 'history' ? 'text-white border-b-2 border-indigo-500' : 'text-gray-500'}`}>History</button>
                    </div>

                    <div className="px-6">
                        {activeProfileTab === 'watchlist' && (
                            <div className="animate-in fade-in">
                                {favorites.length === 0 ? (
                                    <div className="text-center py-12 text-gray-500 bg-[#181818] rounded-xl border border-gray-800"><Heart size={32} className="mx-auto mb-3 opacity-20" /><p>Your watchlist is empty.</p></div>
                                ) : (
                                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
                                        {favorites.map(item => (
                                            <div key={item.id} onClick={() => openDetails(item)} className="cursor-pointer transition-transform hover:scale-105">
                                                <img src={item.Poster} className="w-full aspect-[2/3] object-cover rounded-md shadow-lg" />
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeProfileTab === 'lists' && (
                            <div className="animate-in fade-in space-y-6">
                                {newListMode ? (
                                    <div className="bg-[#181818] p-4 rounded-xl border border-gray-800 flex gap-3">
                                        <input type="text" autoFocus value={newListName} onChange={e => setNewListName(e.target.value)} placeholder="List Name (e.g. Anime)" className="bg-neutral-800 px-4 py-2 rounded outline-none flex-grow" />
                                        <button onClick={() => { createCustomList(newListName); setNewListMode(false); setNewListName(''); }} className="bg-indigo-600 px-4 py-2 rounded font-bold">Create</button>
                                        <button onClick={() => setNewListMode(false)} className="bg-neutral-700 px-4 py-2 rounded">Cancel</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setNewListMode(true)} className="w-full py-4 border-2 border-dashed border-gray-700 rounded-xl text-gray-400 hover:text-white hover:border-indigo-500 flex justify-center items-center gap-2 transition-colors font-bold"><Plus size={20}/> Create New List</button>
                                )}

                                {customLists.map(list => (
                                    <div key={list.id} className="bg-[#181818] rounded-xl border border-gray-800 overflow-hidden shadow-lg">
                                        <div className="p-4 bg-neutral-900 border-b border-gray-800 flex justify-between items-center">
                                            <h3 className="font-bold text-lg">{list.name} <span className="text-gray-500 text-sm font-normal">({list.items.length})</span></h3>
                                            <div className="flex gap-2">
                                                <button onClick={() => handleShareList(list)} className="p-2 bg-neutral-800 hover:bg-neutral-700 rounded text-indigo-400" title="Copy to share"><Share2 size={16}/></button>
                                                <button onClick={() => setCustomLists(prev => prev.filter(l => l.id !== list.id))} className="p-2 bg-neutral-800 hover:bg-red-900/40 rounded text-red-400" title="Delete List"><Trash2 size={16}/></button>
                                            </div>
                                        </div>
                                        <div className="p-4 flex overflow-x-auto gap-3 hide-scrollbar">
                                            {list.items.length === 0 ? <p className="text-sm text-gray-500 py-4">No items yet. Add them from a movie's details page.</p> : 
                                                list.items.map(item => (
                                                    <img key={item.id} onClick={() => openDetails(item)} src={item.Poster} className="w-24 aspect-[2/3] object-cover rounded cursor-pointer hover:opacity-80 transition-opacity" />
                                                ))
                                            }
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeProfileTab === 'stats' && (
                            <div className="animate-in fade-in space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-gradient-to-br from-indigo-900/40 to-[#181818] p-5 rounded-xl border border-indigo-500/20">
                                        <Clock size={24} className="text-indigo-400 mb-2"/>
                                        <p className="text-sm text-gray-400 font-medium">Total Watch Time</p>
                                        <h2 className="text-3xl font-extrabold mt-1">{stats.totalHours} <span className="text-lg font-medium text-gray-500">hrs</span></h2>
                                        <p className="text-xs text-indigo-300 mt-1">Approx. {stats.totalDays} days</p>
                                    </div>
                                    <div className="bg-gradient-to-br from-purple-900/40 to-[#181818] p-5 rounded-xl border border-purple-500/20">
                                        <PieChart size={24} className="text-purple-400 mb-2"/>
                                        <p className="text-sm text-gray-400 font-medium">Media Preference</p>
                                        <div className="flex justify-between items-end mt-2">
                                            <div><span className="text-xl font-bold text-white">{stats.typeCount.movie}</span> <span className="text-xs text-gray-500">Movies</span></div>
                                            <div><span className="text-xl font-bold text-white">{stats.typeCount.tv}</span> <span className="text-xs text-gray-500">Shows</span></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-[#181818] p-5 rounded-xl border border-gray-800">
                                    <h3 className="font-bold text-gray-300 mb-4 flex items-center gap-2"><BarChart2 size={18}/> Top Genres</h3>
                                    {stats.topGenres.length === 0 ? <p className="text-sm text-gray-500">Watch more content to see stats.</p> : (
                                        <div className="space-y-3">
                                            {stats.topGenres.map((g, i) => (
                                                <div key={i} className="flex items-center gap-3">
                                                    <div className="w-8 h-8 rounded bg-neutral-800 flex items-center justify-center font-bold text-gray-400">#{i+1}</div>
                                                    <div className="flex-grow bg-neutral-800 h-2 rounded-full overflow-hidden"><div className="bg-indigo-500 h-full" style={{width: `${100 - (i*20)}%`}}></div></div>
                                                    <div className="w-24 text-right text-sm font-bold">{g}</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeProfileTab === 'history' && (
                            <div className="animate-in fade-in">
                                {historyList.length === 0 ? (
                                    <div className="text-center py-12 text-gray-500 bg-[#181818] rounded-xl border border-gray-800"><History size={32} className="mx-auto mb-3 opacity-20" /><p>History is empty.</p></div>
                                ) : (
                                    <div className="space-y-3">
                                        {historyList.map(h => (
                                            <div key={h.historyId} className="flex items-center p-3 bg-[#181818] border border-gray-800 rounded-xl">
                                                <img src={h.Poster} className="w-12 h-16 object-cover rounded shadow mr-4" />
                                                <div className="flex flex-col flex-grow">
                                                    <span className="font-bold text-sm">{h.Title}</span>
                                                    <span className="text-xs text-gray-400">{h.Type === 'tv' ? `S${h.season} E${h.episode}` : 'Movie'}</span>
                                                    <span className="text-[10px] text-gray-500 mt-1">{new Date(h.timestamp).toLocaleDateString()}</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => launchPlayer(h, h.season, h.episode, h.epTitle)} className="p-2 bg-indigo-600 hover:bg-indigo-500 rounded text-white"><Play size={16}/></button>
                                                    <button onClick={() => setHistoryList(prev => prev.filter(item => item.historyId !== h.historyId))} className="p-2 bg-neutral-800 hover:bg-neutral-700 rounded text-red-400"><Trash2 size={16}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeProfileTab === 'settings' && (
                            <div className="animate-in fade-in space-y-6">
                                <div className="bg-[#181818] p-4 rounded-xl border border-gray-800 flex justify-between items-center">
                                    <div>
                                        <span className="font-bold text-sm block">Safe Search (+18)</span>
                                        <span className="text-xs text-gray-400">Hide adult content and explicit TMDB results.</span>
                                    </div>
                                    <button onClick={() => setHideAdult(!hideAdult)} className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-[#181818] ${hideAdult ? 'bg-indigo-500' : 'bg-gray-600'}`}>
                                        <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${hideAdult ? 'translate-x-6' : 'translate-x-1'}`} />
                                    </button>
                                </div>

                                <div className="bg-[#181818] p-4 rounded-xl border border-gray-800">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-base font-bold text-white flex items-center gap-2"><Server size={18} className="text-indigo-400"/> Servers</h2>
                                        <button onClick={handleResetServers} className="text-xs text-indigo-400 hover:text-indigo-300 font-bold transition-colors">Reset to Default</button>
                                    </div>
                                    
                                    <div className="space-y-3 mb-4">
                                        <input type="text" placeholder="Server Name (e.g. StreamIMDb)" value={customServerName} onChange={e => setCustomServerName(e.target.value)} className="w-full bg-[#2b2b2b] px-3 py-2 rounded outline-none text-sm" />
                                        <input type="text" placeholder="Server Link (e.g. streamimdb.ru)" value={customServerUrl} onChange={e => setCustomServerUrl(e.target.value)} className="w-full bg-[#2b2b2b] px-3 py-2 rounded outline-none text-sm font-mono" />
                                        <p className="text-[10px] text-gray-500 mt-1 leading-relaxed">
                                            Just enter the domain link (e.g. <span className="font-mono text-indigo-400">streamimdb.ru</span>) and the app will do the rest!<br/>
                                            Or, use advanced placeholders: <code className="text-indigo-400">{'{tmdb}'}</code>, <code className="text-indigo-400">{'{type}'}</code>, <code className="text-indigo-400">{'{s}'}</code>, <code className="text-indigo-400">{'{e}'}</code>.
                                        </p>
                                        <button onClick={handleAddServer} className="w-full bg-indigo-600 hover:bg-indigo-500 py-2 rounded font-bold text-sm transition-colors mt-2">Add Server</button>
                                    </div>
                                    
                                    {servers.length > 0 && (
                                        <div className="mt-4 space-y-2 border-t border-gray-800 pt-4">
                                            <h3 className="text-xs font-bold text-gray-400 uppercase">Saved Servers</h3>
                                            {servers.map(server => (
                                                <div key={server.id} className="flex justify-between items-center bg-[#2b2b2b] p-2 rounded">
                                                    <div className="flex flex-col overflow-hidden mr-2">
                                                        <span className="text-sm font-bold text-white truncate">{server.name}</span>
                                                        <span className="text-[10px] text-gray-400 truncate font-mono">{server.urlTemplate}</span>
                                                    </div>
                                                    <button onClick={() => handleRemoveServer(server.id)} className="p-1.5 bg-red-900/40 hover:bg-red-600 text-red-500 hover:text-white rounded transition-colors flex-shrink-0">
                                                        <Trash2 size={14}/>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="bg-[#181818] p-4 rounded-xl border border-gray-800">
                                    <label className="text-sm font-bold text-gray-400 mb-2 block">TMDB API Key</label>
                                    <input type="text" value={tmdbKey} onChange={e => setTmdbKey(e.target.value)} className="w-full bg-[#2b2b2b] px-3 py-2 rounded outline-none" />
                                </div>
                                <button onClick={() => { setHistoryList([]); setWatchedEpisodes({}); }} className="w-full bg-red-600/20 text-red-500 py-3 rounded-xl font-bold border border-red-500/20">Wipe All History & Stats Data</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            // State
            const [tmdbKey, setTmdbKey] = useState(() => localStorage.getItem('vaTmdbKey') || '15d2ea6d0dc1d476efbca3eba2b9bbfb');
            const [selectedServerId, setSelectedServerId] = useState(() => localStorage.getItem('vaServer') || 'streamimdb');
            const [dbLanguage, setDbLanguage] = useState(() => localStorage.getItem('vaLanguage') || 'en-US');
            const isRTL = dbLanguage === 'ar'; // Fix for ReferenceError
            
            const [servers, setServers] = useState(() => { 
                try { 
                    const saved = localStorage.getItem('vaServers');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        return parsed.length > 0 ? parsed : DEFAULT_SERVERS;
                    }
                    const legacyCustom = localStorage.getItem('vaCustomServers');
                    if (legacyCustom) {
                        return [...DEFAULT_SERVERS, ...JSON.parse(legacyCustom)];
                    }
                    return DEFAULT_SERVERS; 
                } catch(e) { return DEFAULT_SERVERS; } 
            });

            const [favorites, setFavorites] = useState(() => { try { return JSON.parse(localStorage.getItem('vaFavorites')) || []; } catch(e) { return []; } });
            const [historyList, setHistoryList] = useState(() => { try { return JSON.parse(localStorage.getItem('vaHistory')) || []; } catch(e) { return []; } });
            const [watchedEpisodes, setWatchedEpisodes] = useState(() => { try { return JSON.parse(localStorage.getItem('vaWatched')) || {}; } catch(e) { return {}; } });
            const [customLists, setCustomLists] = useState(() => { try { return JSON.parse(localStorage.getItem('vaCustomLists')) || []; } catch(e) { return []; } });
            const [hideAdult, setHideAdult] = useState(() => { try { const saved = localStorage.getItem('vaHideAdult'); return saved !== null ? JSON.parse(saved) : true; } catch(e) { return true; } });

            const [activeTab, setActiveTab] = useState('home'); 
            const [seeAllConfig, setSeeAllConfig] = useState(null); 
            const [selectedMedia, setSelectedMedia] = useState(null); 
            const [activePlayerMedia, setActivePlayerMedia] = useState(null); 

            // Storage Sync
            useEffect(() => localStorage.setItem('vaFavorites', JSON.stringify(favorites)), [favorites]);
            useEffect(() => localStorage.setItem('vaHistory', JSON.stringify(historyList)), [historyList]);
            useEffect(() => localStorage.setItem('vaWatched', JSON.stringify(watchedEpisodes)), [watchedEpisodes]);
            useEffect(() => localStorage.setItem('vaCustomLists', JSON.stringify(customLists)), [customLists]);
            useEffect(() => localStorage.setItem('vaHideAdult', JSON.stringify(hideAdult)), [hideAdult]);
            useEffect(() => localStorage.setItem('vaServer', selectedServerId), [selectedServerId]);
            useEffect(() => localStorage.setItem('vaTmdbKey', tmdbKey), [tmdbKey]);
            useEffect(() => localStorage.setItem('vaLanguage', dbLanguage), [dbLanguage]);
            useEffect(() => localStorage.setItem('vaServers', JSON.stringify(servers)), [servers]);

            // Notifications
            const [notifications, setNotifications] = useState([]);
            const [loadingNotifications, setLoadingNotifications] = useState(true);

            useEffect(() => {
                const fetchNewEpisodes = async () => {
                    setLoadingNotifications(true);
                    try {
                        const tvShows = new Map();
                        favorites.forEach(item => { if (item.Type === 'tv' || item.Type === 'series') tvShows.set(item.id, item); });
                        customLists.forEach(list => list.items.forEach(item => { if (item.Type === 'tv' || item.Type === 'series') tvShows.set(item.id, item); }));

                        if (tvShows.size === 0) {
                            setNotifications([]);
                            setLoadingNotifications(false);
                            return;
                        }
                        const promises = Array.from(tvShows.keys()).map(id =>
                            fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${tmdbKey}&language=${dbLanguage}`).then(res => res.ok ? res.json() : null)
                        );
                        const details = await Promise.all(promises);
                        const newEpsList = [];
                        const sixtyDaysAgo = new Date(); sixtyDaysAgo.setDate(sixtyDaysAgo.getDate() - 60);
                        const today = new Date();

                        details.forEach(show => {
                            if (!show || !show.last_episode_to_air) return;
                            const lastEp = show.last_episode_to_air;
                            if (!lastEp.air_date) return;
                            const airDate = new Date(lastEp.air_date);
                            if (airDate >= sixtyDaysAgo && airDate <= today) {
                                const isWatched = watchedEpisodes[show.id]?.[lastEp.season_number]?.includes(lastEp.episode_number);
                                if (!isWatched) {
                                    newEpsList.push({
                                        ...tvShows.get(show.id), Title: show.name,
                                        backdrop: show.backdrop_path ? `https://image.tmdb.org/t/p/w780${show.backdrop_path}` : null,
                                        Poster: show.poster_path ? `https://image.tmdb.org/t/p/w500${show.poster_path}` : null,
                                        newEpInfo: lastEp
                                    });
                                }
                            }
                        });
                        newEpsList.sort((a, b) => new Date(b.newEpInfo.air_date) - new Date(a.newEpInfo.air_date));
                        setNotifications(newEpsList);
                    } catch (e) { }
                    setLoadingNotifications(false);
                };
                fetchNewEpisodes();
            }, [favorites, customLists, watchedEpisodes, tmdbKey, dbLanguage]);

            const favoriteGenre = useMemo(() => {
                const genreCounts = {};
                historyList.forEach(item => { if (item.genres && Array.isArray(item.genres)) { item.genres.forEach(gId => { genreCounts[gId] = (genreCounts[gId] || 0) + 1; }); } });
                const sorted = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]);
                return sorted.length > 0 ? sorted[0][0] : null;
            }, [historyList]);

            // Handlers
            const openDetails = (media) => setSelectedMedia(media);
            const closeDetails = () => setSelectedMedia(null);
            
            // Tracks which specific TV episodes you have finished
            const markEpisodeWatched = (tmdbId, seasonNum, epNum, isWatched = true) => {
                setWatchedEpisodes(prev => {
                    const next = { ...prev };
                    if (!next[tmdbId]) next[tmdbId] = {};
                    next[tmdbId] = { ...next[tmdbId] };
                    if (!next[tmdbId][seasonNum]) next[tmdbId][seasonNum] = [];
                    next[tmdbId][seasonNum] = [...next[tmdbId][seasonNum]];
                    
                    if (isWatched && !next[tmdbId][seasonNum].includes(epNum)) {
                        next[tmdbId][seasonNum].push(epNum);
                    } else if (!isWatched) {
                        next[tmdbId][seasonNum] = next[tmdbId][seasonNum].filter(e => e !== epNum);
                    }
                    return next;
                });
            };

            // Runs when you click "Play" on a TMDB Movie or TV Show
            const launchPlayer = (item, season = null, episode = null, epTitle = null, fullDetails = null) => {
                const type = item.media_type || item.Type || (item.name ? 'tv' : 'movie');
                
                // 1. Open the Video Player Overlay
                setActivePlayerMedia({
                    tmdbId: item.id, 
                    imdbId: item.imdbID || item.external_ids?.imdb_id || fullDetails?.external_ids?.imdb_id,
                    type: type === 'series' ? 'tv' : type, 
                    season, 
                    episode,
                    title: item.title || item.name || item.Title, 
                    originalLanguage: item.original_language || item.OriginalLanguage
                });

                // 2. Mark episode as watched if it's a TV Show
                if (type === 'tv' || type === 'series') {
                    markEpisodeWatched(item.id, season, episode, true);
                }

                // 3. Create the History Record
                const histId = `${item.id}-${season || '0'}-${episode || '0'}`;
                const runtime = fullDetails?.runtime || (fullDetails?.episode_run_time?.[0]) || (type === 'movie' ? 120 : 45);
                const genres = fullDetails?.genres?.map(g => g.id) || item.genre_ids || [];

                const newRecord = {
                    historyId: histId, 
                    id: item.id, 
                    imdbID: item.imdbID || item.external_ids?.imdb_id,
                    Title: item.title || item.name || item.Title, 
                    Type: type,
                    Poster: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster,
                    backdrop: item.backdrop_path ? `https://image.tmdb.org/t/p/w780${item.backdrop_path}` : item.backdrop,
                    season, 
                    episode, 
                    epTitle, 
                    timestamp: Date.now(), 
                    runtime, 
                    genres,
                    source: item.source, // Preserve custom source tags
                    icon: item.icon // Preserve custom icon tags
                };

                // 4. Save to History (Putting newest at the top, removing older duplicates, max 500 items)
                setHistoryList(prev => [newRecord, ...prev.filter(h => h.historyId !== histId)].slice(0, 500));
                closeDetails();
            };

            const toggleFavorite = (item) => {
                setFavorites(prev => {
                    if (prev.some(f => f.id === item.id)) return prev.filter(f => f.id !== item.id);
                    return [{
                        id: item.id, Title: item.title || item.name, Type: item.media_type || (item.name ? 'tv' : 'movie'),
                        Poster: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster,
                        backdrop: item.backdrop_path ? `https://image.tmdb.org/t/p/w780${item.backdrop_path}` : item.backdrop,
                    }, ...prev];
                });
            };

            const toggleItemInList = (listId, item) => {
                setCustomLists(prev => prev.map(list => {
                    if (list.id !== listId) return list;
                    const exists = list.items.some(i => i.id === item.id);
                    let newItems = exists ? list.items.filter(i => i.id !== item.id) : [...list.items, {
                        id: item.id, Title: item.title || item.name || item.Title, Type: item.media_type || (item.name ? 'tv' : 'movie'),
                        Poster: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster,
                        backdrop: item.backdrop_path ? `https://image.tmdb.org/t/p/w780${item.backdrop_path}` : item.backdrop
                    }];
                    return { ...list, items: newItems };
                }));
            };

            const contextValue = {
                tmdbKey, setTmdbKey, dbLanguage, setDbLanguage, hideAdult, setHideAdult,
                selectedServerId, setSelectedServerId, servers, setServers,
                favorites, setFavorites, historyList, setHistoryList, watchedEpisodes, setWatchedEpisodes, customLists, setCustomLists,
                activeTab, setActiveTab, seeAllConfig, setSeeAllConfig, selectedMedia, setSelectedMedia, activePlayerMedia, setActivePlayerMedia,
                openDetails, closeDetails, launchPlayer, toggleFavorite, toggleItemInList, markEpisodeWatched,
                notifications, loadingNotifications, favoriteGenre, isRTL
            };

            return (
                <AppContext.Provider value={contextValue}>
                    <div className="relative w-full h-full min-h-screen pb-20 bg-[#0f0f0f]">
                        {seeAllConfig ? (
                            <SeeAllView config={seeAllConfig} onBack={() => setSeeAllConfig(null)} />
                        ) : (
                            <>
                                {activeTab === 'home' && <HomeView />}
                                {activeTab === 'movies' && <MoviesView />}
                                {activeTab === 'tv' && <TvView />}
                                {activeTab === 'search' && <SearchView />}
                                {activeTab === 'profile' && <ProfileView />}
                            </>
                        )}

                        <div className="fixed bottom-0 left-0 right-0 bg-[#0f0f0f]/95 backdrop-blur-md border-t border-white/10 px-6 py-3 z-40">
                            <div className="max-w-md mx-auto flex justify-between items-center">
                                {[
                                    { id: 'home', icon: Home, label: 'Home' },
                                    { id: 'movies', icon: Film, label: 'Movies' },
                                    { id: 'tv', icon: Tv, label: 'TV Shows' },
                                    { id: 'search', icon: Search, label: 'Search' },
                                    { id: 'profile', icon: User, label: 'My Library' }
                                ].map(tab => {
                                    const Icon = tab.icon;
                                    const isActive = activeTab === tab.id;
                                    return (
                                        <button key={tab.id} onClick={() => {setActiveTab(tab.id); setSeeAllConfig(null); window.scrollTo(0,0);}} className={`flex flex-col items-center gap-1 focus:outline-none focus:text-indigo-400 focus:scale-110 ${isActive ? 'text-white' : 'text-gray-500 hover:text-gray-300'} transition-all`}>
                                            <Icon size={22} className={isActive ? 'stroke-current' : ''} />
                                            <span className="text-[9px] font-medium">{tab.label}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {selectedMedia && <DetailsModal media={selectedMedia} onClose={closeDetails} />}
                        {activePlayerMedia && <PlayerOverlay />}
                    </div>
                </AppContext.Provider>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
