<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Index Player</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide scrollbars for horizontal rows */
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        .hero-gradient {
            background: linear-gradient(to top, #0f0f0f 0%, rgba(15,15,15,0.8) 20%, transparent 60%);
        }
        
        .modal-gradient {
            background: linear-gradient(to top, #171717 0%, #171717 80%, transparent 100%);
        }

        /* Smooth image loading */
        img { transition: opacity 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { Play, Search, Film, Tv, Settings, Heart, History, Trash2, X, Server, ChevronDown, ChevronRight, PlayCircle, AlertCircle, Globe, Star, Cast, Info, Plus, Check, MonitorPlay, Home, MoreVertical, ArrowLeft } from 'https://esm.sh/lucide-react@0.292.0';

        // --- Configurations ---
        const SERVERS = [
          { id: 'vaplayer', name: 'VAPlayer', getUrl: (t, tmdb, imdb, s, e) => `https://vaplayer.ru/embed/${t}/${imdb || tmdb}${t==='tv'&&s&&e?`?s=${s}&e=${e}`:''}` },
          { id: 'autoembed', name: 'AutoEmbed', getUrl: (t, tmdb, imdb, s, e) => `https://autoembed.to/${t}/tmdb/${tmdb}${t==='tv'&&s&&e?`-${s}-${e}`:''}` },
          { id: 'smashy', name: 'SmashyStream', getUrl: (t, tmdb, imdb, s, e) => `https://player.smashy.stream/${t}/${tmdb}${t==='tv'&&s&&e?`?s=${s}&e=${e}`:''}` },
          { id: 'vidsrc', name: 'VidSrc', getUrl: (t, tmdb, imdb, s, e) => `https://vidsrc.me/embed/${t}?tmdb=${tmdb}${t==='tv'&&s&&e?`&season=${s}&episode=${e}`:''}` },
          { id: 'vidsrcpro', name: 'VidSrc Pro', getUrl: (t, tmdb, imdb, s, e) => `https://vidsrc.cc/v2/embed/${t}/${tmdb}${t==='tv'&&s&&e?`/${s}/${e}`:''}` }
        ];

        const ROW_CONFIGS = {
            home: [
                { title: 'Trending Today', url: '/trending/all/day' },
                { title: 'Movies Trending Today', url: '/trending/movie/day' },
                { title: 'TV Shows Trending Today', url: '/trending/tv/day' },
                { title: 'Box Office', url: '/movie/now_playing' },
                { title: 'Popular Movies', url: '/movie/popular' },
                { title: 'Popular TV Shows', url: '/tv/popular' }
            ],
            movies: [
                { title: 'Popular Movies', url: '/movie/popular' },
                { title: 'All Time Favorite Movies', url: '/movie/top_rated' },
                { title: 'Box Office', url: '/movie/now_playing' },
                { title: 'Marvel Studios', url: '/discover/movie?with_companies=420&sort_by=popularity.desc' },
                { title: 'Pixar', url: '/discover/movie?with_companies=3&sort_by=popularity.desc' },
                { title: 'Warner Bros. Pictures', url: '/discover/movie?with_companies=174&sort_by=popularity.desc' },
                { title: 'Walt Disney Pictures', url: '/discover/movie?with_companies=2&sort_by=popularity.desc' },
                { title: 'DC Entertainment', url: '/discover/movie?with_companies=9993&sort_by=popularity.desc' },
                { title: 'Paramount', url: '/discover/movie?with_companies=4&sort_by=popularity.desc' }
            ],
            tv: [
                { title: 'Popular TV Shows', url: '/tv/popular' },
                { title: 'All Time Favorite TV Shows', url: '/tv/top_rated' },
                { title: 'Netflix Originals', url: '/discover/tv?with_networks=213&sort_by=popularity.desc' },
                { title: 'Apple TV+', url: '/discover/tv?with_networks=2552&sort_by=popularity.desc' },
                { title: 'Amazon Prime', url: '/discover/tv?with_networks=1024&sort_by=popularity.desc' },
                { title: 'Hulu', url: '/discover/tv?with_networks=453&sort_by=popularity.desc' },
                { title: 'Disney+', url: '/discover/tv?with_networks=2739&sort_by=popularity.desc' },
                { title: 'HBO', url: '/discover/tv?with_networks=49&sort_by=popularity.desc' },
                { title: 'AMC', url: '/discover/tv?with_networks=174&sort_by=popularity.desc' }
            ]
        };

        // --- Helper Components ---
        const LoadingSpinner = () => (
            <div className="flex justify-center items-center py-10">
                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
            </div>
        );

        // --- Main Application ---
        function App() {
            const [tmdbKey, setTmdbKey] = useState(() => localStorage.getItem('vaTmdbKey') || '15d2ea6d0dc1d476efbca3eba2b9bbfb');
            const [selectedServerId, setSelectedServerId] = useState(() => localStorage.getItem('vaServer') || 'autoembed');
            const [dbLanguage, setDbLanguage] = useState(() => localStorage.getItem('vaLanguage') || 'en-US');
            
            const [favorites, setFavorites] = useState(() => { try { return JSON.parse(localStorage.getItem('vaFavorites')) || []; } catch(e) { return []; } });
            const [historyList, setHistoryList] = useState(() => { try { return JSON.parse(localStorage.getItem('vaHistory')) || []; } catch(e) { return []; } });

            const [activeTab, setActiveTab] = useState('home'); // home, movies, tv, search, settings
            const [seeAllConfig, setSeeAllConfig] = useState(null); // For "See All" grid view
            const [selectedMedia, setSelectedMedia] = useState(null); // For Details Modal
            const [activePlayerMedia, setActivePlayerMedia] = useState(null); // For Fullscreen Player

            useEffect(() => localStorage.setItem('vaFavorites', JSON.stringify(favorites)), [favorites]);
            useEffect(() => localStorage.setItem('vaHistory', JSON.stringify(historyList)), [historyList]);
            useEffect(() => localStorage.setItem('vaServer', selectedServerId), [selectedServerId]);
            useEffect(() => localStorage.setItem('vaTmdbKey', tmdbKey), [tmdbKey]);
            useEffect(() => localStorage.setItem('vaLanguage', dbLanguage), [dbLanguage]);

            const isRTL = dbLanguage === 'ar';

            // --- Handlers ---
            const openDetails = (media) => setSelectedMedia(media);
            const closeDetails = () => setSelectedMedia(null);
            
            const launchPlayer = (item, season = null, episode = null, epTitle = null) => {
                const type = item.media_type || item.Type || (item.name ? 'tv' : 'movie');
                const isArabic = item.original_language === 'ar' || item.OriginalLanguage === 'ar';
                
                // Auto switch to smashy for arabic
                if (isArabic && selectedServerId !== 'smashy') setSelectedServerId('smashy');

                setActivePlayerMedia({
                    tmdbId: item.id,
                    imdbId: item.imdbID || item.external_ids?.imdb_id,
                    type: type === 'series' ? 'tv' : type,
                    season,
                    episode,
                    title: item.title || item.name || item.Title,
                    originalLanguage: item.original_language || item.OriginalLanguage
                });

                // Record History
                const histId = `${item.id}-${season || '0'}-${episode || '0'}`;
                const newRecord = {
                    historyId: histId, id: item.id, imdbID: item.imdbID,
                    Title: item.title || item.name || item.Title, Type: type,
                    Poster: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster,
                    backdrop: item.backdrop_path ? `https://image.tmdb.org/t/p/w780${item.backdrop_path}` : item.backdrop,
                    season, episode, epTitle, timestamp: Date.now()
                };
                setHistoryList(prev => [newRecord, ...prev.filter(h => h.historyId !== histId)].slice(0, 100));
                
                // Close modal if open
                closeDetails();
            };

            const toggleFavorite = (item) => {
                setFavorites(prev => {
                    if (prev.some(f => f.id === item.id)) return prev.filter(f => f.id !== item.id);
                    return [{
                        id: item.id, Title: item.title || item.name, Type: item.media_type || (item.name ? 'tv' : 'movie'),
                        Poster: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : null,
                        backdrop: item.backdrop_path ? `https://image.tmdb.org/t/p/w780${item.backdrop_path}` : null,
                    }, ...prev];
                });
            };

            // --- Row Component ---
            const MediaRow = ({ title, url, items, onSeeAll }) => {
                const [rowItems, setRowItems] = useState(items || []);
                const [loading, setLoading] = useState(!items);

                useEffect(() => {
                    if (url && !items) {
                        fetch(`https://api.themoviedb.org/3${url}${url.includes('?') ? '&' : '?'}api_key=${tmdbKey}&language=${dbLanguage}`)
                            .then(res => res.json())
                            .then(data => {
                                const valid = (data.results || []).filter(i => i.poster_path && !i.known_for);
                                setRowItems(valid);
                                setLoading(false);
                            }).catch(() => setLoading(false));
                    }
                }, [url, tmdbKey, dbLanguage, items]);

                if (!loading && rowItems.length === 0) return null;

                return (
                    <div className="mb-6">
                        <div className="flex justify-between items-end px-4 mb-2">
                            <h2 className="text-base font-bold text-white tracking-wide">{title}</h2>
                            <span onClick={() => onSeeAll && onSeeAll({title, url})} className="text-xs text-red-500 font-semibold cursor-pointer hover:underline">See All</span>
                        </div>
                        <div className="flex overflow-x-auto gap-3 px-4 pb-2 hide-scrollbar snap-x">
                            {loading ? <div className="w-full flex gap-3">{[1,2,3,4,5].map(i => <div key={i} className="w-28 h-40 bg-[#1e1e1e] rounded-md flex-shrink-0 animate-pulse"></div>)}</div> : 
                                rowItems.map(item => (
                                    <div key={item.id || item.historyId} onClick={() => openDetails(item)} className="w-28 flex-shrink-0 cursor-pointer snap-start transition-transform hover:scale-105 relative">
                                        <img src={item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster} alt={item.title || item.name || item.Title} className="w-full h-40 object-cover rounded-md shadow-lg" loading="lazy" />
                                        <div className="absolute top-1 right-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1 backdrop-blur-md">
                                            <Star size={10} className="fill-amber-400 text-amber-400" /> {item.vote_average ? item.vote_average.toFixed(1) : 'NR'}
                                        </div>
                                    </div>
                                ))
                            }
                        </div>
                    </div>
                );
            };

            // --- Continue Watching Row ---
            const ContinueWatchingRow = () => {
                if (historyList.length === 0) return null;
                return (
                    <div className="mb-6 mt-4">
                        <h2 className="text-base font-bold text-white tracking-wide px-4 mb-2">Continue Watching</h2>
                        <div className="flex overflow-x-auto gap-3 px-4 pb-2 hide-scrollbar snap-x">
                            {historyList.map(item => (
                                <div key={item.historyId} onClick={() => launchPlayer(item, item.season, item.episode, item.epTitle)} className="w-40 flex-shrink-0 cursor-pointer snap-start relative group">
                                    <div className="relative w-full aspect-video rounded-md overflow-hidden bg-neutral-800">
                                        <img src={item.backdrop || item.Poster} className="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-opacity" alt={item.Title} />
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <PlayCircle size={36} className="text-white opacity-80 group-hover:opacity-100 group-hover:scale-110 transition-all" />
                                        </div>
                                        <div className="absolute bottom-0 left-0 right-0 h-1 bg-neutral-700"><div className="h-full bg-red-600 w-2/3"></div></div>
                                    </div>
                                    <div className="mt-1 flex justify-between items-start">
                                        <div className="flex flex-col">
                                            <span className="text-xs font-semibold text-gray-200 line-clamp-1">{item.Title}</span>
                                            <span className="text-[10px] text-gray-400">{item.Type === 'tv' ? `S${item.season}:E${item.episode}` : 'Movie'}</span>
                                        </div>
                                        <button onClick={(e) => { e.stopPropagation(); openDetails(item); }} className="p-1 text-gray-400 hover:text-white"><Info size={14}/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // --- See All Grid View ---
            const SeeAllView = ({ config, onBack }) => {
                const [items, setItems] = useState([]);
                const [page, setPage] = useState(1);
                const [loading, setLoading] = useState(false);
                const [hasMore, setHasMore] = useState(true);

                useEffect(() => {
                    setLoading(true);
                    const sep = config.url.includes('?') ? '&' : '?';
                    fetch(`https://api.themoviedb.org/3${config.url}${sep}api_key=${tmdbKey}&language=${dbLanguage}&page=${page}`)
                        .then(res => res.json())
                        .then(data => {
                            const valid = (data.results || []).filter(i => i.poster_path && !i.known_for);
                            setItems(prev => page === 1 ? valid : [...prev, ...valid]);
                            setHasMore(data.page < data.total_pages);
                            setLoading(false);
                        }).catch(() => setLoading(false));
                }, [config.url, page, tmdbKey, dbLanguage]);

                return (
                    <div className="pt-8 pb-24 px-4 max-w-5xl mx-auto min-h-screen animate-in fade-in" dir={isRTL ? 'rtl' : 'ltr'}>
                        <div className="flex items-center gap-4 mb-6 sticky top-0 bg-[#0f0f0f]/90 backdrop-blur-md py-4 z-20">
                            <button onClick={onBack} className="p-2 bg-[#1e1e1e] hover:bg-[#2b2b2b] rounded-full transition-colors">
                                <ArrowLeft size={20} className={isRTL ? "rotate-180" : ""}/>
                            </button>
                            <h1 className="text-xl font-bold">{config.title}</h1>
                        </div>
                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3 sm:gap-4">
                            {items.map(item => (
                                <div key={item.id} onClick={() => openDetails(item)} className="cursor-pointer transition-transform hover:scale-105 relative">
                                    <img src={item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster} alt={item.title || item.name} className="w-full aspect-[2/3] object-cover rounded-md shadow-lg" loading="lazy" />
                                    <div className="absolute top-1 right-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1 backdrop-blur-md">
                                        <Star size={10} className="fill-amber-400 text-amber-400" /> {item.vote_average ? item.vote_average.toFixed(1) : 'NR'}
                                    </div>
                                </div>
                            ))}
                        </div>
                        {hasMore && (
                            <div className="mt-8 flex justify-center">
                                <button onClick={() => setPage(p => p + 1)} disabled={loading} className="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded font-bold transition-colors disabled:opacity-50">
                                    {loading ? (isRTL ? 'جاري التحميل...' : 'Loading...') : (isRTL ? 'تحميل المزيد' : 'Load More')}
                                </button>
                            </div>
                        )}
                    </div>
                );
            };

            // --- Hero Banner Component ---
            const HeroBanner = ({ endpoint }) => {
                const [heroItem, setHeroItem] = useState(null);
                
                useEffect(() => {
                    fetch(`https://api.themoviedb.org/3${endpoint}?api_key=${tmdbKey}&language=${dbLanguage}`)
                        .then(res => res.json())
                        .then(data => {
                            const valid = data.results?.find(i => i.backdrop_path && i.overview);
                            setHeroItem(valid || data.results?.[0]);
                        });
                }, [endpoint, tmdbKey, dbLanguage]);

                if (!heroItem) return <div className="h-[60vh] w-full bg-neutral-900 animate-pulse"></div>;

                const isFav = favorites.some(f => f.id === heroItem.id);

                return (
                    <div className="relative w-full h-[65vh] sm:h-[75vh] flex flex-col justify-end pb-12">
                        <div className="absolute inset-0 z-0">
                            <img src={`https://image.tmdb.org/t/p/original${heroItem.backdrop_path || heroItem.poster_path}`} className="w-full h-full object-cover" alt="Hero" />
                            <div className="absolute inset-0 hero-gradient"></div>
                        </div>
                        
                        <div className="relative z-10 px-4 sm:px-8 flex flex-col items-center text-center space-y-4">
                            <h1 className="text-3xl sm:text-5xl font-extrabold text-white drop-shadow-lg">{heroItem.title || heroItem.name}</h1>
                            <div className="flex items-center gap-2 text-xs font-semibold text-gray-300">
                                <span className="text-green-500 font-bold">{Math.round((heroItem.vote_average || 0) * 10)}% Match</span>
                                <span className="flex items-center gap-1 text-amber-400"><Star size={12} className="fill-amber-400"/> {heroItem.vote_average ? heroItem.vote_average.toFixed(1) : 'NR'}</span>
                                <span>{(heroItem.release_date || heroItem.first_air_date || '').substring(0,4)}</span>
                                <span className="border border-gray-600 px-1 rounded text-[10px]">HD</span>
                            </div>
                            
                            <div className="flex items-center justify-center gap-4 w-full max-w-sm mt-2">
                                <button onClick={() => toggleFavorite(heroItem)} className="flex flex-col items-center gap-1 text-gray-300 hover:text-white transition-colors">
                                    {isFav ? <Check size={24} /> : <Plus size={24} />}
                                    <span className="text-[10px] font-medium">My List</span>
                                </button>
                                
                                <button onClick={() => openDetails(heroItem)} className="flex-1 flex items-center justify-center gap-2 bg-white text-black py-2 rounded font-bold hover:bg-gray-200 transition-colors">
                                    <Play size={20} className="fill-black" /> Play
                                </button>
                                
                                <button onClick={() => openDetails(heroItem)} className="flex flex-col items-center gap-1 text-gray-300 hover:text-white transition-colors">
                                    <Info size={24} />
                                    <span className="text-[10px] font-medium">Info</span>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- Details Modal ---
            const DetailsModal = ({ media, onClose }) => {
                const [details, setDetails] = useState(null);
                const [episodes, setEpisodes] = useState([]);
                const [season, setSeason] = useState(1);
                const [loading, setLoading] = useState(true);

                const type = media.media_type || media.Type || (media.name ? 'tv' : 'movie');

                useEffect(() => {
                    setLoading(true);
                    fetch(`https://api.themoviedb.org/3/${type}/${media.id}?api_key=${tmdbKey}&language=${dbLanguage}&append_to_response=external_ids`)
                        .then(res => res.json())
                        .then(data => {
                            setDetails(data);
                            if (type === 'tv' && data.seasons?.length > 0) {
                                // Default to season 1, or the first available non-zero season
                                const firstSeason = data.seasons.find(s => s.season_number > 0)?.season_number || 1;
                                setSeason(firstSeason);
                            } else {
                                setLoading(false);
                            }
                        });
                }, [media.id, type, tmdbKey, dbLanguage]);

                useEffect(() => {
                    if (type === 'tv' && details) {
                        fetch(`https://api.themoviedb.org/3/tv/${media.id}/season/${season}?api_key=${tmdbKey}&language=${dbLanguage}`)
                            .then(res => res.json())
                            .then(data => {
                                setEpisodes(data.episodes || []);
                                setLoading(false);
                            });
                    }
                }, [season, details, media.id, type, tmdbKey, dbLanguage]);

                if (!details) return <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center"><LoadingSpinner/></div>;

                const isFav = favorites.some(f => f.id === details.id);

                return (
                    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 sm:p-4 animate-in fade-in" onClick={onClose}>
                        <div className="bg-[#181818] w-full sm:max-w-2xl sm:rounded-xl h-[85vh] sm:h-[80vh] overflow-y-auto hide-scrollbar relative shadow-2xl" onClick={e => e.stopPropagation()} dir={isRTL ? 'rtl' : 'ltr'}>
                            
                            {/* Modal Close Button */}
                            <button onClick={onClose} className={`absolute top-4 ${isRTL ? 'left-4' : 'right-4'} z-20 bg-neutral-900/60 p-2 rounded-full text-white hover:bg-neutral-800`}>
                                <X size={20} />
                            </button>

                            {/* Modal Header */}
                            <div className="relative w-full aspect-video">
                                <img src={`https://image.tmdb.org/t/p/w780${details.backdrop_path || details.poster_path}`} className="w-full h-full object-cover" alt="Backdrop"/>
                                <div className="absolute inset-0 modal-gradient flex items-end p-6">
                                    <h2 className="text-3xl font-extrabold text-white">{details.title || details.name}</h2>
                                </div>
                            </div>

                            <div className="p-4 sm:p-6 space-y-4">
                                {/* Metadata */}
                                <div className="flex flex-wrap items-center gap-3 text-sm text-gray-400 font-medium">
                                    <span className="text-green-500 font-bold">{Math.round((details.vote_average || 0) * 10)}% Match</span>
                                    <span className="flex items-center gap-1 text-amber-400"><Star size={14} className="fill-amber-400"/> {details.vote_average ? details.vote_average.toFixed(1) : 'NR'}</span>
                                    <span>{(details.release_date || details.first_air_date || '').substring(0,4)}</span>
                                    <span className="border border-gray-600 px-1.5 rounded text-[10px] uppercase">HD</span>
                                    {type === 'movie' && details.runtime && <span>{Math.floor(details.runtime/60)}h {details.runtime%60}m</span>}
                                    {type === 'tv' && <span>{details.number_of_seasons} Seasons</span>}
                                </div>

                                {/* Main Action */}
                                {type === 'movie' ? (
                                    <button onClick={() => launchPlayer(details)} className="w-full flex items-center justify-center gap-2 bg-white text-black py-2.5 rounded font-bold hover:bg-gray-200 transition-colors">
                                        <Play size={20} className="fill-black" /> Play
                                    </button>
                                ) : (
                                    <button onClick={() => {
                                        const ep = episodes[0];
                                        if (ep) launchPlayer(details, season, ep.episode_number, ep.name);
                                    }} className="w-full flex items-center justify-center gap-2 bg-white text-black py-2.5 rounded font-bold hover:bg-gray-200 transition-colors">
                                        <Play size={20} className="fill-black" /> Play S{season} E1
                                    </button>
                                )}

                                {/* Plot & Info */}
                                <p className="text-sm text-gray-200 leading-relaxed">{details.overview || 'No overview available.'}</p>
                                
                                <div className="flex gap-6 mt-4 pb-4 border-b border-gray-800">
                                    <button onClick={() => toggleFavorite(details)} className="flex flex-col items-center gap-2 text-gray-400 hover:text-white">
                                        {isFav ? <Check size={24} className="text-white"/> : <Plus size={24} />}
                                        <span className="text-[10px]">My List</span>
                                    </button>
                                </div>

                                {/* TV Episodes Section */}
                                {type === 'tv' && (
                                    <div className="mt-4">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="font-bold text-lg">Episodes</h3>
                                            <select value={season} onChange={(e) => setSeason(e.target.value)} className="bg-neutral-800 border border-neutral-700 text-white text-sm rounded px-3 py-1.5 outline-none">
                                                {(details.seasons || []).filter(s => s.season_number > 0).map(s => (
                                                    <option key={s.season_number} value={s.season_number}>Season {s.season_number}</option>
                                                ))}
                                            </select>
                                        </div>

                                        {loading ? <LoadingSpinner/> : (
                                            <div className="space-y-4">
                                                {episodes.map(ep => (
                                                    <div key={ep.id} onClick={() => launchPlayer(details, season, ep.episode_number, ep.name)} className="flex gap-4 p-2 hover:bg-neutral-800 rounded-lg cursor-pointer group transition-colors">
                                                        <div className="relative w-32 aspect-video flex-shrink-0 rounded overflow-hidden bg-neutral-800">
                                                            {ep.still_path && <img src={`https://image.tmdb.org/t/p/w300${ep.still_path}`} className="w-full h-full object-cover opacity-80 group-hover:opacity-100" alt={ep.name}/>}
                                                            <div className="absolute inset-0 flex items-center justify-center">
                                                                <PlayCircle size={28} className="text-white opacity-0 group-hover:opacity-100 transition-opacity" />
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col justify-center flex-grow min-w-0">
                                                            <div className="flex justify-between items-start mb-1">
                                                                <span className="text-sm font-bold text-white line-clamp-1">{ep.episode_number}. {ep.name}</span>
                                                                {ep.runtime && <span className="text-xs text-gray-500">{ep.runtime}m</span>}
                                                            </div>
                                                            <p className="text-xs text-gray-400 line-clamp-2">{ep.overview}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- Fullscreen Player Overlay ---
            const PlayerOverlay = () => {
                const [showSettings, setShowSettings] = useState(false);
                const [showCastGuide, setShowCastGuide] = useState(false);

                if (!activePlayerMedia) return null;

                const server = SERVERS.find(s => s.id === selectedServerId) || SERVERS[0];
                const activeUrl = server.getUrl(activePlayerMedia.type, activePlayerMedia.tmdbId, activePlayerMedia.imdbId, activePlayerMedia.season, activePlayerMedia.episode);

                return (
                    <div className="fixed inset-0 z-[100] bg-black flex flex-col animate-in fade-in" dir={isRTL ? 'rtl' : 'ltr'}>
                        {/* Player Header */}
                        <div className="flex items-center justify-between p-4 bg-gradient-to-b from-black/80 to-transparent absolute top-0 left-0 right-0 z-10 transition-opacity duration-300">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setActivePlayerMedia(null)} className="text-white hover:text-gray-300 p-1"><ChevronDown size={28} className="rotate-90"/></button>
                                <span className="font-bold text-white text-sm sm:text-base line-clamp-1">
                                    {activePlayerMedia.title} {activePlayerMedia.type === 'tv' && `- S${activePlayerMedia.season} E${activePlayerMedia.episode}`}
                                </span>
                            </div>
                            
                            <div className="relative">
                                <button onClick={() => setShowSettings(!showSettings)} className="text-white p-2 hover:bg-white/10 rounded-full transition-colors"><Settings size={20}/></button>
                                
                                {showSettings && (
                                    <>
                                        <div className="fixed inset-0 z-40" onClick={() => setShowSettings(false)}></div>
                                        <div className={`absolute top-full mt-2 w-64 bg-[#181818] border border-gray-800 rounded-xl shadow-2xl overflow-hidden z-50 ${isRTL ? 'left-0' : 'right-0'}`}>
                                            <button onClick={() => { setShowCastGuide(true); setShowSettings(false); }} className="w-full flex items-center gap-3 px-4 py-3 hover:bg-neutral-800 text-white text-sm border-b border-gray-800">
                                                <Cast size={16} className="text-blue-400"/> {isRTL ? 'دليل البث للتلفاز' : 'Cast to TV'}
                                            </button>
                                            <div className="p-3">
                                                <div className="text-[10px] uppercase text-gray-500 mb-2 font-bold px-1">{isRTL ? 'مصدر المشغل' : 'Player Source'}</div>
                                                <div className="flex flex-col gap-1">
                                                    {SERVERS.map(s => (
                                                        <button key={s.id} onClick={() => { setSelectedServerId(s.id); setShowSettings(false); }} className={`flex items-center justify-between px-3 py-2 text-xs font-bold rounded-lg ${selectedServerId === s.id ? 'bg-red-600/20 text-red-500' : 'text-gray-300 hover:bg-neutral-800 hover:text-white'}`}>
                                                            {s.name} {selectedServerId === s.id && <Check size={14} />}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>

                        {/* Arabic Warning Overlay */}
                        {activePlayerMedia.originalLanguage === 'ar' && (
                            <div className="absolute top-16 left-4 right-4 z-10 bg-amber-900/80 border border-amber-500 p-3 rounded-lg flex items-start gap-3 backdrop-blur-md">
                                <AlertCircle size={20} className="text-amber-400 flex-shrink-0" />
                                <div className="text-xs text-amber-100">
                                    <p className="font-bold mb-1">{isRTL ? 'تنبيه المحتوى العربي' : 'Arabic Media Notice'}</p>
                                    <p>{isRTL ? 'المشغلات المدمجة قد لا تدعم هذا المحتوى. ابحث في المواقع المحلية:' : 'Embedded players may fail for Arabic content. Try local sites:'}</p>
                                    <div className="flex gap-2 mt-2">
                                        <a href={`https://wecima.show/search/${encodeURIComponent(activePlayerMedia.title)}`} target="_blank" className="underline font-bold">WeCima</a>
                                        <a href={`https://www.faselhd.ac/?s=${encodeURIComponent(activePlayerMedia.title)}`} target="_blank" className="underline font-bold">FaselHD</a>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Video Frame */}
                        <div className="flex-grow flex items-center justify-center bg-black pt-14 pb-4 px-0 sm:px-4">
                            <div className="w-full aspect-video max-h-full max-w-6xl mx-auto rounded-lg overflow-hidden shadow-2xl relative">
                                <iframe src={activeUrl} className="absolute inset-0 w-full h-full border-0" allowFullScreen allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
                            </div>
                        </div>

                        {/* Cast Guide Modal inside Player */}
                        {showCastGuide && (
                            <div className="absolute inset-0 z-50 bg-black/90 flex items-center justify-center p-4">
                                <div className="bg-[#181818] p-6 rounded-xl max-w-sm w-full border border-gray-800">
                                    <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2"><Cast size={20} className="text-blue-500"/> {isRTL ? 'كيفية البث' : 'How to Cast'}</h3>
                                    <p className="text-sm text-gray-400 mb-4">{isRTL ? 'استخدم تطبيق Web Video Caster على هاتفك، أو ميزة Cast في متصفح Chrome على الكمبيوتر.' : 'Use the Web Video Caster app on mobile, or Chrome Cast Tab on desktop to cast with subtitles.'}</p>
                                    <button onClick={() => setShowCastGuide(false)} className="w-full py-2 bg-red-600 text-white font-bold rounded hover:bg-red-700">Close</button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // --- Tab Views ---
            const HomeView = () => (
                <div className="pb-24 animate-in fade-in duration-500">
                    <HeroBanner endpoint="/trending/all/day" />
                    <div className="mt-[-80px] relative z-10">
                        <ContinueWatchingRow />
                        {ROW_CONFIGS.home.map(row => <MediaRow key={row.title} title={row.title} url={row.url} onSeeAll={setSeeAllConfig} />)}
                    </div>
                </div>
            );

            const MoviesView = () => (
                <div className="pb-24 animate-in fade-in duration-500">
                    <HeroBanner endpoint="/trending/movie/day" />
                    <div className="mt-[-80px] relative z-10">
                        {ROW_CONFIGS.movies.map(row => <MediaRow key={row.title} title={row.title} url={row.url} onSeeAll={setSeeAllConfig} />)}
                    </div>
                </div>
            );

            const TvView = () => (
                <div className="pb-24 animate-in fade-in duration-500">
                    <HeroBanner endpoint="/trending/tv/day" />
                    <div className="mt-[-80px] relative z-10">
                        {ROW_CONFIGS.tv.map(row => <MediaRow key={row.title} title={row.title} url={row.url} onSeeAll={setSeeAllConfig} />)}
                    </div>
                </div>
            );

            const SearchView = () => {
                const [searchQuery, setSearchQuery] = useState('');
                const [results, setResults] = useState([]);
                const [topSearches, setTopSearches] = useState([]);
                const [loading, setLoading] = useState(false);

                useEffect(() => {
                    // Fetch top searches instantly
                    fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${tmdbKey}&language=${dbLanguage}`)
                        .then(res => res.json()).then(data => setTopSearches(data.results || []));
                }, [tmdbKey, dbLanguage]);

                useEffect(() => {
                    if (!searchQuery.trim()) { setResults([]); return; }
                    setLoading(true);
                    const handler = setTimeout(() => {
                        fetch(`https://api.themoviedb.org/3/search/multi?api_key=${tmdbKey}&language=${dbLanguage}&query=${encodeURIComponent(searchQuery)}`)
                            .then(res => res.json())
                            .then(data => {
                                setResults((data.results || []).filter(i => i.media_type !== 'person' && i.backdrop_path));
                                setLoading(false);
                            });
                    }, 500);
                    return () => clearTimeout(handler);
                }, [searchQuery, tmdbKey, dbLanguage]);

                const displayList = searchQuery.trim() ? results : topSearches;

                return (
                    <div className="pt-12 pb-24 px-4 max-w-2xl mx-auto min-h-screen animate-in fade-in" dir={isRTL ? 'rtl' : 'ltr'}>
                        <div className="bg-[#2b2b2b] flex items-center px-4 py-3 rounded-md mb-6 sticky top-4 z-20 shadow-xl">
                            <Search size={20} className="text-gray-400 mr-3" />
                            <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder={isRTL ? "البحث عن الأفلام، المسلسلات..." : "Search for a show, movie..."} className="bg-transparent text-white w-full outline-none" dir="auto" />
                            {searchQuery && <button onClick={() => setSearchQuery('')}><X size={20} className="text-gray-400"/></button>}
                        </div>
                        
                        <h2 className="text-xl font-bold mb-4">{searchQuery ? (isRTL?'النتائج':'Results') : (isRTL?'أعلى عمليات البحث':'Top Searches')}</h2>
                        
                        {loading ? <LoadingSpinner/> : (
                            <div className="space-y-4">
                                {displayList.map(item => (
                                    <div key={item.id} onClick={() => openDetails(item)} className="flex items-center gap-4 cursor-pointer group hover:bg-[#1e1e1e] p-2 rounded-lg transition-colors">
                                        <div className="relative w-32 aspect-video rounded overflow-hidden bg-neutral-800 flex-shrink-0">
                                            <img src={`https://image.tmdb.org/t/p/w300${item.backdrop_path || item.poster_path}`} className="w-full h-full object-cover" alt={item.title || item.name} />
                                            <div className="absolute top-1 right-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1 backdrop-blur-md">
                                                <Star size={8} className="fill-amber-400 text-amber-400" /> {item.vote_average ? item.vote_average.toFixed(1) : 'NR'}
                                            </div>
                                        </div>
                                        <span className="font-bold text-sm sm:text-base flex-grow line-clamp-2">{item.title || item.name}</span>
                                        <button className="flex-shrink-0 p-2"><PlayCircle size={28} className="text-white group-hover:scale-110 transition-transform" /></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            const SettingsView = () => (
                <div className="pt-12 pb-24 px-4 max-w-md mx-auto min-h-screen animate-in fade-in" dir={isRTL ? 'rtl' : 'ltr'}>
                    <h1 className="text-2xl font-bold mb-8 flex items-center gap-3"><Settings size={28}/> App Settings</h1>
                    
                    <div className="space-y-6">
                        <div className="bg-[#181818] p-4 rounded-lg">
                            <label className="text-sm font-bold text-gray-400 mb-2 block">TMDB API Key</label>
                            <input type="text" value={tmdbKey} onChange={e => setTmdbKey(e.target.value)} className="w-full bg-[#2b2b2b] text-white px-3 py-2 rounded outline-none focus:ring-2 focus:ring-red-600" />
                        </div>

                        <div className="bg-[#181818] p-4 rounded-lg">
                            <label className="text-sm font-bold text-gray-400 mb-2 block">Metadata Language</label>
                            <select value={dbLanguage} onChange={e => setDbLanguage(e.target.value)} className="w-full bg-[#2b2b2b] text-white px-3 py-2 rounded outline-none" dir="ltr">
                                <option value="en-US">English</option>
                                <option value="ar">Arabic (العربية)</option>
                                <option value="fr-FR">French (Français)</option>
                                <option value="es-ES">Spanish (Español)</option>
                            </select>
                        </div>

                        <div className="bg-[#181818] p-4 rounded-lg flex justify-between items-center">
                            <div>
                                <span className="font-bold block">Clear Watch History</span>
                                <span className="text-xs text-gray-400">{historyList.length} items</span>
                            </div>
                            <button onClick={() => setHistoryList([])} className="bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white px-4 py-2 rounded font-bold text-sm transition-colors">Clear</button>
                        </div>
                    </div>
                </div>
            );

            // --- Render ---
            return (
                <div className="relative w-full h-full min-h-screen">
                    {/* Main Content Areas */}
                    {seeAllConfig ? (
                        <SeeAllView config={seeAllConfig} onBack={() => setSeeAllConfig(null)} />
                    ) : (
                        <>
                            {activeTab === 'home' && <HomeView />}
                            {activeTab === 'movies' && <MoviesView />}
                            {activeTab === 'tv' && <TvView />}
                            {activeTab === 'search' && <SearchView />}
                            {activeTab === 'settings' && <SettingsView />}
                        </>
                    )}

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 bg-[#0f0f0f]/95 backdrop-blur-md border-t border-white/10 px-6 py-3 z-40">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            {[
                                { id: 'home', icon: Home, label: 'Home' },
                                { id: 'movies', icon: Film, label: 'Movies' },
                                { id: 'tv', icon: Tv, label: 'TV Shows' },
                                { id: 'search', icon: Search, label: 'Search' },
                                { id: 'settings', icon: Settings, label: 'Settings' }
                            ].map(tab => {
                                const Icon = tab.icon;
                                const isActive = activeTab === 'id';
                                return (
                                    <button key={tab.id} onClick={() => {setActiveTab(tab.id); setSeeAllConfig(null); window.scrollTo(0,0);}} className={`flex flex-col items-center gap-1 ${activeTab === tab.id ? 'text-white' : 'text-gray-500 hover:text-gray-300'} transition-colors`}>
                                        <Icon size={22} className={activeTab === tab.id ? 'stroke-current' : ''} />
                                        <span className="text-[9px] font-medium">{tab.label}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* Overlays */}
                    {selectedMedia && <DetailsModal media={selectedMedia} onClose={closeDetails} />}
                    {activePlayerMedia && <PlayerOverlay />}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
