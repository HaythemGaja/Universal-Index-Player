<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Universal Index Player</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        .hero-gradient { background: linear-gradient(to top, #0f0f0f 0%, rgba(15,15,15,0.8) 20%, transparent 60%); }
        .modal-gradient { background: linear-gradient(to top, #171717 0%, #171717 80%, transparent 100%); }

        img { transition: opacity 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { Play, Search, Film, Tv, Settings, Heart, History, Trash2, X, Server, ChevronDown, ChevronRight, PlayCircle, AlertCircle, Globe, Star, Cast, Info, Plus, Check, MonitorPlay, Home, Copy, CheckCheck, ArrowLeft, ExternalLink, KeySquare, Database, User, ListPlus, BarChart2, CheckCircle2, Circle, Share2, Clock, PieChart, Sparkles, Bell, Filter } from 'https://esm.sh/lucide-react@0.292.0';

        // --- Configurations ---
        const SERVERS = [
          { id: 'streamimdb', name: 'StreamIMDb', getUrl: (t, tmdb, imdb, s, e) => `https://streamimdb.me/embed/${t}/${imdb || tmdb}${t==='tv'&&s&&e?`/${s}/${e}`:''}` },
          { id: 'vaplayer', name: 'VAPlayer', getUrl: (t, tmdb, imdb, s, e) => `https://vaplayer.ru/embed/${t}/${imdb || tmdb}${t==='tv'&&s&&e?`?s=${s}&e=${e}`:''}` },
          { id: 'vidsrc', name: 'VidSrc', getUrl: (t, tmdb, imdb, s, e) => `https://vidsrc.me/embed/${t}?tmdb=${tmdb}${t==='tv'&&s&&e?`&season=${s}&episode=${e}`:''}` },
          { id: 'autoembed', name: 'AutoEmbed', getUrl: (t, tmdb, imdb, s, e) => `https://autoembed.to/${t}/tmdb/${tmdb}${t==='tv'&&s&&e?`-${s}-${e}`:''}` },
          { id: 'smashy', name: 'SmashyStream', getUrl: (t, tmdb, imdb, s, e) => `https://player.smashy.stream/${t}/${tmdb}${t==='tv'&&s&&e?`?s=${s}&e=${e}`:''}` },
          { id: 'vidsrcpro', name: 'VidSrc Pro', getUrl: (t, tmdb, imdb, s, e) => `https://vidsrc.cc/v2/embed/${t}/${tmdb}${t==='tv'&&s&&e?`/${s}/${e}`:''}` },
          { id: 'iptv', name: 'My IPTV Subscription', getUrl: () => '' }
        ];

        const ROW_CONFIGS = {
            home: [
                { title: 'Trending Today', url: '/trending/all/day' },
                { title: 'Movies Trending Today', url: '/trending/movie/day' },
                { title: 'TV Shows Trending Today', url: '/trending/tv/day' },
                { title: 'Box Office', url: '/movie/now_playing' }
            ],
            movies: [
                { title: 'Trending Movies', url: '/trending/movie/week' },
                { title: 'Latest Releases', url: '/movie/now_playing' },
                { title: 'Popular Movies', url: '/movie/popular' },
                { title: 'All Time Favorite Movies', url: '/movie/top_rated' },
                { title: 'Marvel Studios', url: '/discover/movie?with_companies=420&sort_by=popularity.desc' },
                { title: 'Pixar', url: '/discover/movie?with_companies=3&sort_by=popularity.desc' },
                { title: 'Warner Bros.', url: '/discover/movie?with_companies=174&sort_by=popularity.desc' },
                { title: 'Disney', url: '/discover/movie?with_companies=2&sort_by=popularity.desc' }
            ],
            tv: [
                { title: 'Trending TV Shows', url: '/trending/tv/week' },
                { title: 'Latest Releases', url: '/tv/on_the_air' },
                { title: 'Popular TV Shows', url: '/tv/popular' },
                { title: 'All Time Favorites', url: '/tv/top_rated' },
                { title: 'Netflix Originals', url: '/discover/tv?with_networks=213&sort_by=popularity.desc' },
                { title: 'Apple TV+', url: '/discover/tv?with_networks=2552&sort_by=popularity.desc' },
                { title: 'Amazon Prime', url: '/discover/tv?with_networks=1024&sort_by=popularity.desc' },
                { title: 'HBO', url: '/discover/tv?with_networks=49&sort_by=popularity.desc' }
            ]
        };

        const GENRE_MAP = {
            28: "Action", 12: "Adventure", 16: "Animation", 35: "Comedy", 80: "Crime", 99: "Documentary", 18: "Drama", 10751: "Documentary", 10752: "Family", 14: "Fantasy", 36: "History", 27: "Horror", 10402: "Music", 9648: "Mystery", 10749: "Romance", 878: "Science Fiction", 10770: "TV Movie", 53: "Thriller", 10759: "Action & Adventure", 10762: "Kids", 10763: "News", 10764: "Reality", 10765: "Sci-Fi & Fantasy", 10766: "Soap", 10767: "Talk", 10768: "War & Politics", 37: "Western"
        };

        const LoadingSpinner = () => (
            <div className="flex justify-center items-center py-10">
                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
            </div>
        );

        function App() {
            const [tmdbKey, setTmdbKey] = useState(() => localStorage.getItem('vaTmdbKey') || '15d2ea6d0dc1d476efbca3eba2b9bbfb');
            const [selectedServerId, setSelectedServerId] = useState(() => localStorage.getItem('vaServer') || 'streamimdb');
            const [dbLanguage, setDbLanguage] = useState(() => localStorage.getItem('vaLanguage') || 'en-US');
            
            // IPTV State
            const [iptvDomain, setIptvDomain] = useState(() => localStorage.getItem('vaIptvDomain') || 'http://hydraa.st:80');
            const [iptvUser, setIptvUser] = useState(() => localStorage.getItem('vaIptvUser') || 'haithemb');
            const [iptvPass, setIptvPass] = useState(() => localStorage.getItem('vaIptvPass') || 'kse8328b');
            const [iptvCache, setIptvCache] = useState({ vod: [], series: [], loaded: false, error: null });

            // Data State
            const [favorites, setFavorites] = useState(() => { try { return JSON.parse(localStorage.getItem('vaFavorites')) || []; } catch(e) { return []; } });
            const [historyList, setHistoryList] = useState(() => { try { return JSON.parse(localStorage.getItem('vaHistory')) || []; } catch(e) { return []; } });
            
            // NEW Tracking State
            const [watchedEpisodes, setWatchedEpisodes] = useState(() => { try { return JSON.parse(localStorage.getItem('vaWatched')) || {}; } catch(e) { return {}; } });
            const [customLists, setCustomLists] = useState(() => { try { return JSON.parse(localStorage.getItem('vaCustomLists')) || []; } catch(e) { return []; } });

            // UI State
            const [activeTab, setActiveTab] = useState('home'); 
            const [seeAllConfig, setSeeAllConfig] = useState(null); 
            const [selectedMedia, setSelectedMedia] = useState(null); 
            const [activePlayerMedia, setActivePlayerMedia] = useState(null); 

            // Save Effects
            useEffect(() => localStorage.setItem('vaFavorites', JSON.stringify(favorites)), [favorites]);
            useEffect(() => localStorage.setItem('vaHistory', JSON.stringify(historyList)), [historyList]);
            useEffect(() => localStorage.setItem('vaWatched', JSON.stringify(watchedEpisodes)), [watchedEpisodes]);
            useEffect(() => localStorage.setItem('vaCustomLists', JSON.stringify(customLists)), [customLists]);
            
            useEffect(() => localStorage.setItem('vaServer', selectedServerId), [selectedServerId]);
            useEffect(() => localStorage.setItem('vaTmdbKey', tmdbKey), [tmdbKey]);
            useEffect(() => localStorage.setItem('vaLanguage', dbLanguage), [dbLanguage]);
            useEffect(() => localStorage.setItem('vaIptvDomain', iptvDomain), [iptvDomain]);
            useEffect(() => localStorage.setItem('vaIptvUser', iptvUser), [iptvUser]);
            useEffect(() => localStorage.setItem('vaIptvPass', iptvPass), [iptvPass]);

            const isRTL = dbLanguage === 'ar';

            // --- Background IPTV Fetcher ---
            useEffect(() => {
                if (!iptvDomain || !iptvUser || !iptvPass) return;
                let isMounted = true;
                setIptvCache({ vod: [], series: [], loaded: false, error: null });
                const cleanDomain = iptvDomain.replace(/\/$/, '');
                const baseUrl = `${cleanDomain}/player_api.php?username=${iptvUser}&password=${iptvPass}`;

                const fetchIptvData = async (targetUrl) => {
                    const isSecureEnv = window.location.protocol === 'https:';
                    const isHttpTarget = targetUrl.startsWith('http://');
                    if (!isSecureEnv || !isHttpTarget) {
                        try {
                            const res = await fetch(targetUrl);
                            if (res.ok) return await res.json();
                        } catch(e) {}
                    }
                    const proxies = ['https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?'];
                    for (const proxy of proxies) {
                        try {
                            const fetchUrl = `${proxy}${encodeURIComponent(targetUrl)}`;
                            const res = await fetch(fetchUrl, { cache: 'no-store' });
                            if (res.ok) return await res.json();
                        } catch (e) { continue; }
                    }
                    throw new Error(isSecureEnv && isHttpTarget ? 'Canvas Blocked HTTP Request' : 'All connections failed');
                };

                Promise.all([
                    fetchIptvData(`${baseUrl}&action=get_vod_streams`),
                    fetchIptvData(`${baseUrl}&action=get_series`)
                ]).then(([vodData, seriesData]) => {
                    if (isMounted) setIptvCache({ vod: Array.isArray(vodData) ? vodData : [], series: Array.isArray(seriesData) ? seriesData : [], loaded: true, error: null });
                }).catch(err => {
                    if (isMounted) setIptvCache({ vod: [], series: [], loaded: false, error: err.message === 'Canvas Blocked HTTP Request' ? "Canvas blocks HTTP IPTV. Please save file locally to test." : "Failed to load database. Provider may be blocking proxy." });
                });
                return () => { isMounted = false; };
            }, [iptvDomain, iptvUser, iptvPass]);

            // --- Personalization Engine ---
            const favoriteGenre = useMemo(() => {
                const genreCounts = {};
                historyList.forEach(item => {
                    if (item.genres && Array.isArray(item.genres)) {
                        item.genres.forEach(gId => { genreCounts[gId] = (genreCounts[gId] || 0) + 1; });
                    }
                });
                const sorted = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]);
                return sorted.length > 0 ? sorted[0][0] : null; // Returns ID of top genre
            }, [historyList]);


            // --- Core Handlers ---
            const openDetails = (media) => setSelectedMedia(media);
            const closeDetails = () => setSelectedMedia(null);
            
            const markEpisodeWatched = (tmdbId, seasonNum, epNum, isWatched = true) => {
                setWatchedEpisodes(prev => {
                    const next = { ...prev };
                    if (!next[tmdbId]) next[tmdbId] = {};
                    if (!next[tmdbId][seasonNum]) next[tmdbId][seasonNum] = [];
                    
                    if (isWatched && !next[tmdbId][seasonNum].includes(epNum)) {
                        next[tmdbId][seasonNum] = [...next[tmdbId][seasonNum], epNum];
                    } else if (!isWatched) {
                        next[tmdbId][seasonNum] = next[tmdbId][seasonNum].filter(e => e !== epNum);
                    }
                    return next;
                });
            };

            const launchPlayer = (item, season = null, episode = null, epTitle = null, fullDetails = null) => {
                const type = item.media_type || item.Type || (item.name ? 'tv' : 'movie');

                setActivePlayerMedia({
                    tmdbId: item.id, imdbId: item.imdbID || item.external_ids?.imdb_id || fullDetails?.external_ids?.imdb_id,
                    type: type === 'series' ? 'tv' : type, season, episode,
                    title: item.title || item.name || item.Title, originalLanguage: item.original_language || item.OriginalLanguage
                });

                // Auto-Mark episode as watched
                if (type === 'tv' || type === 'series') markEpisodeWatched(item.id, season, episode, true);

                // Build rich history record for stats
                const histId = `${item.id}-${season || '0'}-${episode || '0'}`;
                const runtime = fullDetails?.runtime || (fullDetails?.episode_run_time?.[0]) || (type === 'movie' ? 120 : 45);
                const genres = fullDetails?.genres?.map(g => g.id) || item.genre_ids || [];

                const newRecord = {
                    historyId: histId, id: item.id, imdbID: item.imdbID || item.external_ids?.imdb_id,
                    Title: item.title || item.name || item.Title, Type: type,
                    Poster: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster,
                    backdrop: item.backdrop_path ? `https://image.tmdb.org/t/p/w780${item.backdrop_path}` : item.backdrop,
                    season, episode, epTitle, timestamp: Date.now(),
                    runtime, genres // Used for stats engine
                };
                setHistoryList(prev => [newRecord, ...prev.filter(h => h.historyId !== histId)].slice(0, 500));
                closeDetails();
            };

            const toggleFavorite = (item) => {
                setFavorites(prev => {
                    if (prev.some(f => f.id === item.id)) return prev.filter(f => f.id !== item.id);
                    return [{
                        id: item.id, Title: item.title || item.name, Type: item.media_type || (item.name ? 'tv' : 'movie'),
                        Poster: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster,
                        backdrop: item.backdrop_path ? `https://image.tmdb.org/t/p/w780${item.backdrop_path}` : item.backdrop,
                    }, ...prev];
                });
            };

            const createCustomList = (name) => {
                if (!name.trim()) return;
                setCustomLists(prev => [...prev, { id: Date.now().toString(), name, items: [] }]);
            };

            const toggleItemInList = (listId, item) => {
                setCustomLists(prev => prev.map(list => {
                    if (list.id !== listId) return list;
                    const exists = list.items.some(i => i.id === item.id);
                    let newItems = exists ? list.items.filter(i => i.id !== item.id) : [...list.items, {
                        id: item.id, Title: item.title || item.name || item.Title, Type: item.media_type || (item.name ? 'tv' : 'movie'),
                        Poster: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster,
                        backdrop: item.backdrop_path ? `https://image.tmdb.org/t/p/w780${item.backdrop_path}` : item.backdrop
                    }];
                    return { ...list, items: newItems };
                }));
            };

            // --- UI Components ---
            const MediaRow = ({ title, url, items, onSeeAll }) => {
                const [rowItems, setRowItems] = useState(items || []);
                const [loading, setLoading] = useState(!items);

                useEffect(() => {
                    if (url && !items) {
                        fetch(`https://api.themoviedb.org/3${url}${url.includes('?') ? '&' : '?'}api_key=${tmdbKey}&language=${dbLanguage}`)
                            .then(res => res.json()).then(data => {
                                setRowItems((data.results || []).filter(i => i.poster_path && !i.known_for));
                                setLoading(false);
                            }).catch(() => setLoading(false));
                    }
                }, [url, tmdbKey, dbLanguage, items]);

                if (!loading && rowItems.length === 0) return null;

                return (
                    <div className="mb-6">
                        <div className="flex justify-between items-end px-4 mb-2">
                            <h2 className="text-base font-bold text-white tracking-wide flex items-center gap-2">
                                {title === 'Recommended for You' && <Sparkles size={16} className="text-amber-400" />}
                                {title}
                            </h2>
                            <span onClick={() => onSeeAll && onSeeAll({title, url: url || items})} className="text-xs text-indigo-400 font-semibold cursor-pointer hover:underline">See All</span>
                        </div>
                        <div className="flex overflow-x-auto gap-3 px-4 pb-2 hide-scrollbar snap-x">
                            {loading ? <div className="w-full flex gap-3">{[1,2,3,4,5].map(i => <div key={i} className="w-28 h-40 bg-[#1e1e1e] rounded-md flex-shrink-0 animate-pulse"></div>)}</div> : 
                                rowItems.map(item => (
                                    <div key={item.id} onClick={() => openDetails(item)} className="w-28 flex-shrink-0 cursor-pointer snap-start transition-transform hover:scale-105 relative">
                                        <img src={item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster} alt={item.title || item.name} className="w-full h-40 object-cover rounded-md shadow-lg" loading="lazy" />
                                        <div className="absolute top-1 right-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1 backdrop-blur-md">
                                            <Star size={10} className="fill-amber-400 text-amber-400" /> {item.vote_average ? item.vote_average.toFixed(1) : 'NR'}
                                        </div>
                                    </div>
                                ))
                            }
                        </div>
                    </div>
                );
            };

            const ContinueWatchingRow = ({ filterType = 'all' }) => {
                if (historyList.length === 0) return null;
                const uniqueHistory = [];
                const seenIds = new Set();
                historyList.forEach(item => {
                    // Filter based on tab context (Movies vs TV vs Home)
                    const matchesFilter = filterType === 'all' || item.Type === filterType || (filterType === 'tv' && item.Type === 'series');
                    if (!seenIds.has(item.id) && matchesFilter) { 
                        seenIds.add(item.id); 
                        uniqueHistory.push(item); 
                    } 
                });

                if (uniqueHistory.length === 0) return null;

                return (
                    <div className="mb-6 mt-4">
                        <h2 className="text-base font-bold text-white tracking-wide px-4 mb-2">Continue Watching</h2>
                        <div className="flex overflow-x-auto gap-3 px-4 pb-2 hide-scrollbar snap-x">
                            {uniqueHistory.slice(0, 15).map(item => {
                                // Find next episode logic for UI
                                const watchedData = watchedEpisodes[item.id] || {};
                                let displaySeason = item.season;
                                let displayEp = item.episode;
                                let isWatched = false;
                                
                                if ((item.Type === 'tv' || item.Type === 'series') && watchedData[item.season]?.includes(parseInt(item.episode))) {
                                    isWatched = true; // Highlight that this specific ep was finished
                                }

                                return (
                                <div key={item.historyId} onClick={() => openDetails(item)} className="w-40 flex-shrink-0 cursor-pointer snap-start relative group">
                                    <div className="relative w-full aspect-video rounded-md overflow-hidden bg-neutral-800 border border-neutral-700">
                                        <img src={item.backdrop || item.Poster} className="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-opacity" />
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <PlayCircle size={36} className="text-white shadow-xl opacity-80 group-hover:opacity-100 group-hover:scale-110 transition-all" />
                                        </div>
                                        <div className="absolute bottom-0 left-0 right-0 h-1 bg-neutral-700">
                                            <div className={`h-full ${isWatched ? 'bg-green-500 w-full' : 'bg-indigo-500 w-2/3'}`}></div>
                                        </div>
                                        {/* Remove from history button */}
                                        <button
                                            onClick={(e) => { e.stopPropagation(); setHistoryList(prev => prev.filter(h => h.id !== item.id)); }}
                                            className="absolute top-2 right-2 bg-black/80 hover:bg-red-600 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-all z-20 shadow-lg"
                                            title="Remove from history"
                                        >
                                            <X size={14} />
                                        </button>
                                    </div>
                                    <div className="mt-1 flex justify-between items-start">
                                        <div className="flex flex-col">
                                            <span className="text-xs font-semibold text-gray-200 line-clamp-1">{item.Title}</span>
                                            <span className="text-[10px] text-gray-400">{(item.Type === 'tv' || item.Type === 'series') ? `S${displaySeason}:E${displayEp}` : 'Movie'} {isWatched && '✓'}</span>
                                        </div>
                                    </div>
                                </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const NewEpisodesRow = () => {
                const [showsWithNewEps, setShowsWithNewEps] = useState([]);
                const [loading, setLoading] = useState(true);

                useEffect(() => {
                    const fetchNewEpisodes = async () => {
                        setLoading(true);
                        try {
                            const tvShows = new Map();
                            // Collect unique TV shows from Watchlist and Custom Lists
                            favorites.forEach(item => { if (item.Type === 'tv' || item.Type === 'series') tvShows.set(item.id, item); });
                            customLists.forEach(list => list.items.forEach(item => { if (item.Type === 'tv' || item.Type === 'series') tvShows.set(item.id, item); }));

                            if (tvShows.size === 0) {
                                setLoading(false);
                                return;
                            }

                            // Fetch details for all collected TV shows
                            const promises = Array.from(tvShows.keys()).map(id =>
                                fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${tmdbKey}&language=${dbLanguage}`).then(res => res.ok ? res.json() : null)
                            );
                            const details = await Promise.all(promises);

                            const newEpsList = [];
                            const sixtyDaysAgo = new Date();
                            sixtyDaysAgo.setDate(sixtyDaysAgo.getDate() - 60);
                            const today = new Date();

                            details.forEach(show => {
                                if (!show || !show.last_episode_to_air) return;
                                
                                const lastEp = show.last_episode_to_air;
                                if (!lastEp.air_date) return;
                                
                                const airDate = new Date(lastEp.air_date);

                                // Check if episode aired in the last 60 days, and has actually aired (not in the future)
                                if (airDate >= sixtyDaysAgo && airDate <= today) {
                                    // Check if the episode is marked as watched
                                    const isWatched = watchedEpisodes[show.id]?.[lastEp.season_number]?.includes(lastEp.episode_number);
                                    
                                    if (!isWatched) {
                                        newEpsList.push({
                                            ...tvShows.get(show.id),
                                            Title: show.name, // Ensure we have the latest localized title
                                            backdrop: show.backdrop_path ? `https://image.tmdb.org/t/p/w780${show.backdrop_path}` : null,
                                            Poster: show.poster_path ? `https://image.tmdb.org/t/p/w500${show.poster_path}` : null,
                                            newEpInfo: lastEp
                                        });
                                    }
                                }
                            });

                            // Sort by most recent air date
                            newEpsList.sort((a, b) => new Date(b.newEpInfo.air_date) - new Date(a.newEpInfo.air_date));
                            setShowsWithNewEps(newEpsList);
                        } catch (e) {
                            console.error("Failed to fetch new episodes", e);
                        }
                        setLoading(false);
                    };

                    fetchNewEpisodes();
                }, [favorites, customLists, watchedEpisodes, tmdbKey, dbLanguage]);

                if (!loading && showsWithNewEps.length === 0) return null;

                return (
                    <div className="mb-6 mt-4">
                        <div className="flex justify-between items-end px-4 mb-2">
                            <h2 className="text-base font-bold text-white tracking-wide flex items-center gap-2">
                                <Bell size={16} className="text-red-500" /> New Episodes for You
                            </h2>
                        </div>
                        <div className="flex overflow-x-auto gap-3 px-4 pb-2 hide-scrollbar snap-x">
                            {loading ? (
                                <div className="w-full flex gap-3">{[1,2,3].map(i => <div key={i} className="w-40 aspect-video bg-[#1e1e1e] rounded-md flex-shrink-0 animate-pulse"></div>)}</div>
                            ) : (
                                showsWithNewEps.map(item => (
                                    <div key={item.id} onClick={() => openDetails(item)} className="w-40 flex-shrink-0 cursor-pointer snap-start relative group">

            const PlayerOverlay = () => {
                const [showSettings, setShowSettings] = useState(false);
                const [showCastGuide, setShowCastGuide] = useState(false);
                const [copied, setCopied] = useState(false);
                const [iptvStreamId, setIptvStreamId] = useState('');
                const [autoSearchStatus, setAutoSearchStatus] = useState('idle'); 
                const [streamStatus, setStreamStatus] = useState('checking'); 
                const videoRef = useRef(null);

                if (!activePlayerMedia) return null;
                const isIptv = selectedServerId === 'iptv';

                useEffect(() => {
                    setIptvStreamId('');
                    setAutoSearchStatus('idle');
                }, [activePlayerMedia]);

                useEffect(() => {
                    if (!isIptv || !iptvCache.loaded || iptvStreamId || !activePlayerMedia) return;
                    const normalize = (str) => String(str || '').toLowerCase().replace(/[^a-z0-9]/g, '');
                    const targetName = normalize(activePlayerMedia.title);
                    setAutoSearchStatus('searching');

                    if (activePlayerMedia.type === 'movie') {
                        const match = iptvCache.vod.find(item => normalize(item.name) === targetName) || iptvCache.vod.find(item => normalize(item.name).includes(targetName));
                        if (match) { setIptvStreamId(`${match.stream_id}.${match.container_extension || 'mp4'}`); setAutoSearchStatus('found'); } else { setAutoSearchStatus('not_found'); }
                    } else if (activePlayerMedia.type === 'tv') {
                        const match = iptvCache.series.find(item => normalize(item.name) === targetName) || iptvCache.series.find(item => normalize(item.name).includes(targetName));
                        if (match) {
                            const cleanDomain = iptvDomain.replace(/\/$/, '');
                            const url = `${cleanDomain}/player_api.php?username=${iptvUser}&password=${iptvPass}&action=get_series_info&series_id=${match.series_id}`;
                            const fetchSeriesInfo = async () => {
                                try {
                                    let data = null;
                                    const proxies = ['', 'https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?'];
                                    for (const proxy of proxies) {
                                        try {
                                            const fetchUrl = proxy ? `${proxy}${encodeURIComponent(url)}` : url;
                                            const res = await fetch(fetchUrl, { cache: 'no-store' });
                                            if (res.ok) { data = await res.json(); break; }
                                        } catch (e) { continue; }
                                    }
                                    if (!data) throw new Error();
                                    const seasonData = data?.episodes?.[activePlayerMedia.season];
                                    if (seasonData && Array.isArray(seasonData)) {
                                        const ep = seasonData.find(e => parseInt(e.episode_num) === parseInt(activePlayerMedia.episode));
                                        if (ep && ep.id) { setIptvStreamId(`${ep.id}.${ep.container_extension || 'mp4'}`); setAutoSearchStatus('found'); return; }
                                    }
                                    setAutoSearchStatus('not_found');
                                } catch (err) { setAutoSearchStatus('not_found'); }
                            };
                            fetchSeriesInfo();
                        } else { setAutoSearchStatus('not_found'); }
                    }
                }, [selectedServerId, iptvCache.loaded, activePlayerMedia, iptvStreamId, isIptv, iptvDomain, iptvPass, iptvUser]);

                const activeUrl = useMemo(() => {
                    if (isIptv) {
                        if (!iptvStreamId || !iptvDomain || !iptvUser || !iptvPass) return '';
                        const typePath = activePlayerMedia.type === 'tv' ? 'series' : 'movie';
                        let streamPath = String(iptvStreamId);
                        if (!streamPath.includes('.')) streamPath += '.mp4';
                        return `${iptvDomain.replace(/\/$/, '')}/${typePath}/${iptvUser}/${iptvPass}/${streamPath}`;
                    }
                    const server = SERVERS.find(s => s.id === selectedServerId) || SERVERS[0];
                    return server.getUrl(activePlayerMedia.type, activePlayerMedia.tmdbId, activePlayerMedia.imdbId, activePlayerMedia.season, activePlayerMedia.episode);
                }, [activePlayerMedia, selectedServerId, isIptv, iptvStreamId, iptvDomain, iptvUser, iptvPass]);

                useEffect(() => {
                    if (activeUrl && isIptv && iptvStreamId) {
                        setStreamStatus('checking');
                        const controller = new AbortController();
                        fetch(activeUrl, { method: 'HEAD', mode: 'no-cors', cache: 'no-cache', signal: controller.signal })
                            .then(() => setStreamStatus('online')).catch(() => setStreamStatus('offline'));
                        setTimeout(() => controller.abort(), 5000);
                        return () => controller.abort();
                    } else if (activeUrl && !isIptv) {
                        setStreamStatus('online'); 
                    }
                }, [activeUrl, isIptv, iptvStreamId]);

                useEffect(() => {
                    if (!activeUrl || !isIptv || streamStatus !== 'online') return;
                    const video = videoRef.current;
                    if (!video) return;
                    let hlsInstance = null;
                    if (activeUrl.includes('.m3u8')) {
                        if (window.Hls && window.Hls.isSupported()) {
                            hlsInstance = new window.Hls({ enableWorker: true, lowLatencyMode: true });
                            hlsInstance.loadSource(activeUrl); hlsInstance.attachMedia(video);
                            hlsInstance.on(window.Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>e));
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = activeUrl; video.play().catch(e=>e);
                        }
                    } else { video.src = activeUrl; video.play().catch(e=>e); }
                    return () => { if (hlsInstance) hlsInstance.destroy(); if (video) { video.pause(); video.removeAttribute('src'); video.load(); } };
                }, [activeUrl, isIptv, streamStatus]);

                return (
                    <div className="fixed inset-0 z-[100] bg-black flex flex-col animate-in fade-in" dir={isRTL ? 'rtl' : 'ltr'}>
                        <div className="flex items-center justify-between p-4 bg-gradient-to-b from-black/80 to-transparent absolute top-0 left-0 right-0 z-30 transition-opacity duration-300">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setActivePlayerMedia(null)} className="text-white hover:text-gray-300 p-1"><ChevronDown size={28} className="rotate-90"/></button>
                                <span className="font-bold text-white text-sm sm:text-base line-clamp-1">{activePlayerMedia.title} {activePlayerMedia.type === 'tv' && `- S${activePlayerMedia.season} E${activePlayerMedia.episode}`}</span>
                            </div>
                            <div className="relative">
                                <button onClick={() => setShowSettings(!showSettings)} className="text-white p-2 hover:bg-white/10 rounded-full transition-colors"><Settings size={20}/></button>
                                {showSettings && (
                                    <>
                                        <div className="fixed inset-0 z-40" onClick={() => setShowSettings(false)}></div>
                                        <div className={`absolute top-full mt-2 w-64 bg-[#181818] border border-gray-800 rounded-xl shadow-2xl overflow-hidden z-50 ${isRTL ? 'left-0' : 'right-0'}`}>
                                            <button onClick={() => { setShowCastGuide(true); setShowSettings(false); }} className="w-full flex items-center gap-3 px-4 py-3 hover:bg-neutral-800 text-white text-sm border-b border-gray-800"><Cast size={16} className="text-indigo-400"/> Cast to TV</button>
                                            <div className="p-3">
                                                <div className="text-[10px] uppercase text-gray-500 mb-2 font-bold px-1">Change Server</div>
                                                <div className="flex flex-col gap-1 max-h-48 overflow-y-auto hide-scrollbar">
                                                    {SERVERS.map(s => <button key={s.id} onClick={() => { setSelectedServerId(s.id); setShowSettings(false); }} className={`flex items-center justify-between px-3 py-2 text-xs font-bold rounded-lg ${selectedServerId === s.id ? 'bg-indigo-600/20 text-indigo-400' : 'text-gray-300 hover:bg-neutral-800 hover:text-white'}`}>{s.name} {selectedServerId === s.id && <Check size={14} />}</button>)}
                                                </div>
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>

                        <div className="flex-grow flex flex-col items-center justify-center bg-black pt-14 pb-4 px-0 sm:px-4 overflow-y-auto relative z-10">
                            {isIptv && !activeUrl ? (
                                <div className="absolute inset-0 bg-[#0f0f0f] flex flex-col items-center justify-center p-6 text-center z-20">
                                    <Server size={48} className="text-indigo-500 mb-4" />
                                    <h3 className="text-xl font-bold mb-2 text-white">IPTV Stream Connection</h3>
                                    {!iptvCache.loaded && !iptvCache.error && <div className="text-indigo-400 mb-4 flex items-center gap-2 animate-pulse text-sm"><Database size={16} className="animate-spin" /> Loading IPTV Database...</div>}
                                    {autoSearchStatus === 'searching' && <div className="text-amber-400 mb-4 flex items-center gap-2 animate-pulse text-sm"><Search size={16} /> Auto-searching for "{activePlayerMedia.title}"...</div>}
                                    {iptvCache.error && <div className="text-red-400 mb-4 text-xs max-w-md bg-red-900/20 p-2 rounded border border-red-500/20">{iptvCache.error}</div>}
                                    {autoSearchStatus === 'not_found' && <div className="text-amber-400 mb-4 text-sm max-w-md bg-amber-900/20 p-3 rounded">Could not automatically match "{activePlayerMedia.title}" in your IPTV list.</div>}
                                    <p className="text-sm text-gray-400 max-w-md mb-6 leading-relaxed">Please manually enter the numeric Stream ID below.</p>
                                    <div className="flex flex-col gap-3 w-full max-w-xs">
                                        <input type="text" placeholder="Stream ID (e.g. 12345.mp4)" value={iptvStreamId} onChange={e => setIptvStreamId(e.target.value)} className="bg-neutral-800 border border-neutral-700 rounded px-4 py-3 text-white outline-none focus:border-indigo-500 text-center font-mono" />
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full aspect-video max-h-[75vh] max-w-6xl mx-auto rounded-lg overflow-hidden shadow-2xl relative">
                                    {isIptv && streamStatus === 'checking' && <div className="absolute inset-0 bg-neutral-900 flex flex-col items-center justify-center z-20"><Database size={32} className="text-indigo-500 animate-spin mb-4" /><p className="text-white font-bold">Pinging Stream Connection...</p></div>}
                                    {isIptv && streamStatus === 'offline' && <div className="absolute inset-0 bg-neutral-900 flex flex-col items-center justify-center z-20 p-6 text-center"><AlertCircle size={48} className="text-red-500 mb-4" /><h3 className="text-xl font-bold text-white mb-2">Stream Unreachable</h3><p className="text-sm text-gray-400 max-w-md mb-4">The browser blocked the connection, or the ID is invalid. Try opening in a new tab.</p><a href={activeUrl} target="_blank" className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg font-bold">Open Stream in New Tab</a></div>}
                                    {isIptv ? <video ref={videoRef} className={`absolute inset-0 w-full h-full bg-black ${streamStatus === 'online' ? 'opacity-100' : 'opacity-0'}`} controls autoPlay playsInline /> : <iframe src={activeUrl} className={`absolute inset-0 w-full h-full border-0 ${streamStatus === 'online' ? 'opacity-100' : 'opacity-0'}`} allowFullScreen allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-presentation allow-forms"></iframe>}
                                </div>
                            )}

                            <div className="w-full max-w-6xl mx-auto mt-4 px-4 sm:px-0">
                                <div className="flex items-center gap-3 bg-neutral-900 border border-neutral-800 p-2 sm:px-4 sm:py-3 rounded-lg shadow-lg">
                                    <Globe size={18} className="text-gray-500 flex-shrink-0" />
                                    <div className="flex-grow min-w-0 overflow-hidden text-ellipsis whitespace-nowrap"><span className="text-xs sm:text-sm text-gray-400 font-mono select-all" dir="ltr">{activeUrl || 'Awaiting Input...'}</span></div>
                                    <div className="flex items-center gap-2 flex-shrink-0">
                                        <button onClick={() => { try { const ta = document.createElement("textarea"); ta.value = activeUrl; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch(e){} }} disabled={!activeUrl} className="flex items-center justify-center gap-1.5 bg-neutral-800 hover:bg-neutral-700 disabled:opacity-50 text-white px-3 py-1.5 rounded transition-colors text-xs font-bold">
                                            {copied ? <CheckCheck size={14} className="text-green-400" /> : <Copy size={14} />}<span className="hidden sm:inline">{copied ? 'Copied!' : 'Copy Link'}</span>
                                        </button>
                                        {activeUrl && <a href={activeUrl} target="_blank" className="flex items-center justify-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded transition-colors text-xs font-bold shadow-lg shadow-indigo-900/20"><ExternalLink size={14} /><span className="hidden sm:inline">Open in Tab</span></a>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- Tab Views ---
            const HomeView = () => (
                <div className="pb-24 animate-in fade-in duration-500">
                    <HeroBanner endpoint="/trending/all/day" />
                    <div className="mt-[-80px] relative z-10">
                        <NewEpisodesRow />
                        <ContinueWatchingRow filterType="all" />
                        {/* Dynamic Personalization Row */}
                        {favoriteGenre && <MediaRow title="Recommended for You" url={`/discover/movie?with_genres=${favoriteGenre}&sort_by=popularity.desc`} onSeeAll={setSeeAllConfig} />}
                        {ROW_CONFIGS.home.map(row => <MediaRow key={row.title} title={row.title} url={row.url} onSeeAll={setSeeAllConfig} />)}
                    </div>
                </div>
            );

            const MoviesView = () => {
                const [filterGenre, setFilterGenre] = useState('');
                const [filterYear, setFilterYear] = useState('');
                
                const genres = [
                    {id: 28, name: 'Action'}, {id: 12, name: 'Adventure'}, {id: 16, name: 'Animation'},
                    {id: 35, name: 'Comedy'}, {id: 80, name: 'Crime'}, {id: 99, name: 'Documentary'},
                    {id: 18, name: 'Drama'}, {id: 10751, name: 'Family'}, {id: 14, name: 'Fantasy'},
                    {id: 36, name: 'History'}, {id: 27, name: 'Horror'}, {id: 10402, name: 'Music'},
                    {id: 9648, name: 'Mystery'}, {id: 10749, name: 'Romance'}, {id: 878, name: 'Sci-Fi'},
                    {id: 10770, name: 'TV Movie'}, {id: 53, name: 'Thriller'}, {id: 10752, name: 'War'}, {id: 37, name: 'Western'}
                ];
                const years = Array.from({length: 40}, (_, i) => new Date().getFullYear() - i);
                const isFiltering = filterGenre !== '' || filterYear !== '';

                return (
                    <div className="pb-24 animate-in fade-in duration-500 relative">
                        {/* Sticky Discovery Filter Bar */}
                        <div className="flex flex-wrap items-center gap-2 px-4 py-3 bg-[#0f0f0f]/95 backdrop-blur-md sticky top-0 z-40 border-b border-gray-800">
                            <Filter size={16} className="text-gray-400" />
                            <select value={filterGenre} onChange={(e) => setFilterGenre(e.target.value)} className="bg-neutral-900 text-white text-xs px-3 py-2 rounded-lg border border-neutral-700 outline-none">
                                <option value="">All Genres</option>
                                {genres.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                            </select>
                            <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="bg-neutral-900 text-white text-xs px-3 py-2 rounded-lg border border-neutral-700 outline-none">
                                <option value="">Any Year</option>
                                {years.map(y => <option key={y} value={y}>{y}</option>)}
                            </select>
                            {isFiltering && (
                                <button onClick={() => { setFilterGenre(''); setFilterYear(''); }} className="text-xs text-red-400 hover:text-red-300 px-2 font-bold transition-colors">Clear</button>
                            )}
                        </div>

                        {isFiltering ? (
                            <FilteredGridView type="movie" genre={filterGenre} year={filterYear} />
                        ) : (
                            <>
                                <HeroBanner endpoint="/trending/movie/day" />
                                <div className="mt-[-80px] relative z-10">
                                    <ContinueWatchingRow filterType="movie" />
                                    {ROW_CONFIGS.movies.map(row => <MediaRow key={row.title} title={row.title} url={row.url} onSeeAll={setSeeAllConfig} />)}
                                </div>
                            </>
                        )}
                    </div>
                );
            };

            const TvView = () => {
                const [filterGenre, setFilterGenre] = useState('');
                const [filterYear, setFilterYear] = useState('');
                
                const genres = [
                    {id: 10759, name: 'Action & Adventure'}, {id: 16, name: 'Animation'}, {id: 35, name: 'Comedy'},
                    {id: 80, name: 'Crime'}, {id: 99, name: 'Documentary'}, {id: 18, name: 'Drama'},
                    {id: 10751, name: 'Family'}, {id: 10762, name: 'Kids'}, {id: 9648, name: 'Mystery'},
                    {id: 10763, name: 'News'}, {id: 10764, name: 'Reality'}, {id: 10765, name: 'Sci-Fi & Fantasy'},
                    {id: 10766, name: 'Soap'}, {id: 10767, name: 'Talk'}, {id: 10768, name: 'War & Politics'}, {id: 37, name: 'Western'}
                ];
                const years = Array.from({length: 40}, (_, i) => new Date().getFullYear() - i);
                const isFiltering = filterGenre !== '' || filterYear !== '';

                return (
                    <div className="pb-24 animate-in fade-in duration-500 relative">
                        {/* Sticky Discovery Filter Bar */}
                        <div className="flex flex-wrap items-center gap-2 px-4 py-3 bg-[#0f0f0f]/95 backdrop-blur-md sticky top-0 z-40 border-b border-gray-800">
                            <Filter size={16} className="text-gray-400" />
                            <select value={filterGenre} onChange={(e) => setFilterGenre(e.target.value)} className="bg-neutral-900 text-white text-xs px-3 py-2 rounded-lg border border-neutral-700 outline-none">
                                <option value="">All Genres</option>
                                {genres.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                            </select>
                            <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="bg-neutral-900 text-white text-xs px-3 py-2 rounded-lg border border-neutral-700 outline-none">
                                <option value="">Any Year</option>
                                {years.map(y => <option key={y} value={y}>{y}</option>)}
                            </select>
                            {isFiltering && (
                                <button onClick={() => { setFilterGenre(''); setFilterYear(''); }} className="text-xs text-red-400 hover:text-red-300 px-2 font-bold transition-colors">Clear</button>
                            )}
                        </div>

                        {isFiltering ? (
                            <FilteredGridView type="tv" genre={filterGenre} year={filterYear} />
                        ) : (
                            <>
                                <HeroBanner endpoint="/trending/tv/day" />
                                <div className="mt-[-80px] relative z-10">
                                    <ContinueWatchingRow filterType="tv" />
                                    {ROW_CONFIGS.tv.map(row => <MediaRow key={row.title} title={row.title} url={row.url} onSeeAll={setSeeAllConfig} />)}
                                </div>
                            </>
                        )}
                    </div>
                );
            };

            const SearchView = () => {
                const [searchQuery, setSearchQuery] = useState('');
                const [results, setResults] = useState([]);
                const [topSearches, setTopSearches] = useState([]);
                const [loading, setLoading] = useState(false);

                useEffect(() => { fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${tmdbKey}&language=${dbLanguage}`).then(res => res.json()).then(data => setTopSearches(data.results || [])); }, [tmdbKey, dbLanguage]);

                useEffect(() => {
                    if (!searchQuery.trim()) { setResults([]); return; }
                    setLoading(true);
                    const handler = setTimeout(() => {
                        fetch(`https://api.themoviedb.org/3/search/multi?api_key=${tmdbKey}&language=${dbLanguage}&query=${encodeURIComponent(searchQuery)}`)
                            .then(res => res.json()).then(data => { setResults((data.results || []).filter(i => i.media_type !== 'person' && i.backdrop_path)); setLoading(false); });
                    }, 500);
                    return () => clearTimeout(handler);
                }, [searchQuery, tmdbKey, dbLanguage]);

                const displayList = searchQuery.trim() ? results : topSearches;

                return (
                    <div className="pt-12 pb-24 px-4 max-w-2xl mx-auto min-h-screen animate-in fade-in" dir={isRTL ? 'rtl' : 'ltr'}>
                        <div className="bg-[#2b2b2b] flex items-center px-4 py-3 rounded-md mb-6 sticky top-4 z-20 shadow-xl">
                            <Search size={20} className="text-gray-400 mr-3" />
                            <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search for a show, movie..." className="bg-transparent text-white w-full outline-none" dir="auto" />
                            {searchQuery && <button onClick={() => setSearchQuery('')}><X size={20} className="text-gray-400"/></button>}
                        </div>
                        <h2 className="text-xl font-bold mb-4">{searchQuery ? 'Results' : 'Top Searches'}</h2>
                        {loading ? <LoadingSpinner/> : (
                            <div className="space-y-4">
                                {displayList.map(item => (
                                    <div key={item.id} onClick={() => openDetails(item)} className="flex items-center gap-4 cursor-pointer group hover:bg-[#1e1e1e] p-2 rounded-lg transition-colors">
                                        <div className="relative w-32 aspect-video rounded overflow-hidden bg-neutral-800 flex-shrink-0">
                                            <img src={`https://image.tmdb.org/t/p/w300${item.backdrop_path || item.poster_path}`} className="w-full h-full object-cover" />
                                            <div className="absolute top-1 right-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1 backdrop-blur-md"><Star size={8} className="fill-amber-400 text-amber-400" /> {item.vote_average ? item.vote_average.toFixed(1) : 'NR'}</div>
                                        </div>
                                        <span className="font-bold text-sm sm:text-base flex-grow line-clamp-2">{item.title || item.name}</span>
                                        <button className="flex-shrink-0 p-2"><PlayCircle size={28} className="text-white group-hover:scale-110 transition-transform" /></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            const ProfileView = () => {
                const [activeProfileTab, setActiveProfileTab] = useState('watchlist'); // watchlist, lists, stats, settings
                const [newListMode, setNewListMode] = useState(false);
                const [newListName, setNewListName] = useState('');
                const [testState, setTestState] = useState({ loading: false, result: null, isError: false });

                // Stats Calculation Engine
                const stats = useMemo(() => {
                    let totalMinutes = 0;
                    let typeCount = { tv: 0, movie: 0 };
                    let genres = {};
                    
                    historyList.forEach(item => {
                        totalMinutes += item.runtime || (item.Type === 'movie' ? 120 : 45);
                        typeCount[item.Type] = (typeCount[item.Type] || 0) + 1;
                        if (item.genres) item.genres.forEach(g => { genres[g] = (genres[g] || 0) + 1; });
                    });

                    const totalHours = Math.floor(totalMinutes / 60);
                    const totalDays = (totalHours / 24).toFixed(1);
                    const topGenres = Object.entries(genres).sort((a,b) => b[1] - a[1]).slice(0, 3).map(g => GENRE_MAP[g[0]] || "Unknown");

                    return { totalHours, totalDays, typeCount, topGenres };
                }, [historyList]);

                // Settings Handlers
                const handleTestConnection = async () => {
                    if (!iptvDomain || !iptvUser || !iptvPass) { setTestState({ loading: false, result: 'Please fill in all credentials.', isError: true }); return; }
                    setTestState({ loading: true, result: null, isError: false });
                    try {
                        const url = `${iptvDomain.replace(/\/$/, '')}/player_api.php?username=${iptvUser}&password=${iptvPass}`;
                        const res = await fetch(url, { mode: 'cors', headers: { 'Accept': 'application/json' } });
                        if (res.ok) {
                            const data = await res.json();
                            if (data.user_info?.auth === 1) setTestState({ loading: false, result: `✅ Connected! Status: ${data.user_info.status}`, isError: false });
                            else setTestState({ loading: false, result: '❌ Invalid Username or Password.', isError: true });
                        } else throw new Error();
                    } catch(e) {
                        setTestState({ loading: false, result: '❌ Network/CORS Error. Ensure domain is correct.', isError: true });
                    }
                };

                const handleShareList = (list) => {
                    const text = `Check out my list "${list.name}" on Universal Index Player:\n\n` + list.items.map((i, idx) => `${idx + 1}. ${i.Title} (${i.Type})`).join('\n');
                    try {
                        const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
                        alert("List copied to clipboard! Share it with friends.");
                    } catch(e) {}
                };

                return (
                    <div className="pt-10 pb-24 max-w-4xl mx-auto min-h-screen animate-in fade-in" dir={isRTL ? 'rtl' : 'ltr'}>
                        {/* Profile Header */}
                        <div className="px-6 flex items-center justify-between mb-8">
                            <div className="flex items-center gap-4">
                                <div className="w-16 h-16 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shadow-lg"><User size={32} className="text-white"/></div>
                                <div><h1 className="text-2xl font-bold">My Library</h1><p className="text-sm text-gray-400">{historyList.length} items watched</p></div>
                            </div>
                            <div className="flex gap-2">
                                <button className="p-2 bg-[#1e1e1e] rounded-full hover:bg-neutral-800 text-amber-400 relative" title="Release Alerts (Coming Soon)"><Bell size={20} /><span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span></button>
                                <button onClick={() => setActiveProfileTab('settings')} className={`p-2 rounded-full transition-colors ${activeProfileTab === 'settings' ? 'bg-indigo-600 text-white' : 'bg-[#1e1e1e] hover:bg-neutral-800 text-gray-400'}`}><Settings size={20}/></button>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="px-6 flex gap-4 mb-8 border-b border-gray-800 pb-2 overflow-x-auto hide-scrollbar">
                            <button onClick={() => setActiveProfileTab('watchlist')} className={`pb-2 font-bold whitespace-nowrap ${activeProfileTab === 'watchlist' ? 'text-white border-b-2 border-indigo-500' : 'text-gray-500'}`}>Watchlist</button>
                            <button onClick={() => setActiveProfileTab('lists')} className={`pb-2 font-bold whitespace-nowrap ${activeProfileTab === 'lists' ? 'text-white border-b-2 border-indigo-500' : 'text-gray-500'}`}>Custom Lists</button>
                            <button onClick={() => setActiveProfileTab('stats')} className={`pb-2 font-bold whitespace-nowrap ${activeProfileTab === 'stats' ? 'text-white border-b-2 border-indigo-500' : 'text-gray-500'}`}>Viewing Stats</button>
                            <button onClick={() => setActiveProfileTab('history')} className={`pb-2 font-bold whitespace-nowrap ${activeProfileTab === 'history' ? 'text-white border-b-2 border-indigo-500' : 'text-gray-500'}`}>History</button>
                        </div>

                        <div className="px-6">
                            {/* WATCHLIST TAB */}
                            {activeProfileTab === 'watchlist' && (
                                <div className="animate-in fade-in">
                                    {favorites.length === 0 ? (
                                        <div className="text-center py-12 text-gray-500 bg-[#181818] rounded-xl border border-gray-800"><Heart size={32} className="mx-auto mb-3 opacity-20" /><p>Your watchlist is empty.</p></div>
                                    ) : (
                                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
                                            {favorites.map(item => (
                                                <div key={item.id} onClick={() => openDetails(item)} className="cursor-pointer transition-transform hover:scale-105">
                                                    <img src={item.Poster} className="w-full aspect-[2/3] object-cover rounded-md shadow-lg" />
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* CUSTOM LISTS TAB */}
                            {activeProfileTab === 'lists' && (
                                <div className="animate-in fade-in space-y-6">
                                    {newListMode ? (
                                        <div className="bg-[#181818] p-4 rounded-xl border border-gray-800 flex gap-3">
                                            <input type="text" autoFocus value={newListName} onChange={e => setNewListName(e.target.value)} placeholder="List Name (e.g. Anime)" className="bg-neutral-800 px-4 py-2 rounded outline-none flex-grow" />
                                            <button onClick={() => { createCustomList(newListName); setNewListMode(false); setNewListName(''); }} className="bg-indigo-600 px-4 py-2 rounded font-bold">Create</button>
                                            <button onClick={() => setNewListMode(false)} className="bg-neutral-700 px-4 py-2 rounded">Cancel</button>
                                        </div>
                                    ) : (
                                        <button onClick={() => setNewListMode(true)} className="w-full py-4 border-2 border-dashed border-gray-700 rounded-xl text-gray-400 hover:text-white hover:border-indigo-500 flex justify-center items-center gap-2 transition-colors font-bold"><Plus size={20}/> Create New List</button>
                                    )}

                                    {customLists.map(list => (
                                        <div key={list.id} className="bg-[#181818] rounded-xl border border-gray-800 overflow-hidden shadow-lg">
                                            <div className="p-4 bg-neutral-900 border-b border-gray-800 flex justify-between items-center">
                                                <h3 className="font-bold text-lg">{list.name} <span className="text-gray-500 text-sm font-normal">({list.items.length})</span></h3>
                                                <div className="flex gap-2">
                                                    <button onClick={() => handleShareList(list)} className="p-2 bg-neutral-800 hover:bg-neutral-700 rounded text-indigo-400" title="Copy to share"><Share2 size={16}/></button>
                                                    <button onClick={() => setCustomLists(prev => prev.filter(l => l.id !== list.id))} className="p-2 bg-neutral-800 hover:bg-red-900/40 rounded text-red-400" title="Delete List"><Trash2 size={16}/></button>
                                                </div>
                                            </div>
                                            <div className="p-4 flex overflow-x-auto gap-3 hide-scrollbar">
                                                {list.items.length === 0 ? <p className="text-sm text-gray-500 py-4">No items yet. Add them from a movie's details page.</p> : 
                                                    list.items.map(item => (
                                                        <img key={item.id} onClick={() => openDetails(item)} src={item.Poster} className="w-24 aspect-[2/3] object-cover rounded cursor-pointer hover:opacity-80 transition-opacity" />
                                                    ))
                                                }
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* STATS TAB */}
                            {activeProfileTab === 'stats' && (
                                <div className="animate-in fade-in space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-gradient-to-br from-indigo-900/40 to-[#181818] p-5 rounded-xl border border-indigo-500/20">
                                            <Clock size={24} className="text-indigo-400 mb-2"/>
                                            <p className="text-sm text-gray-400 font-medium">Total Watch Time</p>
                                            <h2 className="text-3xl font-extrabold mt-1">{stats.totalHours} <span className="text-lg font-medium text-gray-500">hrs</span></h2>
                                            <p className="text-xs text-indigo-300 mt-1">Approx. {stats.totalDays} days</p>
                                        </div>
                                        <div className="bg-gradient-to-br from-purple-900/40 to-[#181818] p-5 rounded-xl border border-purple-500/20">
                                            <PieChart size={24} className="text-purple-400 mb-2"/>
                                            <p className="text-sm text-gray-400 font-medium">Media Preference</p>
                                            <div className="flex justify-between items-end mt-2">
                                                <div><span className="text-xl font-bold text-white">{stats.typeCount.movie}</span> <span className="text-xs text-gray-500">Movies</span></div>
                                                <div><span className="text-xl font-bold text-white">{stats.typeCount.tv}</span> <span className="text-xs text-gray-500">Shows</span></div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-[#181818] p-5 rounded-xl border border-gray-800">
                                        <h3 className="font-bold text-gray-300 mb-4 flex items-center gap-2"><BarChart2 size={18}/> Top Genres</h3>
                                        {stats.topGenres.length === 0 ? <p className="text-sm text-gray-500">Watch more content to see stats.</p> : (
                                            <div className="space-y-3">
                                                {stats.topGenres.map((g, i) => (
                                                    <div key={i} className="flex items-center gap-3">
                                                        <div className="w-8 h-8 rounded bg-neutral-800 flex items-center justify-center font-bold text-gray-400">#{i+1}</div>
                                                        <div className="flex-grow bg-neutral-800 h-2 rounded-full overflow-hidden"><div className="bg-indigo-500 h-full" style={{width: `${100 - (i*20)}%`}}></div></div>
                                                        <div className="w-24 text-right text-sm font-bold">{g}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* HISTORY TAB */}
                            {activeProfileTab === 'history' && (
                                <div className="animate-in fade-in">
                                    {historyList.length === 0 ? (
                                        <div className="text-center py-12 text-gray-500 bg-[#181818] rounded-xl border border-gray-800"><History size={32} className="mx-auto mb-3 opacity-20" /><p>History is empty.</p></div>
                                    ) : (
                                        <div className="space-y-3">
                                            {historyList.map(h => (
                                                <div key={h.historyId} className="flex items-center p-3 bg-[#181818] border border-gray-800 rounded-xl">
                                                    <img src={h.Poster} className="w-12 h-16 object-cover rounded shadow mr-4" />
                                                    <div className="flex flex-col flex-grow">
                                                        <span className="font-bold text-sm">{h.Title}</span>
                                                        <span className="text-xs text-gray-400">{h.Type === 'tv' ? `S${h.season} E${h.episode}` : 'Movie'}</span>
                                                        <span className="text-[10px] text-gray-500 mt-1">{new Date(h.timestamp).toLocaleDateString()}</span>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => launchPlayer(h, h.season, h.episode, h.epTitle)} className="p-2 bg-indigo-600 hover:bg-indigo-500 rounded text-white"><Play size={16}/></button>
                                                        <button onClick={() => setHistoryList(prev => prev.filter(item => item.historyId !== h.historyId))} className="p-2 bg-neutral-800 hover:bg-neutral-700 rounded text-red-400"><Trash2 size={16}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* SETTINGS TAB (Hidden from subnav, accessed via gear) */}
                            {activeProfileTab === 'settings' && (
                                <div className="animate-in fade-in space-y-6">
                                    <div className="bg-[#181818] p-4 rounded-xl border border-gray-800">
                                        <h2 className="text-base font-bold text-white mb-4 flex items-center gap-2"><KeySquare size={18} className="text-indigo-400"/> IPTV Configuration</h2>
                                        <div className="bg-amber-900/20 border border-amber-500/20 text-amber-400/90 text-xs p-3 rounded mb-4 flex gap-2">
                                            <AlertCircle size={16} className="flex-shrink-0"/><p><strong>Important:</strong> HTTP IPTV requires local HTML file usage.</p>
                                        </div>
                                        <div className="space-y-3">
                                            <input type="text" placeholder="Domain URL" value={iptvDomain} onChange={e => setIptvDomain(e.target.value)} className="w-full bg-[#2b2b2b] px-3 py-2 rounded outline-none" />
                                            <input type="text" placeholder="Username" value={iptvUser} onChange={e => setIptvUser(e.target.value)} className="w-full bg-[#2b2b2b] px-3 py-2 rounded outline-none" />
                                            <input type="password" placeholder="Password" value={iptvPass} onChange={e => setIptvPass(e.target.value)} className="w-full bg-[#2b2b2b] px-3 py-2 rounded outline-none" />
                                        </div>
                                        <button onClick={handleTestConnection} className="w-full mt-4 bg-indigo-600 py-2 rounded font-bold text-sm">Test Connection</button>
                                        {testState.result && <div className={`mt-2 p-2 rounded text-xs ${testState.isError ? 'bg-red-900/30 text-red-400' : 'bg-green-900/30 text-green-400'}`}>{testState.result}</div>}
                                    </div>
                                    
                                    <div className="bg-[#181818] p-4 rounded-xl border border-gray-800">
                                        <label className="text-sm font-bold text-gray-400 mb-2 block">TMDB API Key</label>
                                        <input type="text" value={tmdbKey} onChange={e => setTmdbKey(e.target.value)} className="w-full bg-[#2b2b2b] px-3 py-2 rounded outline-none" />
                                    </div>
                                    
                                    <button onClick={() => { setHistoryList([]); setWatchedEpisodes({}); }} className="w-full bg-red-600/20 text-red-500 py-3 rounded-xl font-bold border border-red-500/20">Wipe All History & Stats Data</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // --- Render ---
            return (
                <div className="relative w-full h-full min-h-screen pb-20">
                    {seeAllConfig ? (
                        <SeeAllView config={seeAllConfig} onBack={() => setSeeAllConfig(null)} />
                    ) : (
                        <>
                            {activeTab === 'home' && <HomeView />}
                            {activeTab === 'movies' && <MoviesView />}
                            {activeTab === 'tv' && <TvView />}
                            {activeTab === 'search' && <SearchView />}
                            {activeTab === 'profile' && <ProfileView />}
                        </>
                    )}

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 bg-[#0f0f0f]/95 backdrop-blur-md border-t border-white/10 px-6 py-3 z-40">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            {[
                                { id: 'home', icon: Home, label: 'Home' },
                                { id: 'movies', icon: Film, label: 'Movies' },
                                { id: 'tv', icon: Tv, label: 'TV Shows' },
                                { id: 'search', icon: Search, label: 'Search' },
                                { id: 'profile', icon: User, label: 'My Library' }
                            ].map(tab => {
                                const Icon = tab.icon;
                                const isActive = activeTab === tab.id;
                                return (
                                    <button key={tab.id} onClick={() => {setActiveTab(tab.id); setSeeAllConfig(null); window.scrollTo(0,0);}} className={`flex flex-col items-center gap-1 ${isActive ? 'text-white' : 'text-gray-500 hover:text-gray-300'} transition-colors`}>
                                        <Icon size={22} className={isActive ? 'stroke-current' : ''} />
                                        <span className="text-[9px] font-medium">{tab.label}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* Overlays */}
                    {selectedMedia && <DetailsModal media={selectedMedia} onClose={closeDetails} />}
                    {activePlayerMedia && <PlayerOverlay />}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
