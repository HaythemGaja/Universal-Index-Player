<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Universal Index Player</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        .hero-gradient { background: linear-gradient(to top, #0f0f0f 0%, rgba(15,15,15,0.8) 20%, transparent 60%); }
        .modal-gradient { background: linear-gradient(to top, #171717 0%, #171717 80%, transparent 100%); }

        img { transition: opacity 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { Play, Search, Film, Tv, Settings, Heart, History, Trash2, X, Server, ChevronDown, ChevronRight, PlayCircle, AlertCircle, Globe, Star, Cast, Info, Plus, Check, MonitorPlay, Home, Copy, CheckCheck, ArrowLeft, ExternalLink, KeySquare, Database, User, ListPlus, BarChart2, CheckCircle2, Circle, Share2, Clock, PieChart, Sparkles, Bell, Filter } from 'https://esm.sh/lucide-react@0.292.0';

        // --- Configurations ---
        const DEFAULT_SERVERS = [
          { id: 'streamimdb', name: 'StreamIMDb', urlTemplate: 'https://streamimdb.me/embed/{type}/{imdb}/{s}/{e}' },
          { id: 'vaplayer', name: 'VAPlayer', urlTemplate: 'https://vaplayer.ru/embed/{type}/{imdb}?s={s}&e={e}' },
          { id: 'vidsrc', name: 'VidSrc', urlTemplate: 'https://vidsrc.me/embed/{type}?tmdb={tmdb}&season={s}&episode={e}' },
          { id: 'autoembed', name: 'AutoEmbed', urlTemplate: 'https://autoembed.to/{type}/tmdb/{tmdb}-{s}-{e}' },
          { id: 'smashy', name: 'SmashyStream', urlTemplate: 'https://player.smashy.stream/{type}/{tmdb}?s={s}&e={e}' },
          { id: 'vidsrcpro', name: 'VidSrc Pro', urlTemplate: 'https://vidsrc.cc/v2/embed/{type}/{tmdb}/{s}/{e}' }
        ];

        const ROW_CONFIGS = {
            home: [
                { title: 'Trending Today', url: '/trending/all/day' },
                { title: 'Movies Trending Today', url: '/trending/movie/day' },
                { title: 'TV Shows Trending Today', url: '/trending/tv/day' },
                { title: 'Box Office', url: '/movie/now_playing' }
            ],
            movies: [
                { title: 'Trending Movies', url: '/trending/movie/week' },
                { title: 'Latest Releases', url: '/movie/now_playing' },
                { title: 'Popular Movies', url: '/movie/popular' },
                { title: 'All Time Favorite Movies', url: '/movie/top_rated' },
                { title: 'Marvel Studios', url: '/discover/movie?with_companies=420&sort_by=popularity.desc' },
                { title: 'Pixar', url: '/discover/movie?with_companies=3&sort_by=popularity.desc' },
                { title: 'Warner Bros.', url: '/discover/movie?with_companies=174&sort_by=popularity.desc' },
                { title: 'Disney', url: '/discover/movie?with_companies=2&sort_by=popularity.desc' }
            ],
            tv: [
                { title: 'Trending TV Shows', url: '/trending/tv/week' },
                { title: 'Latest Releases', url: '/tv/on_the_air' },
                { title: 'Popular TV Shows', url: '/tv/popular' },
                { title: 'All Time Favorites', url: '/tv/top_rated' },
                { title: 'Netflix Originals', url: '/discover/tv?with_networks=213&sort_by=popularity.desc' },
                { title: 'Apple TV+', url: '/discover/tv?with_networks=2552&sort_by=popularity.desc' },
                { title: 'Amazon Prime', url: '/discover/tv?with_networks=1024&sort_by=popularity.desc' },
                { title: 'HBO', url: '/discover/tv?with_networks=49&sort_by=popularity.desc' }
            ]
        };

        const GENRE_MAP = {
            28: "Action", 12: "Adventure", 16: "Animation", 35: "Comedy", 80: "Crime", 99: "Documentary", 18: "Drama", 10751: "Documentary", 10752: "Family", 14: "Fantasy", 36: "History", 27: "Horror", 10402: "Music", 9648: "Mystery", 10749: "Romance", 878: "Science Fiction", 10770: "TV Movie", 53: "Thriller", 10759: "Action & Adventure", 10762: "Kids", 10763: "News", 10764: "Reality", 10765: "Sci-Fi & Fantasy", 10766: "Soap", 10767: "Talk", 10768: "War & Politics", 37: "Western"
        };

        // --- Global Context for stable architecture ---
        const AppContext = React.createContext(null);

        const LoadingSpinner = () => (
            <div className="flex justify-center items-center py-10">
                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
            </div>
        );

        // --- Extracted Components (Stable References) ---

        const MediaRow = ({ title, url, items, onSeeAll }) => {
            const { tmdbKey, dbLanguage, hideAdult, openDetails } = React.useContext(AppContext);
            const [rowItems, setRowItems] = useState(items || []);
            const [loading, setLoading] = useState(!items);

            useEffect(() => {
                if (url && !items) {
                    fetch(`https://api.themoviedb.org/3${url}${url.includes('?') ? '&' : '?'}api_key=${tmdbKey}&language=${dbLanguage}&include_adult=${!hideAdult}`)
                        .then(res => res.json()).then(data => {
                            setRowItems((data.results || []).filter(i => i.poster_path && !i.known_for && (hideAdult ? !i.adult : true)));
                            setLoading(false);
                        }).catch(() => setLoading(false));
                }
            }, [url, tmdbKey, dbLanguage, items, hideAdult]);

            if (!loading && rowItems.length === 0) return null;

            return (
                <div className="mb-6">
                    <div className="flex justify-between items-end px-4 mb-2">
                        <h2 className="text-base font-bold text-white tracking-wide flex items-center gap-2">
                            {title === 'Recommended for You' && <Sparkles size={16} className="text-amber-400" />}
                            {title}
                        </h2>
                        <span onClick={() => onSeeAll && onSeeAll({title, url: url || items})} className="text-xs text-indigo-400 font-semibold cursor-pointer hover:underline">See All</span>
                    </div>
                    <div className="flex overflow-x-auto gap-3 px-4 pb-2 hide-scrollbar snap-x">
                        {loading ? <div className="w-full flex gap-3">{[1,2,3,4,5].map(i => <div key={i} className="w-28 h-40 bg-[#1e1e1e] rounded-md flex-shrink-0 animate-pulse"></div>)}</div> : 
                            rowItems.map(item => (
                                <div key={item.id} tabIndex={0} onClick={() => openDetails(item)} onKeyDown={(e) => e.key === 'Enter' && openDetails(item)} className="w-28 flex-shrink-0 cursor-pointer snap-start transition-transform hover:scale-105 focus:scale-105 focus:ring-2 focus:ring-indigo-500 focus:z-10 outline-none relative rounded-md">
                                    <img src={item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster} alt={item.title || item.name} className="w-full h-40 object-cover rounded-md shadow-lg" loading="lazy" />
                                    <div className="absolute top-1 right-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1 backdrop-blur-md">
                                        <Star size={10} className="fill-amber-400 text-amber-400" /> {item.vote_average ? item.vote_average.toFixed(1) : 'NR'}
                                    </div>
                                </div>
                            ))
                        }
                    </div>
                </div>
            );
        };

        const ContinueWatchingRow = ({ filterType = 'all' }) => {
            const { historyList, setHistoryList, watchedEpisodes, openDetails } = React.useContext(AppContext);
            
            // If history is empty, don't render the row at all
            if (historyList.length === 0) return null;

            const uniqueHistory = [];
            const seenIds = new Set();

            // Filter history to ensure we only show unique items based on the current tab (Movies vs TV)
            historyList.forEach(item => {
                const matchesFilter = filterType === 'all' || 
                                      item.Type === filterType || 
                                      (filterType === 'tv' && item.Type === 'series') ||
                                      (item.source === 'iptv' && item.type === filterType);
                
                const uniqueKey = item.source === 'iptv' ? `iptv-${item.id}` : item.id;
                
                if (!seenIds.has(uniqueKey) && matchesFilter) { 
                    seenIds.add(uniqueKey); 
                    uniqueHistory.push(item); 
                } 
            });

            if (uniqueHistory.length === 0) return null;

            const headerTitle = filterType === 'live' ? 'Recent Channels' : 'Continue Watching';

            return (
                <div className="mb-6 mt-4">
                    <h2 className="text-base font-bold text-white tracking-wide px-4 mb-2">{headerTitle}</h2>
                    
                    <div className="flex overflow-x-auto gap-3 px-4 pb-2 hide-scrollbar snap-x">
                        {/* Slice to show only the 15 most recent items */}
                        {uniqueHistory.slice(0, 15).map(item => {
                            const watchedData = watchedEpisodes[item.id] || {};
                            let displaySeason = item.season;
                            let displayEp = item.episode;
                            let isWatched = false;
                            
                            // Check if this specific episode was marked as watched
                            if ((item.Type === 'tv' || item.Type === 'series') && watchedData[item.season]?.includes(parseInt(item.episode))) {
                                isWatched = true; 
                            }

                            const isLive = item.source === 'iptv' && item.type === 'live';

                            return (
                            <div 
                                key={item.historyId} 
                                tabIndex={0} 
                                onClick={() => openDetails(item)} // Opens TMDB Details Modal
                                onKeyDown={(e) => e.key === 'Enter' && openDetails(item)}
                                className={`flex-shrink-0 cursor-pointer snap-start relative group focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:z-10 rounded-md ${isLive ? 'w-32' : 'w-40'}`}
                            >
                                
                                <div className={`relative w-full ${isLive ? 'aspect-[4/3] bg-neutral-900 p-2' : 'aspect-video bg-neutral-800'} rounded-md overflow-hidden border border-neutral-700 flex flex-col items-center justify-center`}>
                                    {/* Backdrop Image */}
                                    <img 
                                        src={item.backdrop || item.Poster || item.icon} 
                                        className="absolute inset-0 w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-opacity z-0" 
                                        onError={(e) => e.target.style.display='none'} 
                                    />

                                    {/* Hover Play Icon */}
                                    <div className="absolute inset-0 flex items-center justify-center z-10 bg-black/0 group-hover:bg-black/40 transition-colors">
                                        <PlayCircle size={36} className="text-white shadow-xl opacity-0 group-hover:opacity-100 scale-75 group-hover:scale-100 transition-all" />
                                    </div>

                                    {/* Progress Bar (Green if watched, Purple if partially watched/Movie) */}
                                    {!isLive && (
                                        <div className="absolute bottom-0 left-0 right-0 h-1 bg-neutral-700 z-10">
                                            <div className={`h-full ${isWatched ? 'bg-green-500 w-full' : 'bg-indigo-500 w-2/3'}`}></div>
                                        </div>
                                    )}

                                    {/* Remove from History 'X' Button */}
                                    <button
                                        onClick={(e) => { 
                                            e.stopPropagation(); 
                                            setHistoryList(prev => prev.filter(h => h.historyId !== item.historyId)); 
                                        }}
                                        className="absolute top-2 right-2 bg-black/80 hover:bg-red-600 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-all z-20 shadow-lg"
                                        title="Remove from history"
                                    >
                                        <X size={14} />
                                    </button>
                                </div>
                                
                                {/* Text Metadata below the image */}
                                <div className="mt-1 flex justify-between items-start px-1">
                                    <div className={`flex flex-col w-full ${isLive ? 'text-center' : 'text-left'}`}>
                                        <span className="text-xs font-semibold text-gray-200 line-clamp-1">{item.Title}</span>
                                        {!isLive && (
                                            <span className="text-[10px] text-gray-400">
                                                {/* Shows "S1:E1" for TV, or "Movie" */}
                                                {item.source === 'iptv' ? (item.epTitle || 'VOD') : ((item.Type === 'tv' || item.Type === 'series') ? `S${displaySeason}:E${displayEp}` : 'Movie')}
                                                {/* Adds a checkmark if episode is fully watched */}
                                                {isWatched && ' ✓'}
                                            </span>                            
                                        )}
                                    </div>
                                </div>
                            </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const NewEpisodesRow = () => {
            const { notifications, loadingNotifications, openDetails } = React.useContext(AppContext);

            if (!loadingNotifications && notifications.length === 0) return null;

            return (
                <div className="mb-6 mt-4">
                    <div className="flex justify-between items-end px-4 mb-2">
                        <h2 className="text-base font-bold text-white tracking-wide flex items-center gap-2">
                            <Bell size={16} className="text-red-500" /> New Episodes for You
                        </h2>
                    </div>
                    <div className="flex overflow-x-auto gap-3 px-4 pb-2 hide-scrollbar snap-x">
                        {loadingNotifications ? (
                            <div className="w-full flex gap-3">{[1,2,3].map(i => <div key={i} className="w-40 aspect-video bg-[#1e1e1e] rounded-md flex-shrink-0 animate-pulse"></div>)}</div>
                        ) : (
                            notifications.map(item => (
                                <div key={item.id} tabIndex={0} onClick={() => openDetails(item)} onKeyDown={(e) => e.key === 'Enter' && openDetails(item)} className="w-40 flex-shrink-0 cursor-pointer snap-start relative group focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:z-10 rounded-md">
                                    <div className="relative w-full aspect-video rounded-md overflow-hidden bg-neutral-800 border border-red-500/40">
                                        <img src={item.newEpInfo.still_path ? `https://image.tmdb.org/t/p/w300${item.newEpInfo.still_path}` : item.backdrop || item.Poster} className="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-opacity" />
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <PlayCircle size={36} className="text-white shadow-xl opacity-80 group-hover:opacity-100 group-hover:scale-110 transition-all" />
                                        </div>
                                        <div className="absolute top-1 right-1 bg-red-600 text-white text-[9px] font-bold px-1.5 py-0.5 rounded shadow flex items-center gap-1"><Sparkles size={8}/> NEW</div>
                                    </div>
                                    <div className="mt-1 flex justify-between items-start">
                                        <div className="flex flex-col">
                                            <span className="text-xs font-semibold text-gray-200 line-clamp-1">{item.Title}</span>
                                            <span className="text-[10px] text-red-400 font-medium">S{item.newEpInfo.season_number} E{item.newEpInfo.episode_number} &bull; {new Date(item.newEpInfo.air_date).toLocaleDateString(undefined, {month: 'short', day: 'numeric'})}</span>
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const SeeAllView = ({ config, onBack }) => {
            const { tmdbKey, dbLanguage, hideAdult, openDetails } = React.useContext(AppContext);
            const [items, setItems] = useState([]);
            const [page, setPage] = useState(1);
            const [loading, setLoading] = useState(false);
            const [hasMore, setHasMore] = useState(true);

            useEffect(() => {
                if (Array.isArray(config.url)) {
                    setItems(config.url); setHasMore(false); return;
                }
                setLoading(true);
                const sep = config.url.includes('?') ? '&' : '?';
                fetch(`https://api.themoviedb.org/3${config.url}${sep}api_key=${tmdbKey}&language=${dbLanguage}&page=${page}&include_adult=${!hideAdult}`)
                    .then(res => res.json()).then(data => {
                        const valid = (data.results || []).filter(i => i.poster_path && !i.known_for && (hideAdult ? !i.adult : true));
                        setItems(prev => page === 1 ? valid : [...prev, ...valid]);
                        setHasMore(data.page < data.total_pages);
                        setLoading(false);
                    }).catch(() => setLoading(false));
            }, [config.url, page, tmdbKey, dbLanguage, hideAdult]);

            return (
                <div className="pt-8 pb-24 px-4 max-w-5xl mx-auto min-h-screen animate-in fade-in">
                    <div className="flex items-center gap-4 mb-6 sticky top-0 bg-[#0f0f0f]/90 backdrop-blur-md py-4 z-20">
                        <button onClick={onBack} className="p-2 bg-[#1e1e1e] hover:bg-[#2b2b2b] rounded-full transition-colors"><ArrowLeft size={20}/></button>
                        <h1 className="text-xl font-bold">{config.title}</h1>
                    </div>
                    {items.length === 0 && !loading && <div className="text-center text-gray-500 py-10">This list is empty.</div>}
                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3 sm:gap-4">
                        {items.map(item => (
                            <div key={item.id} tabIndex={0} onClick={() => openDetails(item)} onKeyDown={(e) => e.key === 'Enter' && openDetails(item)} className="cursor-pointer transition-transform hover:scale-105 focus:scale-105 focus:ring-2 focus:ring-indigo-500 focus:z-10 outline-none relative rounded-md">
                                <img src={item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster} className="w-full aspect-[2/3] object-cover rounded-md shadow-lg" loading="lazy" />
                                <div className="absolute top-1 right-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1 backdrop-blur-md">
                                    <Star size={10} className="fill-amber-400 text-amber-400" /> {item.vote_average ? item.vote_average.toFixed(1) : 'NR'}
                                </div>
                            </div>
                        ))}
                    </div>
                    {hasMore && (
                        <div className="mt-8 flex justify-center">
                            <button onClick={() => setPage(p => p + 1)} disabled={loading} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded font-bold transition-colors disabled:opacity-50">
                                {loading ? 'Loading...' : 'Load More'}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const FilteredGridView = ({ type, genre, year }) => {
            const { tmdbKey, dbLanguage, hideAdult, openDetails } = React.useContext(AppContext);
            const [items, setItems] = useState([]);
            const [page, setPage] = useState(1);
            const [loading, setLoading] = useState(false);
            const [hasMore, setHasMore] = useState(true);

            useEffect(() => { setItems([]); setPage(1); setHasMore(true); }, [type, genre, year]);

            useEffect(() => {
                if (!genre && !year) return;
                setLoading(true);
                const baseUrl = type === 'movie' ? '/discover/movie' : '/discover/tv';
                const yearParam = type === 'movie' ? 'primary_release_year' : 'first_air_date_year';
                const url = `${baseUrl}?sort_by=popularity.desc${genre ? `&with_genres=${genre}` : ''}${year ? `&${yearParam}=${year}` : ''}&api_key=${tmdbKey}&language=${dbLanguage}&page=${page}&include_adult=${!hideAdult}`;

                fetch(`https://api.themoviedb.org/3${url}`)
                    .then(res => res.json())
                    .then(data => {
                        const valid = (data.results || []).filter(i => i.poster_path && !i.known_for && (hideAdult ? !i.adult : true));
                        setItems(prev => page === 1 ? valid : [...prev, ...valid]);
                        setHasMore(data.page < data.total_pages);
                        setLoading(false);
                    }).catch(() => setLoading(false));
            }, [type, genre, year, page, tmdbKey, dbLanguage, hideAdult]);

            if (!genre && !year) return null;

            return (
                <div className="pt-4 pb-24 px-4 max-w-5xl mx-auto animate-in fade-in">
                    {items.length === 0 && !loading && <div className="text-center text-gray-500 py-10">No results found for this filter.</div>}
                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3 sm:gap-4">
                        {items.map(item => (
                            <div key={item.id} tabIndex={0} onClick={() => openDetails(item)} onKeyDown={(e) => e.key === 'Enter' && openDetails(item)} className="cursor-pointer transition-transform hover:scale-105 focus:scale-105 focus:ring-2 focus:ring-indigo-500 focus:z-10 outline-none relative rounded-md">
                                <img src={item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : item.Poster} className="w-full aspect-[2/3] object-cover rounded-md shadow-lg" loading="lazy" />
                                <div className="absolute top-1 right-1 bg-black/70 text-white text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-1 backdrop-blur-md">
                                    <Star size={10} className="fill-amber-400 text-amber-400" /> {item.vote_average ? item.vote_average.toFixed(1) : 'NR'}
                                </div>
                            </div>
                        ))}
                    </div>
                    {hasMore && (
                        <div className="mt-8 flex justify-center">
                            <button onClick={() => setPage(p => p + 1)} disabled={loading} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded font-bold transition-colors disabled:opacity-50">
                                {loading ? 'Loading...' : 'Load More'}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const HeroBanner = ({ endpoint }) => {
            const { tmdbKey, dbLanguage, hideAdult, favorites, toggleFavorite, openDetails, launchPlayer } = React.useContext(AppContext);
            const [heroItem, setHeroItem] = useState(null);
            
            useEffect(() => {
                fetch(`https://api.themoviedb.org/3${endpoint}?api_key=${tmdbKey}&language=${dbLanguage}`)
                    .then(res => res.json()).then(data => {
                        const validList = (data.results || []).filter(i => hideAdult ? !i.adult : true);
                        const valid = validList.find(i => i.backdrop_path && i.overview);
                        setHeroItem(valid || validList[0]);
                    });
            }, [endpoint, tmdbKey, dbLanguage, hideAdult]);

            if (!heroItem) return <div className="h-[60vh] w-full bg-neutral-900 animate-pulse"></div>;
            const isFav = favorites.some(f => f.id === heroItem.id);

            return (
                <div className="relative w-full h-[65vh] sm:h-[75vh] flex flex-col justify-end pb-12">
                    <div className="absolute inset-0 z-0">
                        <img src={`https://image.tmdb.org/t/p/original${heroItem.backdrop_path || heroItem.poster_path}`} className="w-full h-full object-cover" />
                        <div className="absolute inset-0 hero-gradient"></div>
                    </div>
                    <div className="relative z-10 px-4 sm:px-8 flex flex-col items-center text-center space-y-4">
                        <h1 className="text-3xl sm:text-5xl font-extrabold text-white drop-shadow-lg">{heroItem.title || heroItem.name}</h1>
                        <div className="flex items-center gap-2 text-xs font-semibold text-gray-300">
                            <span className="text-green-500 font-bold">{Math.round((heroItem.vote_average || 0) * 10)}% Match</span>
                            <span className="flex items-center gap-1 text-amber-400"><Star size={12} className="fill-amber-400"/> {heroItem.vote_average ? heroItem.vote_average.toFixed(1) : 'NR'}</span>
                            <span>{(heroItem.release_date || heroItem.first_air_date || '').substring(0,4)}</span>
                            <span className="border border-gray-600 px-1 rounded text-[10px]">HD</span>
                        </div>
                        <div className="flex items-center justify-center gap-4 w-full max-w-sm mt-2">
                            <button onClick={() => toggleFavorite(heroItem)} className="flex flex-col items-center gap-1 text-gray-300 hover:text-white transition-colors">
                                {isFav ? <Check size={24} /> : <Plus size={24} />}
                                <span className="text-[10px] font-medium">Watchlist</span>
                            </button>
                            <button onClick={() => openDetails(heroItem)} className="flex-1 flex items-center justify-center gap-2 bg-white text-black py-2 rounded font-bold hover:bg-gray-200 transition-colors shadow-lg">
                                <Play size={20} className="fill-black" /> Play
                            </button>
                            <button onClick={() => openDetails(heroItem)} className="flex flex-col items-center gap-1 text-gray-300 hover:text-white transition-colors">
                                <Info size={24} />
                                <span className="text-[10px] font-medium">Info</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const DetailsModal = ({ media, onClose }) => {
            const { tmdbKey, dbLanguage, watchedEpisodes, markEpisodeWatched, favorites, toggleFavorite, customLists, toggleItemInList, launchPlayer } = React.useContext(AppContext);
            const isRTL = dbLanguage === 'ar';
            const [details, setDetails] = useState(null);
            const [episodes, setEpisodes] = useState([]);
            const [season, setSeason] = useState(1);
            const [loading, setLoading] = useState(true);
            const [showListMenu, setShowListMenu] = useState(false);
            const [showTrailer, setShowTrailer] = useState(false); 
            const [confirmMarkPrevious, setConfirmMarkPrevious] = useState(null); // Modal for marking previous episodes

            const type = media.media_type || media.Type || (media.name ? 'tv' : 'movie');

            useEffect(() => {
                setLoading(true);
                fetch(`https://api.themoviedb.org/3/${type}/${media.id}?api_key=${tmdbKey}&language=${dbLanguage}&append_to_response=external_ids,credits,videos`)
                    .then(res => res.json()).then(data => {
                        setDetails(data);
                        if (type === 'tv' && data.seasons?.length > 0) {
                            let targetSeason = 1;
                            if (media.season) {
                                targetSeason = parseInt(media.season);
                            } else {
                                const watchedKeys = Object.keys(watchedEpisodes[media.id] || {}).map(Number).filter(n => !isNaN(n));
                                if (watchedKeys.length > 0) {
                                    targetSeason = Math.max(...watchedKeys);
                                } else {
                                    targetSeason = data.seasons.find(s => s.season_number > 0)?.season_number || 1;
                                }
                            }
                            setSeason(targetSeason);
                        } else {
                            setLoading(false);
                        }
                    });
            }, [media.id, type, tmdbKey, dbLanguage]);

            useEffect(() => {
                if (type === 'tv' && details) {
                    setLoading(true);
                    fetch(`https://api.themoviedb.org/3/tv/${media.id}/season/${season}?api_key=${tmdbKey}&language=${dbLanguage}`)
                        .then(res => res.json()).then(data => { setEpisodes(data.episodes || []); setLoading(false); });
                }
            }, [season, details, media.id, type, tmdbKey, dbLanguage]);

            if (!details) return <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center"><LoadingSpinner/></div>;

            const isFav = favorites.some(f => f.id === details.id);
            const showWatchedMap = watchedEpisodes[details.id] || {};

            // NEW: Future date helpers for unaired content
            const isFutureDate = (dateString) => dateString && new Date(dateString) > new Date();
            const formatDate = (dateString) => dateString ? new Date(dateString).toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'}) : 'TBA';

            const isUnairedMovie = type === 'movie' && isFutureDate(details.release_date);
            const isUnairedShow = type === 'tv' && isFutureDate(details.first_air_date);

            let nextEpToPlay = episodes[0];
            let isNextEpUnaired = false;
            
            if (type === 'tv' && episodes.length > 0) {
                const availableEpisodes = episodes.filter(e => !isFutureDate(e.air_date));
                
                // 1. If opened from history, prioritize the exact episode they clicked
                if (media.season && parseInt(media.season) === season && media.episode) {
                    nextEpToPlay = episodes.find(e => e.episode_number === parseInt(media.episode)) || episodes[0];
                } 
                // 2. Otherwise find the next unwatched episode
                else if (availableEpisodes.length > 0) {
                    const watchedInSeason = showWatchedMap[season] || [];
                    const nextEp = availableEpisodes.find(e => !watchedInSeason.includes(e.episode_number));
                    if (nextEp) {
                        nextEpToPlay = nextEp;
                    } else {
                        nextEpToPlay = availableEpisodes[availableEpisodes.length - 1]; // Fallback to last aired
                    }
                } 
                // 3. Fallback for unaired seasons
                else {
                    nextEpToPlay = episodes[0];
                    isNextEpUnaired = true; // Flag to disable season resume button
                }
            }

            const videos = details.videos?.results || [];
            const trailer = videos.find(v => v.type === 'Trailer' && v.site !== 'YouTube')
                         || videos.find(v => v.type === 'Trailer' && v.site === 'YouTube')
                         || videos.find(v => v.site !== 'YouTube')
                         || videos.find(v => v.site === 'YouTube');

            const getEmbedSrc = (video) => {
                if (!video) return '';
                if (video.site === 'Vimeo') return `https://player.vimeo.com/video/${video.key}?autoplay=1`;
                return `https://www.youtube.com/embed/${video.key}?autoplay=1`;
            };

            const getExternalLink = (video) => {
                if (!video) return '';
                if (video.site === 'Vimeo') return `https://vimeo.com/${video.key}`;
                return `https://www.youtube.com/watch?v=${video.key}`;
            };

            // Custom handle toggle logic to prompt marking previous episodes
            const handleToggleWatch = (ep) => {
                const isEpWatched = showWatchedMap[season]?.includes(ep.episode_number);
                if (!isEpWatched) {
                    const watchedInSeason = showWatchedMap[season] || [];
                    const previousUnwatched = episodes.filter(e => e.episode_number < ep.episode_number && !watchedInSeason.includes(e.episode_number));
                    if (previousUnwatched.length > 0) {
                        setConfirmMarkPrevious({ ep, previousUnwatched });
                    } else {
                        markEpisodeWatched(details.id, season, ep.episode_number, true);
                    }
                } else {
                    markEpisodeWatched(details.id, season, ep.episode_number, false);
                }
            };

            const confirmMarkAll = () => {
                if (!confirmMarkPrevious) return;
                const { ep, previousUnwatched } = confirmMarkPrevious;
                previousUnwatched.forEach(e => markEpisodeWatched(details.id, season, e.episode_number, true));
                markEpisodeWatched(details.id, season, ep.episode_number, true);
                setConfirmMarkPrevious(null);
            };

            const confirmMarkOnlyCurrent = () => {
                if (!confirmMarkPrevious) return;
                markEpisodeWatched(details.id, season, confirmMarkPrevious.ep.episode_number, true);
                setConfirmMarkPrevious(null);
            };

            return (
                <div className="fixed inset-0 z-[60] bg-[#0f0f0f] overflow-y-auto hide-scrollbar animate-in slide-in-from-bottom-4" onClick={e => e.stopPropagation()} dir={isRTL ? 'rtl' : 'ltr'}>
                    <button onClick={onClose} className={`fixed top-4 ${isRTL ? 'left-4' : 'right-4'} z-[70] bg-black/60 p-3 rounded-full text-white hover:bg-black/80 backdrop-blur-md transition-all shadow-xl`}>
                        <X size={24} />
                    </button>
                    
                    <div className="w-full max-w-6xl mx-auto bg-[#131313] min-h-screen shadow-2xl relative pb-20 border-x border-neutral-900">
                        {/* Trailer/Hero Section */}
                        <div className="relative w-full aspect-video md:aspect-[21/9] bg-black">
                            {showTrailer && trailer ? (
                                <>
                                    <iframe className="absolute inset-0 w-full h-full z-10" src={getEmbedSrc(trailer)} allow="autoplay; encrypted-media; fullscreen" allowFullScreen></iframe>
                                    <button onClick={(e) => { e.stopPropagation(); setShowTrailer(false); }} className={`absolute top-4 ${isRTL ? 'right-4' : 'left-4'} z-20 bg-black/60 p-3 rounded-full text-white hover:bg-black/80 backdrop-blur-md`}>
                                        <ArrowLeft size={24} />
                                    </button>
                                    <a href={getExternalLink(trailer)} target="_blank" rel="noopener noreferrer" className={`absolute top-4 ${isRTL ? 'left-4' : 'right-4'} z-30 ${trailer.site === 'Vimeo' ? 'bg-blue-500/90 hover:bg-blue-500' : 'bg-red-600/90 hover:bg-red-600'} px-4 py-2 rounded-full text-white backdrop-blur-md text-sm font-bold flex items-center gap-1.5 shadow-lg transition-colors`}>
                                        Open in {trailer.site} <ExternalLink size={14} />
                                    </a>
                                </>
                            ) : (
                                <img src={`https://image.tmdb.org/t/p/w780${details.backdrop_path || details.poster_path}`} className="w-full h-full object-cover"/>
                            )}
                            {!showTrailer && (
                                <div className="absolute inset-0 modal-gradient flex items-end p-6 md:p-10 pointer-events-none">
                                    <h2 className="text-4xl md:text-6xl font-extrabold text-white drop-shadow-xl">{details.title || details.name}</h2>
                                </div>
                            )}
                        </div>

                        <div className="p-4 sm:p-8 md:p-10 space-y-6">
                            <div className="flex flex-wrap items-center gap-3 text-sm text-gray-400 font-medium">
                                <span className="text-green-500 font-bold">{Math.round((details.vote_average || 0) * 10)}% Match</span>
                                <span className="flex items-center gap-1 text-amber-400"><Star size={14} className="fill-amber-400"/> {details.vote_average ? details.vote_average.toFixed(1) : 'NR'}</span>
                                <span>{(details.release_date || details.first_air_date || '').substring(0,4)}</span>
                                <span className="border border-gray-600 px-1.5 rounded text-[10px] uppercase">HD</span>
                                {type === 'movie' && details.runtime && <span>{Math.floor(details.runtime/60)}h {details.runtime%60}m</span>}
                                {type === 'tv' && <span>{details.number_of_seasons} Seasons</span>}
                            </div>

                            <div className="flex gap-3 md:gap-4 max-w-xl">
                                {type === 'movie' ? (
                                    isUnairedMovie ? (
                                        <button disabled className="flex-1 flex items-center justify-center gap-2 bg-neutral-800 text-neutral-400 py-3 md:py-4 rounded-xl font-bold shadow-lg border border-neutral-700 cursor-not-allowed">
                                            <Clock size={22} /> Premieres {formatDate(details.release_date)}
                                        </button>
                                    ) : (
                                        <button onClick={() => launchPlayer(details, null, null, null, details)} className="flex-1 flex items-center justify-center gap-2 bg-white text-black py-3 md:py-4 rounded-xl font-bold md:text-lg hover:bg-gray-200 transition-colors shadow-lg">
                                            <Play size={22} className="fill-black" /> Play Movie
                                        </button>
                                    )
                                ) : (
                                    isUnairedShow || isNextEpUnaired ? (
                                        <button disabled className="flex-1 flex items-center justify-center gap-2 bg-neutral-800 text-neutral-400 py-3 md:py-4 rounded-xl font-bold shadow-lg border border-neutral-700 cursor-not-allowed">
                                            <Clock size={22} /> Airs {formatDate(nextEpToPlay?.air_date || details.first_air_date)}
                                        </button>
                                    ) : (
                                        <button onClick={() => nextEpToPlay && launchPlayer(details, season, nextEpToPlay.episode_number, nextEpToPlay.name, details)} className="flex-1 flex items-center justify-center gap-2 bg-white text-black py-3 md:py-4 rounded-xl font-bold md:text-lg hover:bg-gray-200 transition-colors shadow-lg">
                                            <Play size={22} className="fill-black" /> Resume S{season} E{nextEpToPlay?.episode_number || 1}
                                        </button>
                                    )
                                )}
                                {trailer && (
                                    <button onClick={() => setShowTrailer(true)} className="flex-1 flex items-center justify-center gap-2 bg-neutral-800 text-white py-3 md:py-4 rounded-xl font-bold md:text-lg hover:bg-neutral-700 transition-colors shadow-lg border border-neutral-700">
                                        <Film size={22} /> Trailer
                                    </button>
                                )}
                            </div>

                            <p className="text-sm md:text-base text-gray-300 leading-relaxed max-w-4xl">{details.overview || 'No overview available.'}</p>
                            
                            {/* Cast Section */}
                            {details.credits?.cast?.length > 0 && (
                                <div className="mt-4 pt-2">
                                    <h3 className="font-bold text-sm text-gray-300 mb-3">Cast</h3>
                                    <div className="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
                                        {details.credits.cast.slice(0, 12).map(actor => (
                                            <div key={actor.id} className="flex-shrink-0 w-16 text-center">
                                                <div className="w-16 h-16 mx-auto rounded-full bg-neutral-800 overflow-hidden mb-2 border border-neutral-700">
                                                    {actor.profile_path ? (
                                                        <img src={`https://image.tmdb.org/t/p/w185${actor.profile_path}`} className="w-full h-full object-cover" alt={actor.name} />
                                                    ) : (
                                                        <div className="w-full h-full flex items-center justify-center text-neutral-500"><User size={20}/></div>
                                                    )}
                                                </div>
                                                <div className="text-[10px] text-gray-200 font-bold leading-tight line-clamp-1" title={actor.name}>{actor.name}</div>
                                                <div className="text-[9px] text-gray-500 leading-tight line-clamp-1" title={actor.character}>{actor.character}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Tracking Controls */}
                            <div className="flex gap-6 mt-4 pb-4 border-b border-neutral-800 relative">
                                <button onClick={() => toggleFavorite(details)} className="flex flex-col items-center gap-2 text-gray-400 hover:text-white transition-colors">
                                    {isFav ? <Check size={24} className="text-white"/> : <Plus size={24} />}
                                    <span className="text-[10px] uppercase font-bold tracking-wider">Watchlist</span>
                                </button>
                                
                                <button onClick={() => setShowListMenu(!showListMenu)} className="flex flex-col items-center gap-2 text-gray-400 hover:text-white transition-colors">
                                    <ListPlus size={24} />
                                    <span className="text-[10px] uppercase font-bold tracking-wider">Add to List</span>
                                </button>

                                {/* Dropdown for Custom Lists */}
                                {showListMenu && (
                                    <>
                                        <div className="fixed inset-0 z-40" onClick={() => setShowListMenu(false)}></div>
                                        <div className="absolute top-full left-16 mt-2 w-56 bg-[#2b2b2b] border border-gray-700 rounded-lg shadow-2xl overflow-hidden z-50">
                                            <div className="p-3 text-xs font-bold text-gray-400 uppercase tracking-wider border-b border-gray-700">Save to...</div>
                                            {customLists.length === 0 ? (
                                                <div className="p-4 text-xs text-gray-500">No custom lists. Create one in your Profile tab.</div>
                                            ) : customLists.map(list => {
                                                const inList = list.items.some(i => i.id === details.id);
                                                return (
                                                <button key={list.id} onClick={() => toggleItemInList(list.id, details)} className="w-full flex items-center justify-between px-4 py-3 text-sm text-gray-300 hover:bg-neutral-700 hover:text-white transition-colors">
                                                    {list.name} {inList && <CheckCircle2 size={16} className="text-indigo-400"/>}
                                                </button>
                                            )})}
                                        </div>
                                    </>
                                )}
                            </div>

                            {type === 'tv' && (
                                <div className="mt-6">
                                    <div className="flex items-center justify-between mb-6">
                                        <h3 className="font-bold text-xl text-white">Episodes</h3>
                                        <select value={season} onChange={(e) => setSeason(e.target.value)} className="bg-neutral-800 border border-neutral-700 text-white text-sm rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                                            {(details.seasons || []).filter(s => s.season_number > 0).map(s => (
                                                <option key={s.season_number} value={s.season_number}>Season {s.season_number}</option>
                                            ))}
                                        </select>
                                    </div>

                                    {loading ? <LoadingSpinner/> : (
                                        <div className="space-y-4">
                                            {episodes.map(ep => {
                                                const isEpWatched = showWatchedMap[season]?.includes(ep.episode_number);
                                                const isUnaired = isFutureDate(ep.air_date);
                                                
                                                return (
                                                <div key={ep.id} className={`flex gap-4 p-3 rounded-xl group transition-colors relative ${isUnaired ? 'opacity-70' : 'hover:bg-neutral-800/80 border border-transparent hover:border-neutral-700'}`}>
                                                    <div tabIndex={isUnaired ? -1 : 0} onClick={() => !isUnaired && launchPlayer(details, season, ep.episode_number, ep.name, details)} onKeyDown={(e) => e.key === 'Enter' && !isUnaired && launchPlayer(details, season, ep.episode_number, ep.name, details)} className={`relative w-40 aspect-video flex-shrink-0 rounded-lg overflow-hidden bg-neutral-900 shadow-md ${!isUnaired ? 'cursor-pointer focus:ring-2 focus:ring-indigo-500 outline-none' : ''}`}>
                                                        {ep.still_path && <img src={`https://image.tmdb.org/t/p/w300${ep.still_path}`} className={`w-full h-full object-cover transition-opacity duration-300 ${isEpWatched ? 'opacity-40' : (isUnaired ? 'opacity-50' : 'opacity-80 group-hover:opacity-100')}`} />}
                                                        
                                                        {!isUnaired && (
                                                            <div className="absolute inset-0 flex items-center justify-center">
                                                                <PlayCircle size={32} className="text-white opacity-0 group-hover:opacity-100 transition-all transform scale-75 group-hover:scale-100" />
                                                            </div>
                                                        )}
                                                        {isUnaired && (
                                                            <div className="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm">
                                                                <Clock size={28} className="text-white opacity-80" />
                                                            </div>
                                                        )}
                                                        {isEpWatched && !isUnaired && <div className="absolute bottom-0 left-0 right-0 h-1.5 bg-green-500 shadow-[0_-2px_10px_rgba(34,197,94,0.5)]"></div>}
                                                    </div>
                                                    <div className="flex flex-col justify-center flex-grow min-w-0">
                                                        <div className="flex justify-between items-start mb-1">
                                                            <span onClick={() => !isUnaired && launchPlayer(details, season, ep.episode_number, ep.name, details)} className={`text-sm md:text-base font-bold line-clamp-1 ${!isUnaired ? 'cursor-pointer hover:underline text-white' : 'text-gray-400'} ${isEpWatched ? 'text-gray-500' : ''}`}>
                                                                {ep.episode_number}. {ep.name}
                                                            </span>
                                                            {!isUnaired && (
                                                                <button onClick={() => handleToggleWatch(ep)} className="text-gray-500 hover:text-white p-1 ml-2 flex-shrink-0 transition-colors" title={isEpWatched ? "Mark as unseen" : "Mark as watched"}>
                                                                    {isEpWatched ? <CheckCircle2 size={20} className="text-green-500"/> : <Circle size={20} />}
                                                                </button>
                                                            )}
                                                        </div>
                                                        <p className={`text-[10px] font-bold mb-1.5 tracking-wide uppercase ${isUnaired ? 'text-amber-500' : 'text-indigo-400'}`}>
                                                            {isUnaired ? 'Airs: ' : 'Aired: '} {formatDate(ep.air_date)}
                                                        </p>
                                                        <p className={`text-xs md:text-sm line-clamp-2 leading-relaxed ${isEpWatched ? 'text-gray-600' : 'text-gray-400'}`}>{ep.overview || (isUnaired ? 'Episode synopsis will be available after airing.' : '')}</p>
                                                    </div>
                                                </div>
                                            )})}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Confirmation Modal for Marking Previous Episodes */}
                        {confirmMarkPrevious && (
                            <div className="fixed inset-0 z-[80] flex items-center justify-center bg-black/80 px-4" onClick={(e) => e.stopPropagation()}>
                                <div className="bg-[#1e1e1e] border border-gray-700 rounded-xl max-w-sm w-full p-6 shadow-2xl animate-in zoom-in-95">
                                    <h3 className="text-lg font-bold text-white mb-2">Mark Previous Episodes?</h3>
                                    <p className="text-sm text-gray-400 mb-6">You are marking Episode {confirmMarkPrevious.ep.episode_number} as watched, but there are {confirmMarkPrevious.previousUnwatched.length} previous unwatched episodes in this season. Would you like to mark them as watched too?</p>
                                    <div className="flex flex-col gap-3">
                                        <button onClick={confirmMarkAll} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-lg transition-colors">Mark All Previous & Current</button>
                                        <button onClick={confirmMarkOnlyCurrent} className="w-full bg-neutral-700 hover:bg-neutral-600 text-white font-bold py-2.5 rounded-lg transition-colors">Only Mark Current</button>
                                        <button onClick={() => setConfirmMarkPrevious(null)} className="w-full text-gray-500 hover:text-white font-bold py-2 transition-colors">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const PlayerOverlay = () => {
            const { selectedServerId, setSelectedServerId, servers, activePlayerMedia, setActivePlayerMedia } = React.useContext(AppContext);
            const [showSettings, setShowSettings] = useState(false);
            const [showCastGuide, setShowCastGuide] = useState(false);
            const [copied, setCopied] = useState(false);
            const videoRef = useRef(null);

            if (!activePlayerMedia) return null;

            const activeUrl = useMemo(() => {
                const server = servers.find(s => s.id === selectedServerId) || servers[0];
                if (server) {
                    if (server.id === 'iptv') {
                        // Let the IPTV stream hook logic take over (or configure manually later)
                        return 'iptv_placeholder'; 
                    }

                    let formattedUrl = server.urlTemplate
                        .replace(/\{type\}/g, activePlayerMedia.type)
                        .replace(/\{tmdb\}/g, activePlayerMedia.tmdbId)
                        .replace(/\{imdb\}/g, activePlayerMedia.imdbId || activePlayerMedia.tmdbId);
                        
                    if (activePlayerMedia.type === 'tv' || activePlayerMedia.type === 'series') {
                        return formattedUrl.replace(/\{s\}/g, activePlayerMedia.season || '').replace(/\{e\}/g, activePlayerMedia.episode || '');
                    } else {
                        // Cleanly remove the season/episode placeholders from the URL if it's just a movie
                        return formattedUrl
                            .replace(/\/\{s\}\/\{e\}/g, '')
                            .replace(/[?&](s|season)=\{s\}&(e|episode)=\{e\}/g, '')
                            .replace(/-\{s\}-\{e\}/g, '')
                            .replace(/\{s\}/g, '')
                            .replace(/\{e\}/g, '')
                            .replace(/[?&]$/, '');
                    }
                }
                return '';
            }, [activePlayerMedia, selectedServerId, servers]);

            const isRawFile = activeUrl.includes('.mp4') || activeUrl.includes('.mkv') || activeUrl.includes('.m3u8');

            useEffect(() => {
                if (!activeUrl || !isRawFile) return;
                const video = videoRef.current;
                if (!video) return;
                let hlsInstance = null;
                if (activeUrl.includes('.m3u8')) {
                    if (window.Hls && window.Hls.isSupported()) {
                        hlsInstance = new window.Hls({ enableWorker: true, lowLatencyMode: true });
                        hlsInstance.loadSource(activeUrl); hlsInstance.attachMedia(video);
                        hlsInstance.on(window.Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>e));
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = activeUrl; video.play().catch(e=>e);
                    }
                } else { video.src = activeUrl; video.play().catch(e=>e); }
                return () => { if (hlsInstance) hlsInstance.destroy(); if (video) { video.pause(); video.removeAttribute('src'); video.load(); } };
            }, [activeUrl, isRawFile]);

            return (
                <div className="fixed inset-0 z-[100] bg-black flex flex-col animate-in fade-in">
                    <div className="flex items-center justify-between p-4 bg-gradient-to-b from-black/80 to-transparent absolute top-0 left-0 right-0 z-30 transition-opacity duration-300">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setActivePlayerMedia(null)} className="text-white hover:text-gray-300 p-1"><ChevronDown size={28} className="rotate-90"/></button>
                            <span className="font-bold text-white text-sm sm:text-base line-clamp-1">{activePlayerMedia.title} {activePlayerMedia.type === 'tv' && `- S${activePlayerMedia.season} E${activePlayerMedia.episode}`}</span>
                        </div>
                        <div className="relative">
                            <button onClick={() => setShowSettings(!showSettings)} className="text-white p-2 hover:bg-white/10 rounded-full transition-colors"><Settings size={20}/></button>
                            {showSettings && (
                                <>
                                    <div className="fixed inset-0 z-40" onClick={() => setShowSettings(false)}></div>
                                    <div className="absolute top-full right-0 mt-2 w-64 bg-[#181818] border border-gray-800 rounded-xl shadow-2xl overflow-hidden z-50">
                                        <button onClick={() => { setShowCastGuide(true); setShowSettings(false); }} className="w-full flex items-center gap-3 px-4 py-3 hover:bg-neutral-800 text-white text-sm border-b border-gray-800"><Cast size={16} className="text-indigo-400"/> Cast to TV</button>
                                        <div className="p-3">
                                            <div className="text-[10px] uppercase text-gray-500 mb-2 font-bold px-1">Change Server</div>

                                        </div>
                                    </div>
                                </>
